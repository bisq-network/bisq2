on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

      name:
        required: true
        type: string

      build-root-dir:
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.name }} on ${{ inputs.os }}
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify Gradle wrapper checksums
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum -c gradle/wrapper/gradle-wrapper.sha256
          else
            shasum -a 256 -c gradle/wrapper/gradle-wrapper.sha256
          fi

      - name: Setup Java JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21.0.6'
          distribution: 'zulu'
          check-latest: false

      - name: Gradle Build Action
        uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3.5.0
        with:
          arguments: build -x test
          build-root-directory: ${{ inputs.build-root-dir }}
          gradle-executable: ./gradlew
          gradle-version: 8.9
