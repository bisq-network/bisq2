name: Build Bisq 2

on:
  push:
  pull_request:
    types: [ opened, reopened, synchronize, closed ]
    branches: [ main ]

permissions:
  contents: read

jobs:
  build_bisq:
    name: Build Bisq on ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15 is arm64; macos-15-intel keeps Intel macOS coverage explicit.
        os: [ ubuntu-24.04, macos-15-intel, macos-15, windows-2025 ]

    uses: ./.github/workflows/build_bisq_module.yml
    with:
      os: ${{ matrix.os }}
      name: Bisq
      build-root-dir: .

  build_apps_module:
    name: Build apps module on ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15 is arm64; macos-15-intel keeps Intel macOS coverage explicit.
        os: [ ubuntu-24.04, macos-15-intel, macos-15, windows-2025 ]

    uses: ./.github/workflows/build_bisq_module.yml
    with:
      os: ${{ matrix.os }}
      name: apps module
      build-root-dir: apps

  build_network_module:
    name: Build network module on ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15 is arm64; macos-15-intel keeps Intel macOS coverage explicit.
        os: [ ubuntu-24.04, macos-15-intel, macos-15, windows-2025 ]

    uses: ./.github/workflows/build_bisq_module.yml
    with:
      os: ${{ matrix.os }}
      name: network module
      build-root-dir: network

  build_tor_module:
    name: Build tor module on ${{ matrix.os }}
    strategy:
      matrix:
        # macos-15 is arm64; macos-15-intel keeps Intel macOS coverage explicit.
        os: [ ubuntu-24.04, macos-15-intel, macos-15, windows-2025 ]

    uses: ./.github/workflows/build_bisq_module.yml
    with:
      os: ${{ matrix.os }}
      name: tor module
      build-root-dir: network/tor
