# nginx config for the Bisq2 trusted-node web UI sidecar.
#
# Serves a small static pairing/status page and gives it just two data sources:
#   1. /pairing-code            -> the node's pairing_qr_code.txt on the shared /data volume
#   2. /api/v1/settings/version -> reverse-proxied to the node REST API for a health probe
#
# The sidecar shares the node container's network namespace
# (docker-compose: network_mode: "service:<node>"), so the node API — which binds
# 127.0.0.1:8090 — is reachable here on loopback. We deliberately expose ONLY the
# version endpoint, not the whole API.

server {
    listen       8091;
    server_name  _;
    server_tokens off;

    root   /usr/share/nginx/html;
    index  index.html;

    # Security headers on every response (the page displays a pairing secret). The page
    # is all-inline and same-origin, so 'unsafe-inline' is required but everything else
    # is locked to 'self'/data:. nginx add_header does NOT inherit into a location that
    # defines its own add_header, so we keep these ONLY here at the server level and let
    # all locations inherit them — no per-location add_header anywhere.
    # NOTE: frame-ancestors / X-Frame-Options is deliberately NOT set yet — Umbrel may
    # iframe the app in its dashboard; set the correct frame policy once that's verified.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'" always;
    add_header Cache-Control "no-store" always;

    # The pairing-code file the node writes into the shared data volume.
    # Served read-only; the page extracts the base64 code (the first chunk before
    # the "\n\n\n" ASCII-art block). Returns 404 cleanly until the node writes it.
    location = /pairing-code {
        alias /data/pairing_qr_code.txt;
        default_type text/plain;
    }

    # Health probe only — reverse-proxied to the node's REST API on loopback.
    # GET/HEAD only; strip identifying upstream headers and don't forward client IPs.
    location = /api/v1/settings/version {
        limit_except GET HEAD { deny all; }
        proxy_pass http://127.0.0.1:8090/api/v1/settings/version;
        proxy_set_header Host "localhost";
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
    }

    location / {
        try_files $uri /index.html;
    }
}
