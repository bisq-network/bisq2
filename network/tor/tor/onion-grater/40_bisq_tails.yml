#### meta start
#### project Tails
#### category tor-control
#### description
## Shipped but not enabled by default onion-grater profile.
#### meta end

---
# Match the client by the apparmor-profiles selector with Bisq's executable path. Bisq runs
# unconfined on Tails (/proc/<pid>/attr/current is "unconfined"), and onion-grater matches an
# unconfined client through this selector by falling back to its executable path — so the value is
# the launcher path. The newer exe-paths selector is NOT honored by Tails' onion-grater version
# (verified: with exe-paths the SOCKS GETINFO returned "510 Command filtered" because no profile
# matched), so apparmor-profiles is the correct selector here.
- apparmor-profiles:
    - '/opt/bisq2/bin/Bisq2'
  users:
    - 'amnesia'
  hosts:
    - '*'
  commands:
    GETINFO:
      - pattern:       'status/bootstrap-phase'
        response:
        - pattern:     '250-status/bootstrap-phase=*'
          replacement: '250-status/bootstrap-phase=NOTICE BOOTSTRAP PROGRESS=100 TAG=done SUMMARY="Done"'
      - pattern:       'net/listeners/socks'
    ADD_ONION:
      - pattern:     'NEW:(\S+) Port=9999,(\S+)'
        replacement: 'NEW:{} Port=9999,{client-address}:{}'
      - pattern:     '(\S+) Port=(\S+),(\S+)'
        replacement: '{} Port={},{client-address}:{}'
      - pattern:     '(\S+):(\S+) Port=9999,(\S+)'
        replacement: '{}:{} Port=9999,{client-address}:{}'
    DEL_ONION:
      - '.+'
    HSFETCH:
      - '.+'

    ## Bisq 2
    SETCONF:
      - pattern:       'DisableNetwork.*'
        response:
        - pattern:     '250 DisableNetwork=.*'
          replacement: '250 DisableNetwork=0'
  events:
    ## Bisq 2
    SIGNAL:
      suppress: true

    CIRC:
      suppress: true
    ORCONN:
      suppress: true
    INFO:
      suppress: true
    NOTICE:
      suppress: true
    WARN:
      suppress: true
    ERR:
      suppress: true
    HS_DESC:
      response:
        - pattern:     '650 HS_DESC CREATED (\S+) (\S+) (\S+) \S+ (.+)'
          replacement: '650 HS_DESC CREATED {} {} {} redacted {}'
        - pattern:     '650 HS_DESC FAILED (\S+) \S+ \S+ \S+ (.+)'
          replacement: '650 HS_DESC FAILED {} redacted redacted redacted {}'
        - pattern:     '650 HS_DESC UPLOAD (\S+) (\S+) (\S+) (\S+) (\S+)'
          replacement: '650 HS_DESC UPLOAD {} {} {} {} {}'
        - pattern:     '650 HS_DESC UPLOADED (\S+) (\S+) .+'
          replacement: '650 HS_DESC UPLOADED {} {} redacted'
        - pattern:     '650 HS_DESC REQUESTED (\S+) NO_AUTH'
          replacement: '650 HS_DESC REQUESTED {} NO_AUTH'
        - pattern:     '650 HS_DESC REQUESTED (\S+) NO_AUTH \S+ \S+'
          replacement: '650 HS_DESC REQUESTED {} NO_AUTH redacted redacted'
        - pattern:     '650 HS_DESC RECEIVED (\S+) NO_AUTH \S+ \S+'
          replacement: '650 HS_DESC RECEIVED {} NO_AUTH redacted redacted'
        - pattern:     '.*'
          replacement: ''
    HS_DESC_CONTENT:
      suppress: true
