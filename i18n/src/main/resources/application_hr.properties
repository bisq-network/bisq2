updater.downloadAndVerify.info.isLauncherUpdate=Kada su sve datoteke preuzete, potpisni ključ se uspoređuje s ključevima koji su dostupni u aplikaciji i onima dostupnima na Bisq web stranici. Ovaj ključ se zatim koristi za provjeru preuzetog novog Bisq instalatera. Nakon što su preuzimanje i provjera završeni, idite u direktorij za preuzimanje kako biste instalirali novu verziju Bisq-a.
