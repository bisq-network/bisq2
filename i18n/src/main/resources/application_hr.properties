restoreFromBackup.headline=Datoteke vraćene iz sigurnosne kopije
restoreFromBackup.info=Tijekom pokretanja, sustav je otkrio da su neke trajne datoteke oštećene ili nečitljive.\nKako bi se osiguralo da aplikacija ostane u valjanom stanju, najnovije dostupne sigurnosne kopije su automatski vraćene.\n\nMolimo pregledajte svoje otvorene trgovine kako biste osigurali da su u očekivanom stanju.\nAko primijetite bilo kakve nesuglasice ili naiđete na probleme, kontaktirajte Bisq suradnike za pomoć.\n\nSljedeće trgovine su vraćene iz sigurnosne kopije:
