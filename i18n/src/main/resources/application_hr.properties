tac.headline=Korisnički ugovor
tac.confirm=Pročitao sam i razumio
tac.accept=Prihvati korisnički ugovor
tac.reject=Odbaci i izađi

tac.risk.headline=Razumijte rizike
tac.risk.p2p.title=Decentralizirani Peer-to-Peer Softver
tac.risk.p2p.body=Trgovine se provode izravno između korisnika. Bisq programeri, suradnici i Bisq DAO ne kontroliraju korisnička sredstva i ne mogu jamčiti da će trgovine biti uspješno završene ili da se gubici mogu nadoknaditi.
tac.risk.financial.title=Financijski, tehnički i regulatorni rizici
tac.risk.financial.body=Korištenje Bisq 2 uključuje financijske, tehničke i regulatorne rizike, uključujući djelomičan ili potpuni gubitak sredstava. Softverske ranjivosti, prijevare, povrati plaćanja, sigurnosni incidenti i regulatorne akcije mogu rezultirati nepovratnim gubicima.
tac.risk.noGuarantees.title=Nema jamstva za oporavak ili naknadu
tac.risk.noGuarantees.body=Rješavanje sporova može pomoći u nekim situacijama, ali oporavak, nadoknada ili kompenzacija ne mogu se jamčiti. Korisnici ostaju odgovorni za svoje trgovine, plaćanja i lokalne podatke.
tac.risk.confirm.headline=Molimo potvrdite sljedeće:
tac.risk.accept.loss=Korištenje Bisq 2 može rezultirati djelomičnim ili potpunim gubitkom sredstava.
tac.risk.accept.noRecovery=Obnova, nadoknada ili kompenzacija nisu zajamčeni.


tac.legal.headline=Pravni uvjeti
tac.legal.section1.title=Odricanje od jamstva i ograničenja odgovornosti
tac.legal.section1.body=Bisq 2 je besplatan i otvorenog koda softver objavljen pod GNU Affero General Public License. U najvećoj mjeri dopuštenoj važećim zakonom, softver se pruža na "kako jest" i "kako je dostupno" osnovi, bez jamstava ili izjava bilo koje vrste, uključujući prodajnost, prikladnost za određenu svrhu, naslov, nekršenje, dostupnost, točnost, sigurnost ili rad bez grešaka.\nOsim u slučajevima namjere, grube nepažnje, tjelesne ozljede ili kada se odgovornost ne može isključiti prema važećem zakonu, nijedan nositelj autorskih prava, programer, suradnik, sudionik Bisq DAO-a, posrednik, arbitar, agent za povrat novca ili drugi sudionik projekta ne snosi odgovornost za štetu koja proizlazi iz korištenja, nemogućnosti korištenja ili kvara softvera. Ovo uključuje, bez ograničenja, gubitak sredstava, digitalnih sredstava, profita, podataka, trgovačkih prilika, dobre volje, greške u softveru, sigurnosne ranjivosti, neuspjehe protokola, netočne podatke, prijevaru, povrat plaćanja ili napade trećih strana, čak i ako je bio obaviješten o mogućnosti takvih šteta.
tac.legal.section2.title=Odgovornost korisnika i bez savjeta
tac.legal.section2.body=Korisnici su isključivo odgovorni za korištenje softvera i za osiguravanje da njihovo korištenje ne krši važeće zakone, propise, porezne obveze ili zahtjeve za izvještavanje u njihovoj jurisdikciji. Bisq ne pruža financijske, investicijske, porezne, pravne ili regulatorne savjete. Korisnici su odgovorni za donošenje vlastitih odluka i dobivanje neovisnih savjeta gdje je to prikladno.
tac.legal.section3.title=Informacije i infrastruktura
tac.legal.section3.body=Tržišne cijene, procjene naknada, podaci o mreži, poruke peer-a, ponude i druge informacije mogu biti netočne, nepotpune, odgođene, nedostupne ili pružene od strane trećih strana ili infrastrukture koju upravljaju doprinositelji Bisq DAO-a. Korisnici su odgovorni za neovisnu provjeru svih informacija prije nego što se na njih oslanjaju.
tac.legal.section4.title=Rizici vanjskog plaćanja
tac.legal.section4.body=Fiat i druge vanjske metode plaćanja obrađuju se izvan Bisq 2 i podložne su pravilima, dostupnosti, limitima, naknadama, zahtjevima za verifikaciju, politikama povrata i radnjama pružatelja plaćanja, banaka i drugih trećih strana. Ove metode plaćanja mogu uključivati povrate, obrnute transakcije, prijevare, bankovne restrikcije, blokade računa, kašnjenja ili regulatorne akcije. Korisnici priznaju i prihvaćaju ove rizike.
tac.legal.section5.title=Ograničenja rješavanja sporova
tac.legal.section5.body=Sukobe koji proizlaze iz trgovina provedenih putem softvera mogu se rješavati kroz Bisq postupak rješavanja sporova u skladu s postupcima objavljenim od strane Bisq 2 projekta u trenutku nastanka spora. Rješavanje sporova nije jamstvo povrata, nadoknade, izvršenja ili kompenzacije, i možda neće biti dostupno u svim okolnostima. Bisq DAO, programeri, suradnici, posrednici, arbitri, agenti za povrat i drugi sudionici projekta nemaju obvezu nadoknaditi korisnicima gubitke od trgovanja, ranjivosti softvera, sigurnosne incidente, prijevaru ili druge štete.
tac.legal.section6.title=Nema čuvanja ili posredničke uloge
tac.legal.section6.body=Bisq 2 je decentralizirani peer-to-peer softver razvijen i održavan kroz model upravljanja otvorenog koda poznat kao Bisq DAO. Nema središnjeg entiteta koji kontrolira mrežu, drži sredstva korisnika, djeluje kao posrednik, burza, procesor plaćanja, agent za eskro, fiducijar ili protivstrana u trgovinama, niti jamči dostupnost, rad ili budući razvoj softvera.
tac.legal.section7.title=Privatnost i lokalni podaci
tac.legal.section7.body=Korisnici su odgovorni za zaštitu svojih lokalnih podataka aplikacije, lozinki, identitetskih ključeva, informacija o računu za plaćanje i evidenciji trgovina. Detalji o trgovini i plaćanju mogu se dijeliti s trgovinskim partnerima i, ako se otvori spor, s posrednicima, arbitrima, agentima za povrat novca ili drugim sudionicima uključenim u proces rješavanja spora.
tac.legal.confirm=Pročitao sam i prihvaćam ove uvjete.


