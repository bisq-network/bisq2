tac.risk.headline=Understand di Risks
tac.risk.p2p.title=Decentralized Peer-to-Peer Software
tac.risk.p2p.body=Trades dey happen directly between users. Bisq developers, contributors, and di Bisq DAO no dey control user funds and no fit guarantee say trades go complete successfully or say losses fit recover.
tac.risk.financial.title=Finanshal, Tekinikal, and Regulatori Risks
tac.risk.financial.body=Using Bisq 2 dey involve financial, technical, and regulatory risks, including partial or total loss of funds. Software vulnerabilities, fraud, payment reversals, security incidents, and regulatory actions fit cause unrecoverable losses.
tac.risk.noGuarantees.title=No Guarantee of Recovery or Compensation
tac.risk.noGuarantees.body=Dispute resolushon fit help for some situashons, but recovery, reimbursement, or compensation no fit dey guaranteed. Users go still dey responsible for their trades, payments, and local data.
tac.risk.confirm.headline=Abeg acknowledge di following:
tac.risk.accept.loss=Using Bisq 2 fit result in partial or total loss of funds.
tac.risk.accept.noRecovery=Recovery, reimbursement, or compensation no dey guaranteed.


tac.legal.headline=Legal Terms
tac.legal.section1.title=Warranty Disclaimer and Liability Limits
tac.legal.section1.body=Bisq 2 na free and open-source software wey dem release under di GNU Affero General Public License. To di maximum extent wey law fit allow, di software dey provided on "as is" and "as available" basis, without warranties or representations of any kind, including merchantability, fitness for a particular purpose, title, non-infringement, availability, accuracy, security, or error-free operation.\nExcept for cases of intent, gross negligence, personal injury, or where liability no fit dey excluded under applicable law, no copyright holder, developer, contributor, Bisq DAO participant, mediator, arbitrator, refund agent, or other project participant go dey liable for damages wey fit happen from di use of, inability to use, or malfunction of di software. Dis include, without limitation, loss of funds, digital assets, profits, data, trading opportunities, goodwill, software defects, security vulnerabilities, protocol failures, inaccurate data, fraud, payment reversals, or third-party attacks, even if dem don advise about di possibility of such damages.
tac.legal.section2.title=User Responsibility and No Advice
tac.legal.section2.body=Users na dem dey responsible for how dem dey use di software and for making sure say dem use am no go violate any laws, regulations, tax obligations, or reporting requirements wey dey for their jurisdiction. Bisq no dey provide financial, investment, tax, legal, or regulatory advice. Users dey responsible for making their own decisions and for getting independent advice if e necessary.
tac.legal.section3.title=Informashon and Infrastructure
tac.legal.section3.body=Markit prices, fee estimates, network data, peer messages, offers, and other informashon fit dey inaccurate, incomplete, delayed, unavailable, or provided by third parties or infrastructure wey contributors to di Bisq DAO dey operate. Users dey responsible to verify all informashon by demself before dem go rely on am.
tac.legal.section4.title=External Payment Risks
tac.legal.section4.body=Fiat and other external payment methods dey processed outside Bisq 2 and dem dey subject to di rules, availability, limits, fees, verification requirements, chargeback policies, and actions of payment providers, banks, and other third parties. Dis payment methods fit involve chargebacks, payment reversals, fraud, banking restrictions, account freezes, delays, or regulatory actions. Users don sabi and accept dis risks.
tac.legal.section5.title=Dispute Resolution Limits
tac.legal.section5.body=Disputes wey come from trayds wey dem do through di software fit dey handled through di Bisq dispute resolution process according to di procedures wey dem publish by di Bisq 2 project at di time of di dispute. Dispute resolution no be guarantee of recovery, reimbursement, enforcement, or compensation, and e fit no dey available for all circumstances. Di Bisq DAO, developers, contributors, mediators, arbitrators, refund agents, and other project participants no get any obligation to compensate users for trading losses, software vulnerabilities, security incidents, fraud, or other damages.
tac.legal.section6.title=No Custody or Intermediary Role
tac.legal.section6.body=Bisq 2 na decentralized peer-to-peer software wey dem develop and maintain through open-source governance model wey dem dey call Bisq DAO. No central entity dey control di network, hold user funds, act as broker, exchange, payment processor, escrow agent, fiduciary, or counterparty to trades, or guarantee di availability, operation, or future development of di software.
tac.legal.section7.title=Privacy and Local Data
tac.legal.section7.body=Users dey responsible for protecting their local application data, passwords, identity keys, payment-account information, and trade records. Trade and payment details fit dey shared with trading peers and, if dem open dispute, with mediators, arbitrators, refund agents, or other participants wey dey involved for di dispute resolution process.
tac.legal.confirm=I don read and accept dis terms.


