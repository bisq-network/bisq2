tac.risk.headline=Förstå riskerna
tac.risk.p2p.title=Decentraliserad Peer-to-Peer-programvara
tac.risk.p2p.body=Affärer genomförs direkt mellan användare. Bisq-utvecklare, bidragsgivare och Bisq DAO kontrollerar inte användarfonder och kan inte garantera att affärer kommer att slutföras framgångsrikt eller att förluster kan återhämtas.
tac.risk.financial.title=Finansiella, tekniska och regulatoriska risker
tac.risk.financial.body=Att använda Bisq 2 medför finansiella, tekniska och regulatoriska risker, inklusive partiell eller total förlust av medel. Programvarusårbarheter, bedrägerier, betalningsåterkallelser, säkerhetsincidenter och regulatoriska åtgärder kan resultera i oåterkalleliga förluster.
tac.risk.noGuarantees.title=Ingen garanti för återhämtning eller ersättning
tac.risk.noGuarantees.body=Tvistlösning kan hjälpa i vissa situationer, men återhämtning, återbetalning eller kompensation kan inte garanteras. Användare ansvarar för sina affärer, betalningar och lokala data.
tac.risk.confirm.headline=Vänligen bekräfta följande:
tac.risk.accept.loss=Att använda Bisq 2 kan resultera i delvis eller total förlust av medel.
tac.risk.accept.noRecovery=Återställning, ersättning eller kompensation garanteras inte.


tac.legal.headline=Juridiska villkor
tac.legal.section1.title=Garantifriskrivning och ansvarsbegränsningar
tac.legal.section1.body=Bisq 2 är gratis och öppen källkod som släppts under GNU Affero General Public License. I den utsträckning som tillåts av tillämplig lag tillhandahålls programvaran på en "i befintligt skick" och "i tillgängligt skick" basis, utan garantier eller representationer av något slag, inklusive säljbarhet, lämplighet för ett särskilt syfte, äganderätt, icke-kränkning, tillgänglighet, noggrannhet, säkerhet eller felfri drift.\nFörutom i fall av avsikt, grov vårdslöshet, personskada eller där ansvar inte kan uteslutas enligt tillämplig lag, ska ingen upphovsrättsinnehavare, utvecklare, bidragsgivare, Bisq DAO-deltagare, medlare, skiljedomare, återbetalningsagent eller annan projektmedlem vara ansvarig för skador som uppstår från användning av, oförmåga att använda eller funktionsfel i programvaran. Detta inkluderar, utan begränsning, förlust av medel, digitala tillgångar, vinster, data, handelsmöjligheter, goodwill, programvarufel, säkerhetsbrister, protokollfel, felaktiga data, bedrägeri, betalningsåterföringar eller attacker från tredje part, även om de informerats om möjligheten av sådana skador.
tac.legal.section2.title=Användaransvar och Ingen Rådgivning
tac.legal.section2.body=Användare är ensamt ansvariga för sin användning av mjukvaran och för att säkerställa att deras användning inte bryter mot tillämpliga lagar, förordningar, skatteåtaganden eller rapporteringskrav i deras jurisdiktion. Bisq ger ingen finansiell, investerings-, skatte-, juridisk eller regulatorisk rådgivning. Användare är ansvariga för att fatta sina egna beslut och att skaffa oberoende rådgivning där det är lämpligt.
tac.legal.section3.title=Information och Infrastruktur
tac.legal.section3.body=Marknadspriser, avgiftsuppskattningar, nätverksdata, meddelanden från peers, erbjudanden och annan information kan vara felaktiga, ofullständiga, fördröjda, otillgängliga eller tillhandahållas av tredje part eller infrastruktur som drivs av bidragsgivare till Bisq DAO. Användare är ansvariga för att oberoende verifiera all information innan de förlitar sig på den.
tac.legal.section4.title=Extern betalningsrisker
tac.legal.section4.body=Fiat och andra externa betalningsmetoder behandlas utanför Bisq 2 och omfattas av regler, tillgänglighet, gränser, avgifter, verifieringskrav, återbetalningspolicyer och åtgärder från betalningsleverantörer, banker och andra tredje parter. Dessa betalningsmetoder kan involvera återbetalningar, betalningsåterkallelser, bedrägerier, bankrestriktioner, kontofrysningar, förseningar eller reglerande åtgärder. Användare erkänner och accepterar dessa risker.
tac.legal.section5.title=Tvistlösningsgränser
tac.legal.section5.body=Tvister som uppstår från affärer som genomförts via programvaran kan hanteras genom Bisqs tvistlösningsprocess i enlighet med de rutiner som publicerats av Bisq 2-projektet vid tidpunkten för tvisten. Tvistlösning är ingen garanti för återvinning, återbetalning, verkställighet eller kompensation, och kanske inte är tillgänglig under alla omständigheter. Bisq DAO, utvecklare, bidragsgivare, medlare, skiljedomare, återbetalningsagenter och andra projektmedlemmar har ingen skyldighet att kompensera användare för handelsförluster, programvarusårbarheter, säkerhetsincidenter, bedrägerier eller andra skador.
tac.legal.section6.title=Ingen förvaring eller mellanhandroll
tac.legal.section6.body=Bisq 2 är decentraliserad peer-to-peer-programvara som utvecklas och underhålls genom en öppen styrningsmodell känd som Bisq DAO. Ingen central enhet kontrollerar nätverket, förvarar användarfonder, agerar som mäklare, börs, betalningsprocessor, escrow-agent, förvaltare eller motpart i affärer, eller garanterar tillgänglighet, drift eller framtida utveckling av programvaran.
tac.legal.section7.title=Integritet och Lokal Data
tac.legal.section7.body=Användare är ansvariga för att skydda sina lokala applikationsdata, lösenord, identitetsnycklar, information om betalkonton och handelsregister. Handels- och betalningsdetaljer kan delas med handelsparter och, om en tvist öppnas, med medlare, skiljedomare, återbetalningsagenter eller andra deltagare som är involverade i tvistlösningsprocessen.
tac.legal.confirm=Jag har läst och accepterar dessa villkor.


