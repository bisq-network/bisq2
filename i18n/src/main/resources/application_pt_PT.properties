restoreFromBackup.info=Durante a inicialização, o sistema detetou que alguns ficheiros persistentes estavam corrompidos ou ilegíveis.\nPara garantir que a aplicação permaneça num estado válido, os últimos backups disponíveis foram restaurados automaticamente.\n\nPor favor, reveja as suas negociações abertas para garantir que estão no estado esperado.\nSe notar alguma inconsistência ou encontrar problemas, entre em contacto com os colaboradores do Bisq para assistência.\n\nOs seguintes ficheiros foram restaurados a partir do backup:
