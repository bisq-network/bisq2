tac.headline=Acordo de Utilizador
tac.confirm=Li e compreendi
tac.accept=Aceitar o acordo do utilizador
tac.reject=Rejeitar e sair

tac.risk.headline=Compreender os Riscos
tac.risk.p2p.title=Software Peer-to-Peer Descentralizado
tac.risk.p2p.body=As negociações são realizadas diretamente entre os utilizadores. Os desenvolvedores do Bisq, colaboradores e a Bisq DAO não controlam os fundos dos utilizadores e não podem garantir que as negociações sejam concluídas com sucesso ou que as perdas possam ser recuperadas.
tac.risk.financial.title=Riscos Financeiros, Técnicos e Regulatórios
tac.risk.financial.body=Utilizar o Bisq 2 envolve riscos financeiros, técnicos e regulatórios, incluindo perda parcial ou total de fundos. Vulnerabilidades de software, fraudes, reversões de pagamento, incidentes de segurança e ações regulatórias podem resultar em perdas irrecuperáveis.
tac.risk.noGuarantees.title=Sem Garantia de Recuperação ou Compensação
tac.risk.noGuarantees.body=A resolução de disputas pode ajudar em algumas situações, mas a recuperação, reembolso ou compensação não podem ser garantidos. Os utilizadores continuam responsáveis pelas suas negociações, pagamentos e dados locais.
tac.risk.confirm.headline=Por favor, reconheça o seguinte:
tac.risk.accept.loss=Usar o Bisq 2 pode resultar em perda parcial ou total de fundos.
tac.risk.accept.noRecovery=A recuperação, reembolso ou compensação não está garantida.


tac.legal.headline=Termos Legais
tac.legal.section1.title=Isenção de Garantia e Limites de Responsabilidade
tac.legal.section1.body=Bisq 2 é um software livre e de código aberto lançado sob a Licença Pública Geral Affero GNU. Na máxima extensão permitida pela legislação aplicável, o software é fornecido numa base "como está" e "conforme disponível", sem garantias ou representações de qualquer tipo, incluindo comercialização, adequação a um propósito específico, título, não violação, disponibilidade, precisão, segurança ou operação sem erros.\nExceto em casos de intenção, negligência grave, lesão pessoal ou onde a responsabilidade não possa ser excluída sob a legislação aplicável, nenhum detentor de direitos autorais, desenvolvedor, colaborador, participante do Bisq DAO, mediador, árbitro, agente de reembolso ou outro participante do projeto será responsável por danos decorrentes do uso, incapacidade de uso ou mau funcionamento do software. Isso inclui, sem limitação, perda de fundos, ativos digitais, lucros, dados, oportunidades de negociação, boa vontade, defeitos de software, vulnerabilidades de segurança, falhas de protocolo, dados imprecisos, fraudes, reversões de pagamento ou ataques de terceiros, mesmo que avisados da possibilidade de tais danos.
tac.legal.section2.title=Responsabilidade do Utilizador e Nenhum Conselho
tac.legal.section2.body=Os utilizadores são os únicos responsáveis pela utilização do software e por garantir que a sua utilização não viola as leis, regulamentos, obrigações fiscais ou requisitos de reporte aplicáveis na sua jurisdição. A Bisq não fornece aconselhamento financeiro, de investimento, fiscal, legal ou regulatório. Os utilizadores são responsáveis por tomar as suas próprias decisões e obter aconselhamento independente quando apropriado.
tac.legal.section3.title=Informação e Infraestrutura
tac.legal.section3.body=Os preços de mercado, estimativas de taxas, dados da rede, mensagens de pares, ofertas e outras informações podem ser imprecisos, incompletos, atrasados, indisponíveis ou fornecidos por terceiros ou infraestrutura operada por colaboradores do Bisq DAO. Os utilizadores são responsáveis por verificar de forma independente todas as informações antes de confiar nelas.
tac.legal.section4.title=Riscos de Pagamento Externo
tac.legal.section4.body=Métodos de pagamento em fiat e outros métodos de pagamento externos são processados fora do Bisq 2 e estão sujeitos às regras, disponibilidade, limites, taxas, requisitos de verificação, políticas de estorno e ações dos provedores de pagamento, bancos e outros terceiros. Esses métodos de pagamento podem envolver estornos, reversões de pagamento, fraudes, restrições bancárias, congelamentos de conta, atrasos ou ações regulatórias. Os utilizadores reconhecem e aceitam esses riscos.
tac.legal.section5.title=Limites de Resolução de Disputas
tac.legal.section5.body=Disputas decorrentes de negociações realizadas através do software podem ser tratadas através do processo de resolução de disputas do Bisq, de acordo com os procedimentos publicados pelo projeto Bisq 2 no momento da disputa. A resolução de disputas não é uma garantia de recuperação, reembolso, execução ou compensação, e pode não estar disponível em todas as circunstâncias. O Bisq DAO, desenvolvedores, colaboradores, mediadores, árbitros, agentes de reembolso e outros participantes do projeto não têm obrigação de compensar os utilizadores por perdas comerciais, vulnerabilidades de software, incidentes de segurança, fraudes ou outros danos.
tac.legal.section6.title=Sem Custódia ou Papel Intermediário
tac.legal.section6.body=Bisq 2 é um software descentralizado peer-to-peer desenvolvido e mantido através de um modelo de governança de código aberto conhecido como Bisq DAO. Nenhuma entidade central controla a rede, detém a custódia dos fundos dos utilizadores, atua como corretor, bolsa, processador de pagamentos, agente de custódia, fiduciário ou contraparte nas negociações, ou garante a disponibilidade, operação ou desenvolvimento futuro do software.
tac.legal.section7.title=Privacidade e Dados Locais
tac.legal.section7.body=Os utilizadores são responsáveis por proteger os seus dados locais da aplicação, palavras-passe, chaves de identidade, informações da conta de pagamento e registos de negociações. Os detalhes das negociações e pagamentos podem ser partilhados com pares de negociação e, se um litígio for aberto, com mediadores, árbitros, agentes de reembolso ou outros participantes envolvidos no processo de resolução de litígios.
tac.legal.confirm=Li e aceito estes termos.


