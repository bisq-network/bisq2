tac.headline=Accord utilisateur
tac.confirm=J'ai lu et compris
tac.accept=Accepter l'accord utilisateur
tac.reject=Rejeter et quitter

tac.risk.headline=Comprendre les Risques
tac.risk.p2p.title=Logiciel Décentralisé Peer-to-Peer
tac.risk.p2p.body=Les échanges sont effectués directement entre les utilisateurs. Les développeurs de Bisq, les contributeurs et le Bisq DAO ne contrôlent pas les fonds des utilisateurs et ne peuvent garantir que les échanges seront finalisés avec succès ou que les pertes peuvent être récupérées.
tac.risk.financial.title=Risques Financiers, Techniques et Réglementaires
tac.risk.financial.body=Utiliser Bisq 2 comporte des risques financiers, techniques et réglementaires, y compris la perte partielle ou totale de fonds. Les vulnérabilités logicielles, la fraude, les annulations de paiement, les incidents de sécurité et les actions réglementaires peuvent entraîner des pertes irrécupérables.
tac.risk.noGuarantees.title=Aucune garantie de récupération ou de compensation
tac.risk.noGuarantees.body=La résolution des litiges peut aider dans certaines situations, mais la récupération, le remboursement ou l'indemnisation ne peuvent pas être garantis. Les utilisateurs restent responsables de leurs échanges, paiements et données locales.
tac.risk.confirm.headline=Veuillez reconnaître ce qui suit :
tac.risk.accept.loss=L'utilisation de Bisq 2 peut entraîner une perte partielle ou totale de fonds.
tac.risk.accept.noRecovery=La récupération, le remboursement ou l'indemnisation ne sont pas garantis.


tac.legal.headline=Conditions légales
tac.legal.section1.title=Avertissement de garantie et limites de responsabilité
tac.legal.section1.body=Bisq 2 est un logiciel libre et open-source publié sous la Licence Publique Générale Affero GNU. Dans la mesure maximale permise par la loi applicable, le logiciel est fourni "tel quel" et "selon disponibilité", sans garanties ni déclarations de quelque nature que ce soit, y compris la commercialité, l'adéquation à un usage particulier, le titre, la non-contrefaçon, la disponibilité, l'exactitude, la sécurité ou le fonctionnement sans erreur.\nSauf en cas d'intention, de négligence grave, de préjudice corporel, ou lorsque la responsabilité ne peut être exclue en vertu de la loi applicable, aucun titulaire de droits d'auteur, développeur, contributeur, participant au Bisq DAO, médiateur, arbitre, agent de remboursement ou autre participant au projet ne pourra être tenu responsable des dommages résultant de l'utilisation, de l'incapacité à utiliser ou du dysfonctionnement du logiciel. Cela inclut, sans limitation, la perte de fonds, d'actifs numériques, de bénéfices, de données, d'opportunités de trading, de goodwill, de défauts logiciels, de vulnérabilités de sécurité, d'échecs de protocole, de données inexactes, de fraude, de rétrofacturations ou d'attaques de tiers, même si informé de la possibilité de tels dommages.
tac.legal.section2.title=Responsabilité de l'utilisateur et absence de conseils
tac.legal.section2.body=Les utilisateurs sont seuls responsables de leur utilisation du logiciel et de s'assurer que leur utilisation ne viole pas les lois, règlements, obligations fiscales ou exigences de déclaration applicables dans leur juridiction. Bisq ne fournit pas de conseils financiers, d'investissement, fiscaux, juridiques ou réglementaires. Les utilisateurs sont responsables de prendre leurs propres décisions et d'obtenir des conseils indépendants si nécessaire.
tac.legal.section3.title=Information et Infrastructure
tac.legal.section3.body=Les prix du marché, les estimations de frais, les données réseau, les messages entre pairs, les offres et d'autres informations peuvent être inexactes, incomplètes, retardées, indisponibles ou fournies par des tiers ou des infrastructures opérées par des contributeurs au Bisq DAO. Les utilisateurs sont responsables de la vérification indépendante de toutes les informations avant de s'y fier.
tac.legal.section4.title=Risques de Paiement Externes
tac.legal.section4.body=Les méthodes de paiement Fiat et autres méthodes de paiement externes sont traitées en dehors de Bisq 2 et sont soumises aux règles, à la disponibilité, aux limites, aux frais, aux exigences de vérification, aux politiques de rétrofacturation et aux actions des fournisseurs de paiement, des banques et d'autres tiers. Ces méthodes de paiement peuvent impliquer des rétrofacturations, des annulations de paiement, de la fraude, des restrictions bancaires, des gels de comptes, des retards ou des actions réglementaires. Les utilisateurs reconnaissent et acceptent ces risques.
tac.legal.section5.title=Limites de Résolution des Litiges
tac.legal.section5.body=Les litiges découlant des échanges effectués via le logiciel peuvent être traités par le processus de résolution des litiges de Bisq conformément aux procédures publiées par le projet Bisq 2 au moment du litige. La résolution des litiges n'est pas une garantie de récupération, de remboursement, d'exécution ou de compensation, et peut ne pas être disponible dans toutes les circonstances. Le Bisq DAO, les développeurs, les contributeurs, les médiateurs, les arbitres, les agents de remboursement et d'autres participants au projet ne sont pas tenus de compenser les utilisateurs pour les pertes commerciales, les vulnérabilités logicielles, les incidents de sécurité, la fraude ou d'autres dommages.
tac.legal.section6.title=Aucun rôle de garde ou d'intermédiaire
tac.legal.section6.body=Bisq 2 est un logiciel décentralisé de pair à pair développé et maintenu par un modèle de gouvernance open-source connu sous le nom de Bisq DAO. Aucune entité centrale ne contrôle le réseau, ne détient la garde des fonds des utilisateurs, n'agit en tant que courtier, échange, processeur de paiement, agent d'entiercement, fiduciaire ou contrepartie aux échanges, ni ne garantit la disponibilité, le fonctionnement ou le développement futur du logiciel.
tac.legal.section7.title=Confidentialité et Données Locales
tac.legal.section7.body=Les utilisateurs sont responsables de la protection de leurs données d'application locales, mots de passe, clés d'identité, informations de compte de paiement et dossiers d'échange. Les détails des échanges et des paiements peuvent être partagés avec des pairs commerciaux et, si un litige est ouvert, avec des médiateurs, arbitres, agents de remboursement ou autres participants impliqués dans le processus de résolution des litiges.
tac.legal.confirm=J'ai lu et j'accepte ces termes.


