restoreFromBackup.headline=Fichiers restaurés à partir de la sauvegarde
restoreFromBackup.info=Lors du démarrage, le système a détecté que certains fichiers persistants étaient corrompus ou illisibles.\nPour garantir que l'application reste dans un état valide, les dernières sauvegardes disponibles ont été restaurées automatiquement.\n\nVeuillez examiner vos échanges ouverts pour vous assurer qu'ils sont dans l'état attendu.\nSi vous remarquez des incohérences ou rencontrez des problèmes, contactez les contributeurs de Bisq pour obtenir de l'aide.\n\nLes fichiers suivants ont été restaurés à partir de la sauvegarde :
