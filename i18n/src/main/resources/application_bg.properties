restoreFromBackup.headline=Файлове, възстановени от резервно копие
restoreFromBackup.info=По време на стартирането системата установи, че някои постоянни файлове са повредени или нечетими.\nЗа да се увери, че приложението остава в валидно състояние, последните налични резервни копия бяха автоматично възстановени.\n\nМоля, прегледайте вашите отворени сделки, за да се уверите, че са в очакваното състояние.\nАко забележите несъответствия или срещнете проблеми, свържете се с приносителите на Bisq за помощ.\n\nСледните файлове бяха възстановени от резервно копие:
