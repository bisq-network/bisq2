tac.risk.headline=Разберете рисковете
tac.risk.p2p.title=Децентрализирано Peer-to-Peer софтуер
tac.risk.p2p.body=Търговията се извършва директно между потребителите. Разработчиците на Bisq, участниците и Bisq DAO не контролират средствата на потребителите и не могат да гарантират, че сделките ще завършат успешно или че загубите могат да бъдат възстановени.
tac.risk.financial.title=Финансови, технически и регулаторни рискове
tac.risk.financial.body=Използването на Bisq 2 включва финансови, технически и регулаторни рискове, включително частична или пълна загуба на средства. Уязвимости в софтуера, измами, обратими плащания, инциденти със сигурността и регулаторни действия могат да доведат до непоправими загуби.
tac.risk.noGuarantees.title=Няма гаранция за възстановяване или компенсация
tac.risk.noGuarantees.body=Решаването на спорове може да помогне в някои ситуации, но възстановяване, компенсация или обезщетение не могат да бъдат гарантирани. Потребителите остават отговорни за своите сделки, плащания и местни данни.
tac.risk.confirm.headline=Моля, потвърдете следното:
tac.risk.accept.loss=Използването на Bisq 2 може да доведе до частична или пълна загуба на средства.
tac.risk.accept.noRecovery=Възстановяване, възстановяване на средства или компенсация не са гарантирани.


tac.legal.headline=Правни условия
tac.legal.section1.title=Отказ от гаранция и ограничения на отговорността
tac.legal.section1.body=Bisq 2 е безплатен и с отворен код софтуер, публикуван под GNU Affero General Public License. В максималната степен, разрешена от приложимото право, софтуерът се предоставя на принципа "както е" и "както е наличен", без гаранции или представяния от какъвто и да е вид, включително търговска годност, пригодност за конкретна цел, заглавие, ненарушаване, наличност, точност, сигурност или безгрешна работа.\nС изключение на случаи на намерение, груба небрежност, лична вреда или когато отговорността не може да бъде изключена съгласно приложимото право, нито един носител на авторски права, разработчик, сътрудник, участник в Bisq DAO, медиатор, арбитър, агент за възстановяване или друг участник в проекта не носи отговорност за щети, произтичащи от използването, невъзможността за използване или неизправност на софтуера. Това включва, без ограничение, загуба на средства, цифрови активи, печалби, данни, търговски възможности, добра воля, софтуерни дефекти, уязвимости в сигурността, провали на протоколи, неточни данни, измама, обратни плащания или атаки от трети страни, дори ако е било уведомено за възможността за такива щети.
tac.legal.section2.title=Отговорност на потребителя и липса на съвет
tac.legal.section2.body=Потребителите носят изцяло отговорност за използването на софтуера и за осигуряване, че тяхното използване не нарушава приложимите закони, разпоредби, данъчни задължения или изисквания за отчетност в тяхната юрисдикция. Bisq не предоставя финансови, инвестиционни, данъчни, правни или регулаторни съвети. Потребителите са отговорни за вземането на собствените си решения и за получаването на независими съвети, когато е уместно.
tac.legal.section3.title=Информация и инфраструктура
tac.legal.section3.body=Цените на пазара, оценките на таксите, данните за мрежата, съобщенията между потребителите, офертите и друга информация може да са неточни, непълни, забавени, недостъпни или предоставени от трети страни или инфраструктура, управлявана от приносителите на Bisq DAO. Потребителите носят отговорност за независимо проверяване на цялата информация, преди да разчитат на нея.
tac.legal.section4.title=Рискове при външни плащания
tac.legal.section4.body=Фиатните и други външни методи за плащане се обработват извън Bisq 2 и подлежат на правилата, наличността, лимитите, таксите, изискванията за верификация, политиките за връщане на плащания и действията на доставчиците на плащания, банките и други трети страни. Тези методи за плащане могат да включват връщания на плащания, обратни плащания, измами, банкови ограничения, замразяване на акаунти, забавяния или регулаторни действия. Потребителите признават и приемат тези рискове.
tac.legal.section5.title=Ограничения за разрешаване на спорове
tac.legal.section5.body=Споровете, произтичащи от сделки, извършвани чрез софтуера, могат да бъдат разгледани чрез процеса за разрешаване на спорове на Bisq в съответствие с процедурите, публикувани от проекта Bisq 2 в момента на спора. Разрешаването на спорове не е гаранция за възстановяване, компенсация, принуждаване или обезщетение и може да не е налично при всички обстоятелства. Bisq DAO, разработчиците, приносителите, медиаторите, арбитрите, агентите за възстановяване и другите участници в проекта нямат задължение да компенсират потребителите за загуби от търговия, уязвимости в софтуера, инциденти със сигурността, измами или други щети.
tac.legal.section6.title=Няма роля на попечител или посредник
tac.legal.section6.body=Bisq 2 е децентрализирано софтуерно приложение за peer-to-peer, разработено и поддържано чрез модел на управление с отворен код, известен като Bisq DAO. Няма централна единица, която да контролира мрежата, да държи средства на потребителите, да действа като брокер, борса, платежен процесор, агент по ескроу, фидуциар или контрагент на сделки, нито да гарантира наличността, функционирането или бъдещото развитие на софтуера.
tac.legal.section7.title=Поверителност и локални данни
tac.legal.section7.body=Потребителите са отговорни за защитата на локалните данни на приложението, паролите, идентификационните ключове, информацията за платежната сметка и записите на сделките. Детайлите за сделките и плащанията могат да бъдат споделяни с търговските партньори и, ако бъде открит спор, с медиатори, арбитри, агенти за възстановяване или други участници, ангажирани в процеса на разрешаване на спора.
tac.legal.confirm=Прочетох и приемам тези условия.


