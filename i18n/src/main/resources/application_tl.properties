tac.risk.headline=Unawain ang mga Panganib
tac.risk.p2p.title=Desentralisadong Software ng Peer-to-Peer
tac.risk.p2p.body=Ang mga kalakalan ay isinasagawa nang direkta sa pagitan ng mga gumagamit. Ang mga developer ng Bisq, mga kontribyutor, at ang Bisq DAO ay hindi kumokontrol sa mga pondo ng gumagamit at hindi makapaggarantiya na ang mga kalakalan ay matatapos nang matagumpay o na ang mga pagkalugi ay maaaring mabawi.
tac.risk.financial.title=Panganib sa Pinansyal, Teknikal, at Regulasyon
tac.risk.financial.body=Ang paggamit ng Bisq 2 ay may kasamang mga panganib sa pananalapi, teknikal, at regulasyon, kabilang ang bahagyang o kabuuang pagkawala ng pondo. Ang mga kahinaan sa software, pandaraya, mga pagbaligtad ng pagbabayad, mga insidente sa seguridad, at mga aksyon ng regulasyon ay maaaring magresulta sa mga pagkawala na hindi maibabalik.
tac.risk.noGuarantees.title=Walang Garantiya ng Pagbawi o Kompensasyon
tac.risk.noGuarantees.body=Ang resolusyon ng alitan ay maaaring makatulong sa ilang sitwasyon, ngunit ang pagbawi, reimbursement, o kompensasyon ay hindi maaaring garantisahin. Mananatiling responsable ang mga gumagamit para sa kanilang mga kalakalan, pagbabayad, at lokal na data.
tac.risk.confirm.headline=Mangyaring kilalanin ang mga sumusunod:
tac.risk.accept.loss=Ang paggamit ng Bisq 2 ay maaaring magresulta sa bahagyang o kabuuang pagkawala ng pondo.
tac.risk.accept.noRecovery=Ang pagbawi, pagbabayad, o kompensasyon ay hindi garantisado.


tac.legal.headline=Mga Legal na Tuntunin
tac.legal.section1.title=Pagtatanggi ng Warranty at Mga Limitasyon ng Pananagutan
tac.legal.section1.body=Ang Bisq 2 ay isang libreng software na open-source na inilabas sa ilalim ng GNU Affero General Public License. Sa pinakamalawak na lawak na pinapayagan ng naaangkop na batas, ang software ay ibinibigay sa isang "as is" at "as available" na batayan, nang walang mga warranty o representasyon ng anumang uri, kabilang ang kakayahang ibenta, pagiging angkop para sa isang partikular na layunin, titulo, hindi paglabag, pagkakaroon, katumpakan, seguridad, o walang error na operasyon.\nMaliban sa mga kaso ng intensyon, malupit na kapabayaan, personal na pinsala, o kung saan ang pananagutan ay hindi maaaring ibukod sa ilalim ng naaangkop na batas, walang may hawak ng copyright, developer, contributor, kalahok ng Bisq DAO, tagapamagitan, arbitrador, ahente ng refund, o iba pang kalahok sa proyekto ang mananagot para sa mga pinsala na nagmumula sa paggamit ng, kawalang kakayahan na gumamit, o malfunction ng software. Kasama dito, nang walang limitasyon, ang pagkawala ng pondo, digital assets, kita, data, mga pagkakataon sa kalakalan, goodwill, mga depekto sa software, mga kahinaan sa seguridad, mga pagkabigo ng protocol, hindi tumpak na data, pandaraya, mga pagbabalik ng pagbabayad, o mga pag-atake ng third-party, kahit na pinayuhan tungkol sa posibilidad ng mga ganitong pinsala.
tac.legal.section2.title=Responsibilidad ng Gumagamit at Walang Payo
tac.legal.section2.body=Ang mga gumagamit ay may buong pananagutan para sa kanilang paggamit ng software at para sa pagtiyak na ang kanilang paggamit ay hindi lumalabag sa mga naaangkop na batas, regulasyon, obligasyong buwis, o mga kinakailangan sa pag-uulat sa kanilang hurisdiksyon. Ang Bisq ay hindi nagbibigay ng pinansyal, pamumuhunan, buwis, legal, o regulasyong payo. Ang mga gumagamit ay may pananagutan sa paggawa ng kanilang sariling mga desisyon at pagkuha ng independiyenteng payo kung kinakailangan.
tac.legal.section3.title=Impormasyon at Inprastruktura
tac.legal.section3.body=Ang mga presyo sa merkado, pagtataya ng bayad, datos ng network, mensahe mula sa mga kapwa, mga alok, at iba pang impormasyon ay maaaring hindi tumpak, hindi kumpleto, naantala, hindi magagamit, o ibinibigay ng mga third party o imprastruktura na pinapatakbo ng mga kontribyutor sa Bisq DAO. Ang mga gumagamit ay responsable sa independiyenteng pag-verify ng lahat ng impormasyon bago umasa dito.
tac.legal.section4.title=Mga Panganib sa Panlabas na Pagbabayad
tac.legal.section4.body=Ang Fiat at iba pang mga panlabas na paraan ng pagbabayad ay pinoproseso sa labas ng Bisq 2 at napapailalim sa mga patakaran, availability, limitasyon, bayad, mga kinakailangan sa pag-verify, mga patakaran sa chargeback, at mga aksyon ng mga provider ng pagbabayad, mga bangko, at iba pang mga third party. Ang mga paraan ng pagbabayad na ito ay maaaring magsangkot ng mga chargeback, pag-reverse ng pagbabayad, pandaraya, mga restriksyon sa pagbabangko, pagyeyelo ng account, mga pagkaantala, o mga aksyon ng regulasyon. Kinilala at tinanggap ng mga gumagamit ang mga panganib na ito.
tac.legal.section5.title=Hangganan ng Resolusyon ng Alitan
tac.legal.section5.body=Ang mga hindi pagkakaunawaan na nagmumula sa mga kalakalan na isinagawa sa pamamagitan ng software ay maaaring hawakan sa pamamagitan ng proseso ng resolusyon ng hindi pagkakaunawaan ng Bisq alinsunod sa mga pamamaraan na inilathala ng proyekto ng Bisq 2 sa oras ng hindi pagkakaunawaan. Ang resolusyon ng hindi pagkakaunawaan ay hindi isang garantiya ng pagbawi, pagbabayad, pagpapatupad, o kompensasyon, at maaaring hindi magagamit sa lahat ng pagkakataon. Ang Bisq DAO, mga developer, mga kontribyutor, mga tagapamagitan, mga arbitrador, mga ahente ng refund, at iba pang mga kalahok sa proyekto ay walang obligasyon na bayaran ang mga gumagamit para sa mga pagkalugi sa kalakalan, mga kahinaan sa software, mga insidente sa seguridad, pandaraya, o iba pang mga pinsala.
tac.legal.section6.title=Walang Custody o Papel ng Tagapamagitan
tac.legal.section6.body=Ang Bisq 2 ay desentralisadong peer-to-peer na software na binuo at pinanatili sa pamamagitan ng isang open-source governance model na kilala bilang Bisq DAO. Walang sentral na entidad na kumokontrol sa network, humahawak ng pag-aari ng mga pondo ng gumagamit, kumikilos bilang broker, palitan, processor ng pagbabayad, ahente ng escrow, fiduciary, o counterparty sa mga kalakalan, o ginagarantiyahan ang pagkakaroon, operasyon, o hinaharap na pag-unlad ng software.
tac.legal.section7.title=Pribasiya at Lokal na Data
tac.legal.section7.body=Ang mga gumagamit ay responsable sa pagprotekta ng kanilang lokal na data ng application, mga password, mga susi ng pagkakakilanlan, impormasyon ng account sa pagbabayad, at mga tala ng kalakalan. Ang mga detalye ng kalakalan at pagbabayad ay maaaring ibahagi sa mga kapwa nagkalakal at, kung mayroong dispute na binuksan, sa mga tagapamagitan, arbitrador, mga ahente ng refund, o iba pang mga kalahok na kasangkot sa proseso ng paglutas ng dispute.
tac.legal.confirm=Nabasa ko at tinatanggap ang mga terminong ito.


