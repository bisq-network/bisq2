contactsList.table.columns.actionsMenu.removeContact=Sigurado ka bang nais mong tanggalin ang contact na ito?\n\nSa pagtanggal ng contact, anumang tag, trust score o tala na nauugnay sa peer na ito ay permanenteng matatanggal din.

contactsList.introPreface=Bago sa Mga Contact?
contactsList.introHeadline=Narito kung paano ito gumagana

contactsList.introMain=Ang Mga Contact ay tumutulong sa iyo na makilala ang mga pinagkakatiwalaang kapwa at maiwasan ang impersonation.\nMatapos ang isang matagumpay na kalakalan, maaari kang magdagdag ng isang gumagamit upang matiyak na ang mga susunod na interaksyon ay kasama ang parehong tao.

contactsList.introDetails=Bakit ito mahalaga:\nAng Bisq2 ay tumutulong na protektahan laban sa impersonation gamit ang apat na elemento ng profile: ID ng profile, Nym, icon ng profile, at palayaw.\nGayunpaman, ang mga profile ay tinatanggal mula sa network pagkatapos ng 15 araw ng kawalang-aktibidad. Kapag natanggal na, maaaring muling likhain ng ibang tao ang isang profile gamit ang parehong palayaw at gawing impersonate ang gumagamit na iyon.\nUpang mabawasan ang panganib na ito, awtomatikong idinadagdag ng Bisq2 ang mga gumagamit na nakikipag-ugnayan ka sa iyong listahan ng mga contact.\nMaaari mong i-disable ito sa Mga Setting > Higit pang mga opsyon > "Awtomatikong magdagdag ng mga contact".

contactsList.table.tableInfo.title=Bago sa Mga Kontak? Narito ang buod kung paano ito gumagana
contactsList.table.tableInfo.content=Ang Mga Kontak ay isang maraming gamit na tool na nagdaragdag ng bagong layer ng proteksyon sa seguridad sa pamamagitan ng pagpapahintulot sa iyo na subaybayan ang iyong mga kasama.\n\nHalimbawa, upang maiwasan ang pagpapanggap ng user, pagkatapos makumpleto ang isang matagumpay na kalakalan sa isang tao, maaari mong idagdag ang user na ito upang matiyak na sa susunod na makipag-ugnayan ka ay talagang iyon din ang user.\n\nAng Bisq2 ay nagbibigay na ng seguridad laban sa pagpapanggap sa pamamagitan ng paggamit ng apat na elemento na bumubuo ng profile ng user: profile ID, Nym, profile icon at nickname. Gayunpaman, ang mga profile ay tinatanggal sa network pagkatapos ng 15 araw ng kawalan ng aktibidad. Kapag naalis na ang profile, ang isang mapaminsalang aktor ay maaaring lumikha ng bagong profile na may parehong nickname sa pagtatangka na magpanggap sa user na iyon.\n\nPinasimple namin ang prosesong ito para sa iyo sa pamamagitan ng awtomatikong pagdaragdag sa listahang ito ng lahat ng user na iyong kinakausap habang ginagamit mo ang app. Maaari mong i-off ito sa pamamagitan ng paggamit ng "Awtomatikong magdagdag ng mga kontak" na opsyon sa menu ng "Mga Setting" > seksyon ng "Higit pang mga opsyon".
