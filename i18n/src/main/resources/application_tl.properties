restoreFromBackup.headline=Mga File na Naibalik mula sa Backup
restoreFromBackup.info=Sa pagsisimula, natukoy ng sistema na ang ilang mga persistent na file ay nasira o hindi mabasa.\nUpang matiyak na ang application ay nananatiling nasa wastong estado, ang pinakabagong available na backups ay awtomatikong naibalik.\n\nPakisuri ang iyong mga bukas na kalakalan upang matiyak na nasa inaasahang estado ang mga ito.\nKung makakita ka ng anumang hindi pagkakatugma o makakaranas ng mga isyu, makipag-ugnayan sa mga kontribyutor ng Bisq para sa tulong.\n\nAng mga sumusunod na tindahan ay naibalik mula sa backup:
