updater.downloadAndVerify.info.isLauncherUpdate=Kapag na-download na ang lahat ng mga file, ang signing key ay ikinumpara sa mga key na ibinigay sa aplikasyon at sa mga available sa website ng Bisq. Ang key na ito ay gagamitin upang i-verify ang na-download na bagong installer ng Bisq. Matapos makumpleto ang pag-download at pag-verify, mag-navigate sa direktoryo ng pag-download upang i-install ang bagong bersyon ng Bisq.
