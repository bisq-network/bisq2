tac.headline=Uporabniški sporazum
tac.confirm=Prebral sem in razumel
tac.accept=Sprejmi uporabniški sporazum
tac.reject=Zavrni in zapusti

tac.risk.headline=Razumite tveganja
tac.risk.p2p.title=Decentralizirana programska oprema za peer-to-peer
tac.risk.p2p.body=Trgovine se izvajajo neposredno med uporabniki. Razvijalci Bisq, prispevki in Bisq DAO ne nadzorujejo uporabniških sredstev in ne morejo zagotoviti, da bodo trgovine uspešno zaključene ali da se lahko izgube povrnejo.
tac.risk.financial.title=Finančna, tehnična in regulativna tveganja
tac.risk.financial.body=Uporaba Bisq 2 vključuje finančna, tehnična in regulativna tveganja, vključno s parcialno ali popolno izgubo sredstev. Programske ranljivosti, goljufije, preklici plačil, varnostni incidenti in regulativni ukrepi lahko privedejo do nepovratnih izgub.
tac.risk.noGuarantees.title=Brez garancije za obnovitev ali odškodnino
tac.risk.noGuarantees.body=Reševanje sporov lahko pomaga v nekaterih situacijah, vendar okrevanje, povračilo ali odškodnina ne morejo biti zagotovljeni. Uporabniki ostajajo odgovorni za svoje trgovine, plačila in lokalne podatke.
tac.risk.confirm.headline=Prosimo, potrdite naslednje:
tac.risk.accept.loss=Uporaba Bisq 2 lahko povzroči delno ali popolno izgubo sredstev.
tac.risk.accept.noRecovery=Obnova, povračilo ali odškodnina nista zagotovljena.


tac.legal.headline=Pravni pogoji
tac.legal.section1.title=Zavrnitev garancije in omejitve odgovornosti
tac.legal.section1.body=Bisq 2 je brezplačna in odprtokodna programska oprema, izdana pod GNU Affero General Public License. V največji možni meri, ki jo dovoljuje veljavna zakonodaja, se programska oprema zagotavlja na osnovi "takšna, kot je" in "na voljo", brez kakršnih koli jamstev ali predstavitev, vključno z tržljivostjo, primernostjo za določen namen, lastništvom, nekršitvijo, razpoložljivostjo, natančnostjo, varnostjo ali breznapaknim delovanjem.\nRazen v primerih namena, hude malomarnosti, telesnih poškodb ali tam, kjer odgovornost ni mogoče izključiti po veljavnem pravu, noben imetnik avtorskih pravic, razvijalec, prispevalec, udeleženec Bisq DAO, mediator, arbiter, agent za vračilo ali drug udeleženec projekta ne bo odgovoren za škodo, ki izhaja iz uporabe, nezmožnosti uporabe ali okvare programske opreme. To vključuje, vendar ni omejeno na, izgubo sredstev, digitalnih sredstev, dobička, podatkov, trgovinskih priložnosti, dobrega imena, napak v programski opremi, varnostnih ranljivosti, napak protokola, netočnih podatkov, goljufij, povratkov plačil ali napadov tretjih oseb, tudi če je bila opozorjena na možnost takšne škode.
tac.legal.section2.title=Odgovornost uporabnika in brez nasvetov
tac.legal.section2.body=Uporabniki so izključno odgovorni za uporabo programske opreme in za zagotavljanje, da njihova uporaba ne krši veljavnih zakonov, predpisov, davčnih obveznosti ali poročilnih zahtev v njihovi jurisdikciji. Bisq ne nudi finančnih, investicijskih, davčnih, pravnih ali regulativnih nasvetov. Uporabniki so odgovorni za sprejemanje lastnih odločitev in pridobivanje neodvisnih nasvetov, kjer je to primerno.
tac.legal.section3.title=Informacije in infrastruktura
tac.legal.section3.body=Tržne cene, ocene provizij, podatki o omrežju, sporočila med uporabniki, ponudbe in druge informacije so lahko netočne, nepopolne, zamujene, nedostopne ali zagotovljene s strani tretjih oseb ali infrastrukture, ki jo upravljajo prispevki v Bisq DAO. Uporabniki so odgovorni za neodvisno preverjanje vseh informacij, preden se nanje zanašajo.
tac.legal.section4.title=Tveganja zunanjih plačil
tac.legal.section4.body=Fiat in druge zunanje plačilne metode se obdelujejo zunaj Bisq 2 in so predmet pravil, razpoložljivosti, omejitev, provizij, zahtev po preverjanju, politik povračila in dejanj ponudnikov plačil, bank in drugih tretjih oseb. Te plačilne metode lahko vključujejo povračila, vračila plačil, goljufije, bančne omejitve, zamrznitve računov, zamude ali regulativne ukrepe. Uporabniki priznavajo in sprejemajo ta tveganja.
tac.legal.section5.title=Omejitve reševanja sporov
tac.legal.section5.body=Spori, ki izhajajo iz trgovin, opravljenih preko programske opreme, se lahko obravnavajo preko postopka reševanja sporov Bisq v skladu s postopki, objavljenimi s strani projekta Bisq 2 ob času spora. Reševanje sporov ni garancija za povrnitev, nadomestilo, izvršitev ali odškodnino in morda ni na voljo v vseh okoliščinah. Bisq DAO, razvijalci, prispevki, mediatorji, arbitri, agenti za vračilo in drugi udeleženci projekta niso dolžni odškodovati uporabnikov za izgube pri trgovanju, ranljivosti programske opreme, varnostne incidente, goljufije ali druge škode.
tac.legal.section6.title=Brez hrambe ali posredniške vloge
tac.legal.section6.body=Bisq 2 je decentralizirana programska oprema za peer-to-peer, ki jo razvija in vzdržuje odprt model upravljanja, znan kot Bisq DAO. Nobena osrednja entiteta ne nadzira omrežja, ne hrani sredstev uporabnikov, ne deluje kot posrednik, borza, plačilni procesor, agent za depozit, fiduciar ali nasprotna stranka pri trgovanju, niti ne jamči za razpoložljivost, delovanje ali prihodnji razvoj programske opreme.
tac.legal.section7.title=Zasebnost in lokalni podatki
tac.legal.section7.body=Uporabniki so odgovorni za zaščito svojih lokalnih podatkov aplikacije, gesel, identitetnih ključev, informacij o plačilnem računu in evidenc trgovin. Podrobnosti o trgovinah in plačilih se lahko delijo s trgovinskimi partnerji in, če je odprt spor, z mediatorji, arbitri, agenti za vračilo ali drugimi udeleženci, vključenimi v postopek reševanja sporov.
tac.legal.confirm=Prebral sem in sprejemam te pogoje.


