updater.downloadAndVerify.info.isLauncherUpdate=Ko so vse datoteke prenesene, se podpisni ključ primerja s ključi, ki so na voljo v aplikaciji in tistimi, ki so na voljo na spletni strani Bisq. Ta ključ se nato uporabi za preverjanje prenesenega novega namestitvenega programa Bisq. Ko sta prenos in preverjanje zaključena, pojdite v imenik za prenos, da namestite novo različico Bisq.
