bisqEasy.tradeGuide.process.headline=бһңбһ·бһ’бһёбһҠбҹӮбһӣбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһҷбҹүбһ¶бһ„бһҠбһјбһ…бһҳбҹ’бһҸбҹҒбһ…?
bisqEasy.tradeGuide.process.content=бһ“бҹ…бһ–бҹҒбһӣбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҷбһҖбһҖбһ¶бһҡбһ•бҹ’бһҸбһӣбҹӢбһҮбһјбһ“ бһўбҹ’бһ“бһҖбһ“бһ№бһ„бһҳбһ¶бһ“бһ—бһ¶бһ–бһўбһ¶бһ…бһ”бһҸбҹӢбһ”бҹӮбһ“бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҮбҹ’бһҡбһҫбһҹбһҡбһҫбһҹбһ–бһёбһҮбһҳбҹ’бһҡбһҫбһҹбһҠбҹӮбһӣбһҳбһ¶бһ“бһҹбҹ’бһҡбһ¶бһ”бҹӢбһҠбҹӮбһӣбһ•бҹ’бһҸбһӣбҹӢбһҠбҹ„бһҷбһҖбһ¶бһҡбһ•бҹ’бһҸбһӣбҹӢбһҮбһјбһ“бҹ” бһҳбһ»бһ“бһ“бһ№бһ„бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡ бһўбҹ’бһ“бһҖбһ“бһ№бһ„бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бһ„бҹ’бһ бһ¶бһүбһ“бһјбһңбһ‘бһ·бһҠбҹ’бһӢбһ—бһ¶бһ–бһ‘бһјбһ‘бҹ…бһҹбһ„бҹ’бһҒбҹҒбһ”бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бһҡбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбҹ”\nбһҳбһҪбһҷбһҠбһ„бһҠбҹӮбһӣбһ”бһ¶бһ“бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡ бһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ“бһ№бһ„бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһҺбҹӮбһ“бһ¶бҹҶбһҠбҹ„бһҷбһўбһ“бҹ’бһҸбһҡбһҖбһҳбҹ’бһҳбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһҸбһ¶бһҳбһҠбһ¶бһ“бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡ бһҠбҹӮбһӣбһҳбһ¶бһ“бһҮбҹҶбһ бһ¶бһ“бһҠбһјбһ…бһҸбһ‘бҹ…бҹ–

bisqEasy.tradeGuide.process.steps=- бһўбҹ’бһ“бһҖбһӣбһҖбҹӢ бһ“бһ·бһ„бһўбҹ’бһ“бһҖбһ‘бһ·бһүбһ”бҹ’бһҸбһјбһҡбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһӮбһҺбһ“бһёбҹ” бһўбҹ’бһ“бһҖбһӣбһҖбҹӢбһ•бҹ’бһүбһҫбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ‘бһјбһ‘бһ¶бһҸбҹӢбһҡбһ”бһҹбҹӢбһ–бһҪбһҖбһӮбҹҒ (бһ§. бһӣбҹҒбһҒбһӮбһҺбһ“бһёбһ’бһ“бһ¶бһӮбһ¶бһҡ) бһ‘бҹ…бһўбҹ’бһ“бһҖбһ‘бһ·бһү бһ бһҫбһҷбһўбҹ’бһ“бһҖбһ‘бһ·бһүбһ•бҹ’бһүбһҫбһўбһ¶бһҹбһҷбһҠбҹ’бһӢбһ¶бһ“ Bitcoin бһҡбһ”бһҹбҹӢбһ–бһҪбһҖбһӮбҹҒ (бһ¬бһңбһ·бһҖбҹ’бһҖбһҷбһ”бһҸбҹ’бһҡ Lightning) бһ‘бҹ…бһўбҹ’бһ“бһҖбһӣбһҖбҹӢбҹ”\n- бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҳбһҖ бһўбҹ’бһ“бһҖбһ‘бһ·бһүбһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҖбһ¶бһҡбһ‘бһјбһ‘бһ¶бһҸбҹӢ Fiat бһ‘бҹ…бһӮбһҺбһ“бһёбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһӣбһҖбҹӢбҹ” бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҖбһ¶бһҡбһ‘бһјбһ‘бһ¶бһҸбҹӢ бһ“бһ·бһ„бһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢбһҗбһ¶бһӣбҹҒбһҒбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһҮбһҪбһүбһҠбһјбһҡ (Trade ID) бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң бһўбҹ’бһ“бһҖбһӣбһҖбҹӢбһ“бһ№бһ„бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҖбһ¶бһҡбһ‘бһ‘бһҪбһӣбҹ”\n- бһўбҹ’бһ“бһҖбһӣбһҖбҹӢбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҳбһҖбһ•бҹ’бһүбһҫ Bitcoin бһ‘бҹ…бһўбһ¶бһҹбһҷбһҠбҹ’бһӢбһ¶бһ“бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһ‘бһ·бһү бһ бһҫбһҷбһ…бҹӮбһҖбһҡбҹҶбһӣбҹӮбһҖбһӣбҹҒбһҒбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡ (бһ¬бһҮбһ¶бһҮбһҳбҹ’бһҡбһҫбһҹбһӣбҹҒбһҒбһҖбһјбһҠбһҳбһ»бһ“бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһ”бҹ’бһҡбһҫ Lightning)бҹ” бһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ“бһ№бһ„бһҳбһҫбһӣбһғбһҫбһүбһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбҹ” бһ“бҹ…бһ–бҹҒбһӣбһҠбҹӮбһӣбһ”бһ¶бһ“бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢ бһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡбһ“бҹҒбҹҮбһ”бһ¶бһ“бһ”бһүбҹ’бһ…бһ”бҹӢбһҠбҹ„бһҷбһҮбҹ„бһӮбһҮбҹҗбһҷбҹ”

bisqEasy.tradeGuide.rules.headline=бһҸбһҫбһҒбҹ’бһүбһ»бҹҶбһҸбҹ’бһҡбһјбһңбһҠбһ№бһ„бһўбҹ’бһңбһёбһҒбҹ’бһӣбҹҮбһўбҹҶбһ–бһёбһ…бҹ’бһ”бһ¶бһ”бҹӢбһҮбһҪбһүбһҠбһјбһҡ?
bisqEasy.tradeGuide.rules.content=- бһҳбһ»бһ“бһ–бҹҒбһӣбһ•бҹ’бһ‘бҹҒбһҡбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһӮбһҺбһ“бһёбһҡбһңбһ¶бһ„бһўбҹ’бһ“бһҖбһӣбһҖбҹӢбһ“бһ·бһ„бһўбҹ’бһ“бһҖбһ‘бһ·бһү бһӮбһҺбһ“бһёбһҺбһ¶бһҳбһҪбһҷбһўбһ¶бһ…бһӣбһ»бһ”бһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡбһ”бһ¶бһ“бһҠбҹ„бһҷбһҳбһ·бһ“бһ…бһ¶бҹҶбһ”бһ¶бһ…бҹӢбһ•бҹ’бһҸбһӣбҹӢбһўбһҸбҹ’бһҗбһ¶бһ’бһ·бһ”бҹ’бһ”бһ¶бһҷбҹ”\n- бһўбҹ’бһ“бһҖбһҮбһҪбһүбһҠбһјбһҡбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡбһҡбһ”бһҹбҹӢбһ–бһҪбһҖбһӮбҹҒбһҮбһ¶бһ”бҹ’бһҡбһ…бһ¶бҹҶбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҹбһ¶бһҡбһҗбҹ’бһҳбһё бһ бһҫбһҷбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһҶбҹ’бһӣбһҫбһҷбһҸбһ”бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ 24 бһҳбҹүбҹ„бһ„бҹ”\n- бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһ”бһ¶бһ“бһ•бҹ’бһ‘бҹҒбһҡбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһӮбһҺбһ“бһё бһҖбһ¶бһҡбһҳбһ·бһ“бһ”бҹҶбһ–бҹҒбһүбһҖбһ¶бһҸбһ–бҹ’бһңбһҖбһ·бһ…бҹ’бһ…бһҮбһҪбһүбһҠбһјбһҡ бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ…бһ¶бһҸбҹӢбһ‘бһ»бһҖбһҗбһ¶бһҮбһ¶бһҖбһ¶бһҡбһ”бҹҶбһ–бһ¶бһ“бһӣбһҫбһҖбһ·бһ…бҹ’бһ…бһҹбһ“бҹ’бһҷбһ¶бһҮбһҪбһүбһҠбһјбһҡ бһ бһҫбһҷбһўбһ¶бһ…бһ“бһ¶бҹҶбһІбҹ’бһҷбһҳбһ¶бһ“бһҖбһ¶бһҡбһ”бһҠбһ·бһҹбҹҒбһ’бһ–бһёбһ”бһҺбҹ’бһҸбһ¶бһү Bisqбҹ” бһ“бҹҒбҹҮбһҳбһ·бһ“бһўбһ¶бһ…бһўбһ“бһ»бһңбһҸбҹ’бһҸбһ”бһ¶бһ“бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҳбһ·бһҸбҹ’бһҸбһ—бһҖбҹ’бһҸбһ·бһҮбһҪбһүбһҠбһјбһҡбһҳбһ·бһ“бһҶбҹ’бһӣбһҫбһҷбһҸбһ”бҹ”\n- бһ‘бһ»бһҖбһңбһ¶бһӣ 'бһҳбһјбһӣбһ бҹҒбһҸбһ»бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бһҡбһ‘бһјбһ‘бһ¶бһҸбҹӢ' бһ‘бһ‘бҹҒ бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһўбһ¶бһ…; бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҳбһ·бһ“бһўбһ¶бһ… бһҹбһјбһҳбһ”бҹ’бһҡбһҫбһҲбҹ’бһҳбҹ„бҹҮбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбҹ” бһҖбһ»бҹҶбһ”бһүбҹ’бһ…бһјбһӣ 'Bisq' бһ¬ 'Bitcoin'бҹ”\n- бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡбһҳбһ·бһ“бһўбһ¶бһ…бһ”бһүбҹ’бһ…бһ”бҹӢбһ”бһ¶бһ“бһ—бҹ’бһӣбһ¶бһҳбҹ—бһҠбҹ„бһҷбһҹбһ¶бһҡбһ–бҹҒбһӣбһңбҹҒбһӣбһ¶бһ‘бһјбһ‘бһ¶бһҸбҹӢ Fiat бһҷбһјбһҡ бһўбҹ’бһ“бһҖбһҮбһҪбһүбһҠбһјбһҡ бһ‘бһ¶бҹҶбһ„бһ–бһёбһҡбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһҳбһ¶бһ“бһўбһ“бһЎбһ¶бһүбһҷбҹүбһ¶бһ„бһ бҹ„бһ…бһҺбһ¶бһҹбҹӢбһҳбһҪбһҷбһҠбһ„бһҖбҹ’бһ“бһ»бһ„бһҳбһҪбһҷбһҗбҹ’бһ„бҹғ бһҠбһҫбһҳбҹ’бһ”бһёбһҸбһ¶бһҳбһҠбһ¶бһ“бһҖбһ¶бһҡбһҡбһёбһҖбһ…бһҳбҹ’бһҡбһҫбһ“бһ“бҹғбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡбҹ”\n- бһҖбҹ’бһ“бһ»бһ„бһҖбһҡбһҺбһёбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҮбһҪбһүбһҠбһјбһҡбһ”бҹ’бһҡбһҲбһҳбһҳбһ»бһҒбһ“бһ№бһ„бһ”бһүбҹ’бһ бһ¶бһҠбҹӮбһӣбһҳбһ·бһ“бһ”бһ¶бһ“бһҠбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷ бһ–бһҪбһҖбһӮбҹҒбһўбһ¶бһ…бһўбһүбҹ’бһҮбһҫбһүбһўбһ“бҹ’бһҸбһҡбһҖбһ¶бһҡбһёбһ…бһјбһӣбһ‘бҹ…бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҮбһҮбҹӮбһҖбһҮбһҪбһүбһҠбһјбһҡ бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҮбҹҶбһ“бһҪбһҷбҹ”\n\nбһҸбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһҮбҹҶбһ“бһҪбһҷ? бһ…бһјбһӣбһ‘бҹ…бһҖбһ¶бһ“бҹӢбһ”бһ“бҹ’бһ‘бһ”бҹӢбһҮбһҮбҹӮбһҖбһ“бҹ…бһҖбҹ’бһҡбҹ„бһҳбһҳбҹүбһәбһ“бһ»бһҷ 'бһӮбһ¶бҹҶбһ‘бҹ’бһҡ'бҹ” бһҹбһјбһҳбһҮбһҪбһүбһҠбһјбһҡбһҷбҹүбһ¶бһ„бһҹбһ”бҹ’бһ”бһ¶бһҷ!

