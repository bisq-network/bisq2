restoreFromBackup.headline=Bestanden hersteld vanuit back-up
restoreFromBackup.info=Tijdens het opstarten heeft het systeem gedetecteerd dat sommige persistente bestanden beschadigd of onleesbaar waren.\nOm ervoor te zorgen dat de applicatie in een geldige staat blijft, zijn de laatst beschikbare back-ups automatisch hersteld.\n\nControleer alstublieft uw openstaande transacties om te bevestigen dat ze in de verwachte staat zijn.\nAls u inconsistenties opmerkt of problemen ondervindt, neem dan contact op met de Bisq-bijdragers voor hulp.\n\nDe volgende opslagbestanden zijn hersteld vanuit de back-up:
