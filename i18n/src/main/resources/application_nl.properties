tac.risk.headline=Begrijp de risico's
tac.risk.p2p.title=Gedecentraliseerde Peer-to-Peer Software
tac.risk.p2p.body=Transacties worden rechtstreeks tussen gebruikers uitgevoerd. Bisq-ontwikkelaars, bijdragers en de Bisq DAO hebben geen controle over gebruikersfondsen en kunnen niet garanderen dat transacties succesvol worden afgerond of dat verliezen kunnen worden teruggevorderd.
tac.risk.financial.title=Financiële, technische en regelgevende risico's
tac.risk.financial.body=Het gebruik van Bisq 2 brengt financiële, technische en regelgevende risico's met zich mee, waaronder gedeeltelijk of volledig verlies van middelen. Softwarekwetsbaarheden, fraude, terugboekingen, beveiligingsincidenten en regelgevende acties kunnen leiden tot onomkeerbare verliezen.
tac.risk.noGuarantees.title=Geen garantie op herstel of compensatie
tac.risk.noGuarantees.body=Geschillenbeslechting kan in sommige situaties helpen, maar herstel, terugbetaling of compensatie kan niet worden gegarandeerd. Gebruikers blijven verantwoordelijk voor hun transacties, betalingen en lokale gegevens.
tac.risk.confirm.headline=Bevestig alstublieft het volgende:
tac.risk.accept.loss=Het gebruik van Bisq 2 kan resulteren in gedeeltelijk of totaal verlies van middelen.
tac.risk.accept.noRecovery=Herstel, terugbetaling of compensatie is niet gegarandeerd.


tac.legal.headline=Juridische Voorwaarden
tac.legal.section1.title=Garantieafwijzing en aansprakelijkheidslimieten
tac.legal.section1.body=Bisq 2 is gratis en open-source software die is uitgebracht onder de GNU Affero General Public License. Voor zover toegestaan door de toepasselijke wetgeving, wordt de software geleverd op een "zoals het is" en "zoals beschikbaar" basis, zonder garanties of verklaringen van welke aard dan ook, inclusief verhandelbaarheid, geschiktheid voor een bepaald doel, titel, niet-inbreuk, beschikbaarheid, nauwkeurigheid, beveiliging of foutloze werking.\nBehalve in gevallen van opzet, grove nalatigheid, persoonlijk letsel, of waar aansprakelijkheid niet kan worden uitgesloten onder de toepasselijke wetgeving, is geen enkele auteursrechthouder, ontwikkelaar, bijdrager, Bisq DAO-deelnemer, bemiddelaar, arbiter, terugbetalingsagent, of andere projectdeelnemer aansprakelijk voor schade die voortvloeit uit het gebruik van, het onvermogen om te gebruiken, of een storing van de software. Dit omvat, zonder beperking, verlies van fondsen, digitale activa, winst, gegevens, handelsmogelijkheden, goodwill, softwarefouten, beveiligingskwetsbaarheden, protocolstoringen, onnauwkeurige gegevens, fraude, terugboekingen of aanvallen van derden, zelfs als er is geadviseerd over de mogelijkheid van dergelijke schade.
tac.legal.section2.title=Gebruikersverantwoordelijkheid en Geen Advies
tac.legal.section2.body=Gebruikers zijn uitsluitend verantwoordelijk voor hun gebruik van de software en voor het waarborgen dat hun gebruik geen inbreuk maakt op toepasselijke wetten, voorschriften, belastingverplichtingen of rapportagevereisten in hun rechtsgebied. Bisq biedt geen financieel, investerings-, belasting-, juridisch of regulerend advies. Gebruikers zijn verantwoordelijk voor het nemen van hun eigen beslissingen en het verkrijgen van onafhankelijke adviezen waar nodig.
tac.legal.section3.title=Informatie en Infrastructuur
tac.legal.section3.body=Marktprijzen, schattingen van vergoedingen, netwerkinformatie, peerberichten, aanbiedingen en andere informatie kunnen onnauwkeurig, onvolledig, vertraagd, niet beschikbaar of verstrekt door derden of infrastructuur die wordt beheerd door bijdragers aan de Bisq DAO. Gebruikers zijn verantwoordelijk voor het onafhankelijk verifiëren van alle informatie voordat ze erop vertrouwen.
tac.legal.section4.title=Externe betalingsrisico's
tac.legal.section4.body=Fiat en andere externe betaalmethoden worden buiten Bisq 2 verwerkt en zijn onderhevig aan de regels, beschikbaarheid, limieten, vergoedingen, verificatie-eisen, terugboekingsbeleid en acties van betalingsproviders, banken en andere derden. Deze betaalmethoden kunnen terugboekingen, betalingsherroepen, fraude, bankbeperkingen, accountbevriezingen, vertragingen of regelgevende acties met zich meebrengen. Gebruikers erkennen en accepteren deze risico's.
tac.legal.section5.title=Geschillenbeslechting Limieten
tac.legal.section5.body=Geschillen die voortvloeien uit transacties die via de software zijn uitgevoerd, kunnen worden behandeld via het geschillenbeslechtingsproces van Bisq in overeenstemming met de procedures die op het moment van het geschil door het Bisq 2-project zijn gepubliceerd. Geschillenbeslechting is geen garantie voor herstel, terugbetaling, handhaving of compensatie, en is mogelijk niet in alle omstandigheden beschikbaar. De Bisq DAO, ontwikkelaars, bijdragers, bemiddelaars, arbiters, terugbetalingsagenten en andere projectdeelnemers zijn niet verplicht om gebruikers te compenseren voor handelsverliezen, softwarekwetsbaarheden, beveiligingsincidenten, fraude of andere schade.
tac.legal.section6.title=Geen bewaring of intermediair rol
tac.legal.section6.body=Bisq 2 is gedecentraliseerde peer-to-peer software die is ontwikkeld en onderhouden via een open-source governance model dat bekend staat als de Bisq DAO. Geen centrale entiteit controleert het netwerk, houdt toezicht op gebruikersfondsen, fungeert als makelaar, beurs, betalingsverwerker, escrow-agent, fiduciair of tegenpartij bij transacties, of garandeert de beschikbaarheid, werking of toekomstige ontwikkeling van de software.
tac.legal.section7.title=Privacy en lokale gegevens
tac.legal.section7.body=Gebruikers zijn verantwoordelijk voor het beschermen van hun lokale applicatiegegevens, wachtwoorden, identiteitsleutels, informatie over betalingsaccounts en handelsrecords. Handels- en betalingsdetails kunnen worden gedeeld met handelsgenoten en, als er een geschil wordt geopend, met bemiddelaars, arbiters, terugbetalingsagenten of andere deelnemers die betrokken zijn bij het geschiloplossingsproces.
tac.legal.confirm=Ik heb deze voorwaarden gelezen en accepteer ze.


