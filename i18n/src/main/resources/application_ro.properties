restoreFromBackup.headline=Fișiere restaurate din backup
restoreFromBackup.info=În timpul pornirii, sistemul a detectat că unele fișiere persistente erau corupte sau ilegibile.\nPentru a asigura că aplicația rămâne într-o stare validă, cele mai recente backup-uri disponibile au fost restaurate automat.\n\nVă rugăm să revizuiți tranzacțiile dumneavoastră deschise pentru a vă asigura că sunt în starea așteptată.\nDacă observați vreo inconsecvență sau întâmpinați probleme, contactați contributorii Bisq pentru asistență.\n\nUrmătoarele fișiere au fost restaurate din backup:
