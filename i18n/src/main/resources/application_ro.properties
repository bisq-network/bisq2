tac.risk.headline=Înțelegeți riscurile
tac.risk.p2p.title=Software de tip Peer-to-Peer descentralizat
tac.risk.p2p.body=Tranzacțiile se desfășoară direct între utilizatori. Dezvoltatorii Bisq, contributorii și Bisq DAO nu controlează fondurile utilizatorilor și nu pot garanta că tranzacțiile se vor finaliza cu succes sau că pierderile pot fi recuperate.
tac.risk.financial.title=Riscuri financiare, tehnice și de reglementare
tac.risk.financial.body=Utilizarea Bisq 2 implică riscuri financiare, tehnice și de reglementare, inclusiv pierderi parțiale sau totale ale fondurilor. Vulnerabilitățile software-ului, fraudele, anulările de plată, incidentele de securitate și acțiunile de reglementare pot duce la pierderi ireversibile.
tac.risk.noGuarantees.title=Fără garanție de recuperare sau compensație
tac.risk.noGuarantees.body=Rezolvarea disputelor poate ajuta în unele situații, dar recuperarea, rambursarea sau compensația nu pot fi garantate. Utilizatorii rămân responsabili pentru tranzacțiile, plățile și datele locale.
tac.risk.confirm.headline=Vă rugăm să recunoașteți următoarele:
tac.risk.accept.loss=Utilizarea Bisq 2 poate duce la pierderi parțiale sau totale de fonduri.
tac.risk.accept.noRecovery=Recuperarea, rambursarea sau compensația nu sunt garantate.


tac.legal.headline=Termeni legali
tac.legal.section1.title=Declinarea garanției și limitele răspunderii
tac.legal.section1.body=Bisq 2 este un software gratuit și open-source lansat sub Licența Publică Generală GNU Affero. În cea mai mare măsură permisă de legea aplicabilă, software-ul este furnizat pe o bază "așa cum este" și "așa cum este disponibil", fără garanții sau declarații de niciun fel, inclusiv comercializare, adecvare pentru un anumit scop, titlu, neîncălcare, disponibilitate, acuratețe, securitate sau funcționare fără erori.\nExceptând cazurile de intenție, neglijență gravă, vătămare corporală sau în care răspunderea nu poate fi exclusă conform legii aplicabile, niciun deținător de drepturi de autor, dezvoltator, contributor, participant la Bisq DAO, mediator, arbitru, agent de rambursare sau alt participant la proiect nu va fi responsabil pentru daunele rezultate din utilizarea, incapacitatea de a utiliza sau defecțiunea software-ului. Aceasta include, fără a se limita la, pierderi de fonduri, active digitale, profituri, date, oportunități de tranzacționare, bunăvoință, defecte de software, vulnerabilități de securitate, eșecuri de protocol, date inexacte, fraudă, inversări de plată sau atacuri din partea terților, chiar dacă a fost avertizat cu privire la posibilitatea unor astfel de daune.
tac.legal.section2.title=Responsabilitatea utilizatorului și fără sfaturi
tac.legal.section2.body=Utilizatorii sunt pe deplin responsabili pentru utilizarea software-ului și pentru a se asigura că utilizarea acestuia nu încalcă legile, reglementările, obligațiile fiscale sau cerințele de raportare aplicabile în jurisdicția lor. Bisq nu oferă sfaturi financiare, de investiții, fiscale, legale sau de reglementare. Utilizatorii sunt responsabili pentru a lua propriile decizii și pentru a obține sfaturi independente, acolo unde este cazul.
tac.legal.section3.title=Informații și infrastructură
tac.legal.section3.body=Prețurile de piață, estimările de taxe, datele rețelei, mesajele peer, ofertele și alte informații pot fi inexacte, incomplete, întârziate, indisponibile sau furnizate de terți sau infrastructură operată de contributorii la Bisq DAO. Utilizatorii sunt responsabili pentru verificarea independentă a tuturor informațiilor înainte de a se baza pe ele.
tac.legal.section4.title=Riscurile plăților externe
tac.legal.section4.body=Metodele de plată fiat și alte metode externe sunt procesate în afara Bisq 2 și sunt supuse regulilor, disponibilității, limitelor, taxelor, cerințelor de verificare, politicilor de returnare a plăților și acțiunilor furnizorilor de plăți, băncilor și altor terțe părți. Aceste metode de plată pot implica returnări, inversări de plată, fraudă, restricții bancare, înghețarea conturilor, întârzieri sau acțiuni de reglementare. Utilizatorii recunosc și acceptă aceste riscuri.
tac.legal.section5.title=Limitele soluționării disputelor
tac.legal.section5.body=Disputele care apar din tranzacțiile efectuate prin intermediul software-ului pot fi gestionate prin procesul de soluționare a disputelor Bisq, în conformitate cu procedurile publicate de proiectul Bisq 2 la momentul disputei. Soluționarea disputelor nu este o garanție de recuperare, rambursare, executare sau compensație și poate să nu fie disponibilă în toate circumstanțele. Bisq DAO, dezvoltatorii, contributorii, mediatorii, arbitrii, agenții de rambursare și alți participanți la proiect nu au nicio obligație de a compensa utilizatorii pentru pierderile din tranzacții, vulnerabilitățile software-ului, incidentele de securitate, fraudele sau alte daune.
tac.legal.section6.title=Fără rol de custodie sau intermediar
tac.legal.section6.body=Bisq 2 este un software descentralizat peer-to-peer dezvoltat și întreținut printr-un model de guvernanță open-source cunoscut sub numele de Bisq DAO. Nicio entitate centrală nu controlează rețeaua, nu deține custodia fondurilor utilizatorilor, nu acționează ca broker, schimb, procesator de plăți, agent de escrow, fiduciar sau contraparte în tranzacții, și nu garantează disponibilitatea, funcționarea sau dezvoltarea viitoare a software-ului.
tac.legal.section7.title=Confidențialitate și Date Locale
tac.legal.section7.body=Utilizatorii sunt responsabili pentru protejarea datelor aplicației locale, a parolelor, a cheilor de identitate, a informațiilor despre contul de plată și a înregistrărilor de tranzacție. Detaliile tranzacției și ale plății pot fi partajate cu colegii de tranzacționare și, dacă se deschide o dispută, cu mediatorii, arbitrii, agenții de rambursare sau alți participanți implicați în procesul de soluționare a disputelor.
tac.legal.confirm=Am citit și accept aceste condiții.


