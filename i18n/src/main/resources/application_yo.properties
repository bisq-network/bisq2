restoreFromBackup.headline=Àwọn fáìlì tí a tún gba láti àtúnṣe
restoreFromBackup.info=Nígbà ìbẹ̀rẹ̀, eto naa rí i pé diẹ ninu àwọn fáìlì tó péye ti bajẹ́ tàbí kò lè ka.\nLáti jẹ́ kó dájú pé ohun elo naa wa nínú ipò tó tọ́, àwọn àpamọ́ tó wà nípò tuntun ni a tún ṣe àtúnṣe laifọwọ́si.\n\nJọwọ ṣe àyẹ̀wò àwọn òwò rẹ tó ṣí sílẹ̀ láti jẹ́risi pé wọ́n wà nínú ipò tó yẹ.\nTí o bá rí i pé ohunkóhun kò bá a mu tàbí tí o bá ní ìṣòro, kan si àwọn olùkópa Bisq fún ìrànlọ́wọ́.\n\nÀwọn ibi ìtajà tó tẹ̀síwájú ni a tún ṣe àtúnṣe láti àtúnṣe:
