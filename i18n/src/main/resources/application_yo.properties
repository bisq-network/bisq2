tac.risk.headline=Mọ̀ àwọn Ẹ̀tọ́
tac.risk.p2p.title=Sọfitiwia Aládàáṣiṣẹ́ P2P ti a ko ni ààbò
tac.risk.p2p.body=Àwọn òwò ni a ṣe taara láàárín àwọn olumulo. Àwọn olùdàṣẹ Bisq, àwọn tó ń kópa, àti Bisq DAO kò ni iṣakoso owó àwọn olumulo àti kò le jẹ́risi pé àwọn òwò yóò pari ni aṣeyọrí tàbí pé a lè gba padà àwọn ìpadà.
tac.risk.financial.title=Ìṣòro Owo, Ẹ̀rọ, àti Ofin
tac.risk.financial.body=Lilo Bisq 2 ni àwọn ewu inawo, imọ-ẹrọ, àti ilana, pẹ̀lú pipadanu apakan tàbí lapapọ ti àwọn owó. Àwọn ailagbara sọfitiwia, ẹ̀tan, àwọn iyipada ìsanwó, àwọn iṣẹlẹ ààbò, àti àwọn ìṣe ilana le fa àwọn pipadanu tí kò le gba padà.
tac.risk.noGuarantees.title=Kò sí ìdánilójú ti ìmúpadà tàbí ìsanwó
tac.risk.noGuarantees.body=Ìdájọ́ ìjìyà lè ràn wá lọ́wọ́ ní diẹ ninu àwọn ipo, ṣùgbọ́n ìpadà, ìsanwó, tàbí ìsanwó kò le jẹ́risi. Àwọn olumulo ni ojúṣe fún àwọn òwò wọn, ìsanwó, àti àwọn data agbegbe.
tac.risk.confirm.headline=Jọwọ jẹ́risi àwọn tó wà ní ìsàlẹ̀:
tac.risk.accept.loss=Lilo Bisq 2 le fa pipadanu apakan tàbí gbogbo owó.
tac.risk.accept.noRecovery=Ìmúlò, ìsanwó, tàbí ìsanpada kò dájú.


tac.legal.headline=Àwọn Ọ̀rọ̀ Ìṣèlú
tac.legal.section1.title=Ìkìlọ̀ àpẹẹrẹ àti Àwọn ìdíyelé ojúṣe
tac.legal.section1.body=Bisq 2 jẹ́ sọfitiwia ọfẹ àti orisun ṣiṣi tí a tu silẹ labẹ́ GNU Affero General Public License. Sí ìwọn tó pọ̀jù tí ofin tó wulo bá gba, sọfitiwia naa ni a fún ni "bí ó ti wà" àti "bí ó ti jẹ́" ìpinnu, láìsí ìdánilójú tàbí àfihàn kankan, pẹ̀lú àfihàn ìṣòwò, ìdáhùn fún ìdí kan, akọ́le, àìlòfò, ìwàláàyè, ìtẹ́lọ́run, ààbò, tàbí iṣẹ́ tó péye.\nYàtọ̀ sí àwọn ọ̀ràn ìfọkànsìn, àìlera tó pọ̀, ìfarapa ẹni, tàbí níbi tí a kò lè yọ̀kúrò ní ìdájọ́ labẹ́ ofin tó wulo, kò sí olùtọ́jú ẹtọ́, olùdásílẹ̀, olùkópa, alágbàrin, onídájọ́, aṣoju ìpadà, tàbí olùkópa míì nínú iṣẹ́ yìí tó lè jẹ́ ẹjọ́ fún ìpalára tó ń bọ́ láti lílo, àìlera láti lílo, tàbí àìṣiṣẹ́ tó péye ti sọfitiwia naa. Èyí ní àfikún, láìsí ìdí, ìpadà owó, àwọn ohun-ini dijital, èrè, data, àǹfààní òwò, ìbáṣepọ̀ rere, àṣìṣe sọfitiwia, àìlera ààbò, ìkuna ìlànà, data tó jẹ́ àìtọ́, ẹ̀tan, ìyípadà ìsanwó, tàbí ikọlu láti ọdọ́ ẹni kẹta, paapaa bí a bá ti sọ fún un nípa àǹfààní ìpalára bẹ́ẹ̀.
tac.legal.section2.title=Ìdájọ́ Olùmúlò àti Kò sí Ìmọ̀ràn
tac.legal.section2.body=Àwọn olumulo ni ẹ̀tọ́ patapata fun ìlò wọn ti sọfitiwia àti fun dájú pé ìlò wọn kò kọ́lu àwọn ofin, àṣẹ, àǹfààní owó-ori, tàbí àwọn ibeere ìjábọ̀ tó wúlò nínú agbègbè wọn. Bisq kò pese ìmọ̀ràn owó, ìdoko-owo, owó-ori, ofin, tàbí ìmúlò àṣẹ. Àwọn olumulo ni ẹ̀tọ́ láti ṣe àṣeyọrí ìpinnu tirẹ̀ àti láti gba ìmọ̀ràn àtọkànwá níbi tó yẹ.
tac.legal.section3.title=Alaye àti Ilé-iṣẹ́
tac.legal.section3.body=Àwọn owó ọjà, ìṣirò owó ìsanwó, data nẹ́tíwọ̀kì, awọn ifiranṣẹ́ alábàáṣiṣẹ́, ìfilọ́lẹ̀, àti alaye míì lè jẹ́ aṣiṣe, kò péye, pẹ́, ko sí, tàbí pé a fi ẹlòmíì tàbí amáyédẹrùn tí àwọn olùkópa Bisq DAO nṣiṣẹ́. Àwọn olumulo ni ojúṣe láti jẹ́risi gbogbo alaye ní ìtọ́kasi ṣáájú kí wọ́n tó fi ẹ̀sùn kàn án.
tac.legal.section4.title=Ìṣòro Ìsanwó Àtẹ̀yìnwá
tac.legal.section4.body=Owó fiat àti àwọn ọna ìsanwó àtọkànwá míì ni a nṣe ni ita Bisq 2, wọn sì jẹ́ ti àwọn ofin, ìwàláàyè, ààlà, owó ìsanwó, àwọn ibeere ìjẹ́rìí, àwọn ìlànà ìpadà, àti àwọn ìṣe ti àwọn olùpese ìsanwó, àwọn banki, àti àwọn ẹgbẹ́ kẹta míì. Àwọn ọna ìsanwó yìí lè ní ìpadà, ìyípadà ìsanwó, àjèjì, àwọn ìdènà banki, ìdákẹ́jẹ, tàbí àwọn ìṣe ìṣàkóso. Àwọn olumulo mọ̀ àti gba àwọn ewu wọ̀nyí.
tac.legal.section5.title=Ìdíyelé Àwọn Ìṣòro
tac.legal.section5.body=Àwọn ìjàkadì tó wáyé láti inú àwọn òwò tí a ṣe nípasẹ̀ sọfitiwia le jẹ́ kí a ṣe àtúnṣe nípasẹ̀ ilana ìdájọ́ Bisq gẹ́gẹ́ bí àwọn ilana tó ti tẹ̀jáde nipasẹ́ iṣẹ́ Bisq 2 ní àkókò ìjàkadì náà. Ìdájọ́ kò jẹ́ ìdánilójú ti ìpadà, ìsanpada, ìmúṣẹ, tàbí ìsanwó, àti pé kò le wà ní gbogbo àkókò. Bisq DAO, àwọn oníṣàkóso, àwọn tó kópa, àwọn alágbàrin, àwọn onídájọ́, àwọn aṣojú ìpadà, àti àwọn olùkópa míì ti iṣẹ́ náà kò ní ẹ̀tọ́ láti san owó fún àwọn olumulo fún àwọn ìpadà òwò, àwọn ailagbara sọfitiwia, àwọn ìṣẹ̀lẹ̀ ààbò, ìtanràn, tàbí àwọn ìfarapa míì.
tac.legal.section6.title=Kò sí ìtọ́jú tàbí ipa alágbàrin
tac.legal.section6.body=Bisq 2 jẹ́ sọfitiwia alágbèéká tó dá lórí nẹ́tíwọ̀kì P2P tí a ṣe àtúnṣe àti tó ń ṣetọju nipasẹ àkóso oríṣìíríṣìí tó mọ̀ sí Bisq DAO. Kò sí ẹ̀ka àárín tó ń ṣakoso nẹ́tíwọ̀kì náà, tó ń pa owó àwọn oníṣòwò, tó ń ṣiṣẹ́ gẹ́gẹ́ bí alágbàá, ìyàrá, olùsọdá ìsanwó, alágbèéká ìtúsílẹ̀, olùdájọ́, tàbí alájọṣepọ̀ sí àwọn òwò, tàbí tó ń jẹ́risi ìwàlẹ̀, iṣẹ́, tàbí ìdàgbàsókè ọjọ́ iwájú sọfitiwia náà.
tac.legal.section7.title=Ìpamọ́ àti Àwọn Data Agbègbè
tac.legal.section7.body=Àwọn olumulo ni ojuse lati dáàbò bo àwọn data ohun elo agbegbe wọn, awọn ọrọigbaniwọle, awọn bọtini idanimọ, alaye àkáǹtì ìsanwó, ati awọn igbasilẹ òwò. Àwọn alaye òwò ati ìsanwó le pin pẹlu awọn alabaṣiṣẹpọ òwò, ati, ti a ba ṣí ìjiyà kan, pẹlu awọn alágbàrin, onídájọ́, awọn aṣoju agbapada, tabi awọn olukopa miiran ti o ni ibatan si ilana ipinnu ìjiyà.
tac.legal.confirm=Mo ti ka àti gba àwọn ìlànà yìí.


