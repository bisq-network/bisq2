contactsList.table.columns.actionsMenu.removeContact=Ṣé o dájú pé o fẹ́ pa ìbáṣepọ̀ yìí run?\n\nNípa pípá ìbáṣepọ̀ náà run, gbogbo àkọsílẹ̀, àmì ìgbọ́kànlé tàbí àwọn akọsilẹ̀ tó ní í ṣe pẹ̀lú ẹni tó wà nibi yìí yóò parẹ́ pẹ̀lú.

contactsList.introPreface=Tuntun sí Àwọn ìbáṣepọ̀?
contactsList.introHeadline=Eyi ni bí ó ṣe ń ṣiṣẹ́

contactsList.introMain=Àwọn ìbáṣepọ̀ ṣe iranlọwọ fún ọ láti mọ àwọn ẹlẹgbẹ́ tó ní ìtẹ́wọ́gba àti láti yago fún ìfarahan. \nLẹ́yìn òwò tó ṣaṣeyọrí, o lè fi olumulo kun láti jẹ́risi pé àwọn ìbáṣepọ̀ tó nbọ jẹ́ pẹ̀lú ẹni tó kan náà.

contactsList.introDetails=Kí nìyẹn ṣe pataki:\nBisq2 ti bẹ̀rẹ̀ láti dáàbò bo ìfarahàn pẹ̀lú àwọn eroja àkọsílẹ̀ mẹ́rin: ID àkọsílẹ̀, Nym, àwòrán àkọsílẹ̀, àti orúkọ àbẹ́. \nSíbẹ̀, a máa yọ àwọn àkọsílẹ̀ kúrò nínú nẹ́tíwọ̀kì lẹ́yìn ọjọ́ 15 ti a kò ṣiṣẹ́. Nígbà tí a bá yọ, ẹlòmíràn lè tún ṣẹda àkọsílẹ̀ pẹ̀lú orúkọ àbẹ́ tó bá a mu àti fa ìfarahàn yẹn. \nLáti dín ìṣòro yìí kù, Bisq2 máa fi àwọn olumulo tí o bá ní ìbánisọ̀rọ̀ pẹ̀lú wọn kún àtòjọ́ ìbáṣepọ̀ rẹ. \nO lè pa a mọ́ nínú Àwọn ìtọ́sọ́nà > Àwọn aṣayan míì > "Fi àwọn ìbáṣepọ̀ kún laifọwọ́si".

contactsList.table.tableInfo.title=Tuntun si Àwọn ìbáṣepọ̀? Ẹ̀yà àkópọ̀ bí ó ṣe ń ṣiṣẹ́ ni ibi yìí
contactsList.table.tableInfo.content=Àwọn olubasọrọ jẹ́ irinṣẹ́ oníṣòwò tó ní ànfààní púpọ̀ tó fi ń ṣàfikún ìpele tuntun ti ààbò nípa fífi ẹ̀sùn rẹ̀ mọ́ àwọn ẹlẹ́gbẹ́ rẹ.\n\nFún àpẹẹrẹ, láti dènà ìfarapa oníṣe, lẹ́yìn tí o bá parí òwò pẹ̀lú ẹnikan, o lè fi ẹnikan yìí kún un láti jẹ́risi pé nígbà tó bá jẹ́ pé o n bá a ṣiṣẹ́ lẹ́ẹ̀kansi, ó jẹ́ pé ẹnikan yẹn ni.\n\nBisq2 ti pese ààbò lòdì sí ìfarapa nípa lílo àwọn eroja mẹ́rin tó dá àkọsílẹ̀ oníṣe: ID àkọsílẹ̀, Nym, àwòrán àkọsílẹ̀ àti orúkọ àbẹ́. Bí ó tilẹ̀ jẹ́ pé, àwọn àkọsílẹ̀ máa parẹ́ láti nẹ́tíwọ̀kì lẹ́yìn ọjọ́ 15 ti a kò fi ṣiṣẹ́. Nígbà tí a bá yọ àkọsílẹ̀, olè kan lè dá àkọsílẹ̀ tuntun pẹ̀lú orúkọ àbẹ́ tó dájú láti gbìmọ̀ sí ìfarapa oníṣe yẹn.\n\nA ti ṣe àtúnṣe ìlànà yìí fún ọ nípa fífi gbogbo àwọn oníṣe tí o bá n ṣiṣẹ́ pẹ̀lú wọn sí àkójọ yìí laifọwọ́yi gẹ́gẹ́ bí o ṣe n lo ohun elo naa. O lè pa a mọ́ nípa lílo aṣayan "Fi awọn olubasọrọ kun laifọwọyi" nínú akojọ "Àwọn eto" > apá "Àwọn aṣayan diẹ sii".
