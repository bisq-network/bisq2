tac.risk.headline=Разберете ги Ризиците
tac.risk.p2p.title=Децентрализирано Пеер-до-Пеер Софтвер
tac.risk.p2p.body=Трговијата се спроведува директно помеѓу корисниците. Развивачите на Bisq, придонесувачите и Bisq DAO не контролираат средства на корисниците и не можат да гарантираат дека трговиите ќе завршат успешно или дека загубите можат да се повратат.
tac.risk.financial.title=Финансиски, Технички и Регулаторни Ризици
tac.risk.financial.body=Користењето на Bisq 2 вклучува финансиски, технички и регулаторни ризици, вклучувајќи делумна или целосна загуба на средства. Проблеми со софтверот, измами, поврат на плаќања, инциденти со безбедноста и регулаторни дејства можат да резултираат со неповратни загуби.
tac.risk.noGuarantees.title=Нема гаранција за опоравување или компензација
tac.risk.noGuarantees.body=Решавањето на спорови може да помогне во некои ситуации, но опоравување, надомест или компензација не може да се гарантира. Корисниците остануваат одговорни за своите трговии, плаќања и локални податоци.
tac.risk.confirm.headline=Ве молиме потврдете ги следниве:
tac.risk.accept.loss=Користењето на Bisq 2 може да резултира со делумна или целосна загуба на средства.
tac.risk.accept.noRecovery=Опоравување, надомест или компензација не е загарантирана.


tac.legal.headline=Правни услови
tac.legal.section1.title=Отказ од гаранција и ограничувања на одговорност
tac.legal.section1.body=Bisq 2 е бесплатно и со отворен код софтвер објавен под GNU Affero General Public License. До максималната мерка дозволена од применливото право, софтверот се обезбедува на основа "таков каков што е" и "достапен", без гаранции или претстави од каков било вид, вклучувајќи трговска способност, пригодност за одредена цел, титул, неинфрињирање, достапност, точност, безбедност или безгрешна работа.\nОсвен во случаи на намера, груба небрежност, лична повреда, или каде одговорноста не може да се исклучи според применливото право, ниту еден носител на авторски права, развивач, придонесувач, учесник во Bisq DAO, посредник, арбитер, агент за враќање, или друг учесник во проектот не ќе биде одговорен за штети произлезени од користењето на, неможноста за користење, или неисправност на софтверот. Ова вклучува, без ограничување, загуба на средства, дигитални средства, профити, податоци, трговски можности, добра волја, дефекти на софтверот, безбедносни уязвимости, неуспеси на протоколи, неточни податоци, измама, поврат на плаќања, или напади од трети лица, дури и ако биле известени за можноста за такви штети.
tac.legal.section2.title=Одговорност на корисникот и без советување
tac.legal.section2.body=Корисниците се единствено одговорни за нивната употреба на софтверот и за осигурување дека нивната употреба не ги крши применливите закони, регулативи, даночни обврски или обврски за известување во нивната јурисдикција. Bisq не обезбедува финансиски, инвестициони, даночни, правни или регулаторни совети. Корисниците се одговорни за донесување на свои одлуки и добивање независни совети каде што е соодветно.
tac.legal.section3.title=Информации и Инфраструктура
tac.legal.section3.body=Пазарните цени, проценките на провизии, податоците за мрежата, пораките од корисниците, понудите и другите информации можат да бидат неточни, неполни, задоцнети, недостапни или обезбедени од трети страни или инфраструктура управувана од придонесувачите на Bisq DAO. Корисниците се одговорни за независно потврдување на сите информации пред да се потпрат на нив.
tac.legal.section4.title=Надворешни ризици при плаќање
tac.legal.section4.body=Фиат и други надворешни методи на плаќање се обработуваат надвор од Bisq 2 и подлежат на правилата, достапноста, лимитите, провизиите, барањата за верификација, политики за поврат на плаќања и дејствија на провајдерите на плаќања, банките и другите трети страни. Овие методи на плаќање можат да вклучуваат поврат на плаќања, поврат на средства, измама, банкарски ограничувања, замрзнување на сметки, задоцнувања или регулаторни дејствија. Корисниците ги признаваат и прифаќаат овие ризици.
tac.legal.section5.title=Ограничувања за решавање на спорови
tac.legal.section5.body=Споровите кои произлегуваат од трговиите спроведени преку софтверот можат да се решаваат преку процесот на решавање спорови на Bisq во согласност со процедурите објавени од проектот Bisq 2 во времето на спорот. Решавањето на споровите не е гаранција за поврат, надомест, спроведување или компензација и може да не биде достапно во сите околности. Bisq DAO, развивачите, придонесувачите, посредниците, арбитрите, агенти за поврат и други учесници во проектот не се обврзани да ги компензираат корисниците за загуби од трговија, ранливости на софтверот, инциденти со безбедноста, измами или други штети.
tac.legal.section6.title=Нема чување или посредничка улога
tac.legal.section6.body=Bisq 2 е децентрализирана софтверска платформа за peer-to-peer развиена и одржувана преку модел на управување со отворен код познат како Bisq DAO. Нема централна ентиетa која ја контролира мрежата, држи доверба на корисничките средства, делува како посредник, берза, платен процесор, агент за ескроу, доверител или контрастрана во трговиите, ниту гарантира достапност, работа или идно развивање на софтверот.
tac.legal.section7.title=Приватност и локални податоци
tac.legal.section7.body=Корисниците се одговорни за заштита на своите локални податоци од апликацијата, лозинки, клучеви за идентитет, информации за платежната сметка и записи за трговија. Деталите за трговија и плаќање можат да бидат споделени со трговските партнери и, ако се отвори спор, со посредници, арбитри, агенти за повраток или други учесници вклучени во процесот на решавање на спорови.
tac.legal.confirm=Ги прочитав и прифаќам овие услови.


