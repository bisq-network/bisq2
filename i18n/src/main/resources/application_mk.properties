updater.downloadAndVerify.info.isLauncherUpdate=Откако сите фајлови ќе бидат преземени, клучот за потпишување се споредува со клучевите обезбедени во апликацијата и оние достапни на веб-страницата на Bisq. Овој клуч потоа се користи за да се потврди преземениот нов инсталер на Bisq. Откако преземањето и потврдата ќе бидат завршени, преминете во директориумот за преземање за да ја инсталирате новата верзија на Bisq.
