restoreFromBackup.headline=Fájlok visszaállítva a biztonsági mentésből
restoreFromBackup.info=Az indítás során a rendszer észlelte, hogy néhány állandó fájl sérült vagy olvashatatlan volt.\nAnnak érdekében, hogy az alkalmazás érvényes állapotban maradjon, a legfrissebb elérhető biztonsági mentések automatikusan vissza lettek állítva.\n\nKérjük, ellenőrizze nyitott ügyleteit, hogy megbizonyosodjon arról, hogy azok a várt állapotban vannak.\nHa bármilyen következetlenséget észlel, vagy problémákba ütközik, lépjen kapcsolatba a Bisq hozzájárulóival segítségért.\n\nAz alábbi tárolók lettek visszaállítva a biztonsági mentésből:
