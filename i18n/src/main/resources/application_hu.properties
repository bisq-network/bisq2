tac.headline=Felhasználói megállapodás
tac.confirm=Elolvastam és megértettem
tac.accept=Felhasználói megállapodás elfogadása
tac.reject=Elutasítás és kilépés

tac.risk.headline=Kockázatok megértése
tac.risk.p2p.title=Decentralizált Peer-to-Peer Szoftver
tac.risk.p2p.body=A kereskedések közvetlenül a felhasználók között zajlanak. A Bisq fejlesztői, hozzájárulói és a Bisq DAO nem ellenőrzik a felhasználói alapokat, és nem tudják garantálni, hogy a kereskedések sikeresen befejeződnek, vagy hogy a veszteségek visszaszerezhetők.
tac.risk.financial.title=Pénzügyi, technikai és szabályozási kockázatok
tac.risk.financial.body=A Bisq 2 használata pénzügyi, technikai és szabályozási kockázatokkal jár, beleértve a pénzeszközök részleges vagy teljes elvesztését. A szoftverhibák, csalások, kifizetések visszafordítása, biztonsági incidensek és szabályozói intézkedések visszafordíthatatlan veszteségeket okozhatnak.
tac.risk.noGuarantees.title=Nincs garancia a helyreállításra vagy a kártérítésre
tac.risk.noGuarantees.body=A viták rendezése bizonyos helyzetekben segíthet, de a helyreállítás, a visszatérítés vagy a kártalanítás nem garantálható. A felhasználók felelősek maradnak ügyleteikért, kifizetéseikért és helyi adataikért.
tac.risk.confirm.headline=Kérjük, ismerje el a következőket:
tac.risk.accept.loss=A Bisq 2 használata a pénzeszközök részleges vagy teljes elvesztésével járhat.
tac.risk.accept.noRecovery=A helyreállítás, a visszatérítés vagy a kártalanítás nem garantált.


tac.legal.headline=Jogi feltételek
tac.legal.section1.title=Jótállási nyilatkozat és felelősségkorlátozások
tac.legal.section1.body=A Bisq 2 ingyenes és nyílt forráskódú szoftver, amelyet a GNU Affero General Public License alatt adtak ki. A vonatkozó jogszabályok által megengedett legnagyobb mértékben a szoftver "a meglévő állapotában" és "elérhetőség szerint" áll rendelkezésre, bármiféle garancia vagy nyilatkozat nélkül, beleértve a forgalmazhatóságot, egy adott célra való alkalmasságot, a tulajdont, a jogsértésmentességet, a rendelkezésre állást, a pontosságot, a biztonságot vagy a hibamentes működést.\nKivéve, ha szándékos cselekedet, súlyos gondatlanság, személyi sérülés vagy olyan esetekben, ahol a felelősség a vonatkozó jogszabályok alapján nem zárható ki, egyetlen szerzői jogtulajdonos, fejlesztő, hozzájáruló, Bisq DAO résztvevő, közvetítő, döntőbíró, visszatérítési ügynök vagy más projekt résztvevő sem vonható felelősségre a szoftver használatából, a használat képtelenségéből vagy a szoftver hibás működéséből eredő károkért. Ez magában foglalja, de nem korlátozódik a pénzeszközök, digitális eszközök, nyereségek, adatok, kereskedési lehetőségek, goodwill, szoftverhibák, biztonsági sebezhetőségek, protokollhibák, pontatlan adatok, csalás, kifizetések visszavonása vagy harmadik fél támadások elvesztésére, még akkor is, ha figyelmeztették a ilyen károk lehetőségére.
tac.legal.section2.title=Felhasználói felelősség és nincs tanácsadás
tac.legal.section2.body=A felhasználók kizárólagosan felelősek a szoftver használatáért, és biztosítaniuk kell, hogy a használatuk ne sértse a vonatkozó törvényeket, szabályozásokat, adókötelezettségeket vagy jelentési követelményeket az ő joghatóságukban. A Bisq nem nyújt pénzügyi, befektetési, adózási, jogi vagy szabályozási tanácsokat. A felhasználók felelősek a saját döntéseik meghozataláért és független tanácsok beszerzéséért, ahol ez indokolt.
tac.legal.section3.title=Információ és Infrastruktúra
tac.legal.section3.body=A piaci árak, díjbecslések, hálózati adatok, peer üzenetek, ajánlatok és egyéb információk pontatlanok, hiányosak, késlekedhetnek, nem állhatnak rendelkezésre, vagy harmadik felek, illetve a Bisq DAO hozzájárulói által üzemeltetett infrastruktúra által szolgáltatottak lehetnek. A felhasználók felelősek minden információ független ellenőrzéséért, mielőtt támaszkodnának rá.
tac.legal.section4.title=Külső Fizetési Kockázatok
tac.legal.section4.body=A fiat és egyéb külső fizetési módok a Bisq 2-n kívül kerülnek feldolgozásra, és a fizetési szolgáltatók, bankok és egyéb harmadik felek szabályainak, elérhetőségének, korlátainak, díjainak, ellenőrzési követelményeinek, visszatérítési politikáinak és intézkedéseinek vannak alávetve. Ezek a fizetési módok visszatérítéseket, kifizetések visszavonását, csalást, banki korlátozásokat, fiók befagyasztásokat, késéseket vagy szabályozói intézkedéseket vonhatnak maguk után. A felhasználók elismerik és elfogadják ezeket a kockázatokat.
tac.legal.section5.title=Vita rendezési korlátok
tac.legal.section5.body=A szoftveren keresztül lebonyolított ügyletekből eredő vitákat a Bisq vitás rendezési folyamatán keresztül lehet kezelni, a Bisq 2 projekt által közzétett eljárásoknak megfelelően, a vita időpontjában. A vita rendezése nem garantálja a visszatérítést, a kártalanítást, a végrehajtást vagy a kompenzációt, és nem minden körülmények között állhat rendelkezésre. A Bisq DAO, fejlesztők, hozzájárulók, közvetítők, döntőbírók, visszatérítési ügynökök és más projekt résztvevők nem kötelesek kártalanítani a felhasználókat kereskedési veszteségek, szoftverhibák, biztonsági incidensek, csalások vagy egyéb károk miatt.
tac.legal.section6.title=Nincs letétkezelő vagy közvetítő szerep
tac.legal.section6.body=A Bisq 2 egy decentralizált peer-to-peer szoftver, amelyet egy nyílt forráskódú irányítási modell, a Bisq DAO keretein belül fejlesztenek és tartanak karban. Nincs központi entitás, amely irányítaná a hálózatot, őrizné a felhasználói alapokat, közvetítőként, tőzsdeként, fizetési feldolgozóként, letéti ügynökként, megbízottként vagy ügyletek ellenpartjaként működne, vagy garantálná a szoftver elérhetőségét, működését vagy jövőbeli fejlesztését.
tac.legal.section7.title=Adatvédelem és helyi adatok
tac.legal.section7.body=A felhasználók felelősek a helyi alkalmazásadataik, jelszavaik, azonosító kulcsaik, fizetési fiók információik és ügylet nyilvántartásaik védelméért. Az ügylet és a fizetési részletek megoszthatók a kereskedési partnerekkel, és ha vitát nyitnak, a közvetítőkkel, döntőbírókkal, visszatérítési ügynökökkel vagy a vitás rendezési folyamatban részt vevő egyéb résztvevőkkel.
tac.legal.confirm=Elolvastam és elfogadom ezeket a feltételeket.


