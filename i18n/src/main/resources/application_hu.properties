popup.reportError=A szoftver fejlesztésének elősegítése érdekében kérjük, jelentsen be ezt a hibát egy új probléma megnyitásával itt: 'https://github.com/bisq-network/bisq2/issues'.\nA hibaüzenet a vágólapra kerül, amikor rákattint a lenti 'jelentés' gombra.\n\nKönnyebbé teszi a hibakeresést, ha naplófájlokat is csatol a hibajelentéséhez. A naplófájlok nem tartalmaznak érzékeny adatokat.
