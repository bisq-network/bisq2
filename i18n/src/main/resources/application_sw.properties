restoreFromBackup.headline=Faili Zimekurudishwa kutoka Hifadhi
restoreFromBackup.info=Wakati wa kuanzisha, mfumo uligundua kwamba baadhi ya faili za kudumu ziliharibika au hazikuweza kusomwa.\nIli kuhakikisha programu inaendelea kuwa katika hali sahihi, nakala za hivi karibuni zilizopatikana zilirejeshwa kiotomatiki.\n\nTafadhali pitia biashara zako zilizo wazi ili kuhakikisha ziko katika hali inayotarajiwa.\nIkiwa utaona tofauti zozote au kukutana na matatizo, wasiliana na wachangiaji wa Bisq kwa msaada.\n\nMaduka yafuatayo yalirejeshwa kutoka kwa hifadhi:
