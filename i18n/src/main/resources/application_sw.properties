tac.headline=Makubaliano ya Mtumiaji
tac.confirm=Nimesoma na kuelewa
tac.accept=Kubali makubaliano ya mtumiaji
tac.reject=Kataa na uondoke

tac.risk.headline=Kuelewa Hatari
tac.risk.p2p.title=Programu ya Kijamii ya Kijamii ya Kijamii
tac.risk.p2p.body=Biashara zinafanywa moja kwa moja kati ya watumiaji. Wanaendeleza Bisq, wachangiaji, na Bisq DAO hawawezi kudhibiti fedha za watumiaji na hawawezi kuhakikisha kwamba biashara zitakamilika kwa mafanikio au kwamba hasara zinaweza kurejelewa.
tac.risk.financial.title=Hatari za Kifedha, Kitaalamu, na Kisheria
tac.risk.financial.body=Kutumia Bisq 2 kunahusisha hatari za kifedha, kiufundi, na kisheria, ikiwa ni pamoja na kupoteza kwa sehemu au kwa jumla kwa fedha. Uhalifu wa programu, udanganyifu, kurudishiwa malipo, matukio ya usalama, na hatua za kisheria zinaweza kusababisha hasara zisizoweza kurekebishwa.
tac.risk.noGuarantees.title=Hakuna Dhamana ya Kupona au Malipo
tac.risk.noGuarantees.body=Utatuzi wa mizozo unaweza kusaidia katika hali nyingine, lakini urejeleaji, fidia, au malipo hayawezi kuhakikisha. Watumiaji wanabaki kuwajibika kwa biashara zao, malipo, na data za ndani.
tac.risk.confirm.headline=Tafadhali kubali yafuatayo:
tac.risk.accept.loss=Kutumia Bisq 2 kunaweza kusababisha kupoteza sehemu au jumla ya fedha.
tac.risk.accept.noRecovery=Urejeleaji, fidia, au malipo hayahakikishwi.


tac.legal.headline=Masharti ya Kisheria
tac.legal.section1.title=Kanusho la Dhamana na Mipaka ya Wajibu
tac.legal.section1.body=Bisq 2 ni programu ya bure na ya chanzo wazi iliyotolewa chini ya Leseni ya Umma ya GNU Affero. Kwa kiwango kikubwa kinachoruhusiwa na sheria zinazotumika, programu inatolewa kwa msingi wa "kama ilivyo" na "kama inapatikana", bila dhamana au uwakilishi wa aina yoyote, ikiwa ni pamoja na uwezo wa kuuza, kufaa kwa kusudi maalum, haki miliki, kutovunjwa, upatikanaji, usahihi, usalama, au uendeshaji usio na makosa.\nIla katika matukio ya makusudi, uzito wa uzembe, kujeruhi binafsi, au ambapo dhima haiwezi kutengwa chini ya sheria zinazotumika, hakuna mmiliki wa hakimiliki, mendelezaji, mchango, mshiriki wa Bisq DAO, mpatanishi, mpatanishi, wakala wa kurejesha, au mshiriki mwingine wa mradi atawajibika kwa uharibifu unaotokana na matumizi ya, kutoweza kutumia, au hitilafu ya programu. Hii inajumuisha, bila kikomo, kupoteza fedha, mali za kidijitali, faida, data, fursa za biashara, goodwill, kasoro za programu, udhaifu wa usalama, kushindwa kwa itifaki, data zisizo sahihi, udanganyifu, kurudisha malipo, au mashambulizi ya wahusika wengine, hata ikiwa umeonywa kuhusu uwezekano wa uharibifu kama huo.
tac.legal.section2.title=Wajibu wa Mtumiaji na Hakuna Ushauri
tac.legal.section2.body=Watumiaji wanawajibika pekee kwa matumizi yao ya programu na kuhakikisha kwamba matumizi yao hayakiuka sheria, kanuni, wajibu wa kodi, au mahitaji ya ripoti katika eneo lao. Bisq haitoi ushauri wa kifedha, uwekezaji, kodi, kisheria, au wa udhibiti. Watumiaji wanawajibika kufanya maamuzi yao wenyewe na kupata ushauri huru inapofaa.
tac.legal.section3.title=Taarifa na Miundombinu
tac.legal.section3.body=Bei za soko, makadirio ya ada, data za mtandao, ujumbe wa washiriki, ofa, na maelezo mengine yanaweza kuwa si sahihi, kukamilika, kucheleweshwa, kutopatikana, au kutolewa na wahusika wengine au miundombinu inayofanywa na wachangiaji wa Bisq DAO. Watumiaji wanawajibika kuthibitisha kwa uhuru maelezo yote kabla ya kuyategemea.
tac.legal.section4.title=Hatari za Malipo ya Nje
tac.legal.section4.body=Njia za malipo za fiat na nyinginezo za nje zinashughulikiwa nje ya Bisq 2 na zinategemea sheria, upatikanaji, mipaka, ada, mahitaji ya uthibitisho, sera za kurejesha malipo, na hatua za watoa huduma za malipo, benki, na wahusika wengine. Njia hizi za malipo zinaweza kujumuisha kurejesha malipo, kurudi kwa malipo, udanganyifu, vizuizi vya benki, kufungiwa kwa akaunti, ucheleweshaji, au hatua za kisheria. Watumiaji wanakubali na kukubali hatari hizi.
tac.legal.section5.title=Mipaka ya Utatuzi wa Migogoro
tac.legal.section5.body=Mizozo inayotokana na biashara zinazofanywa kupitia programu inaweza kushughulikiwa kupitia mchakato wa kutatua mizozo wa Bisq kulingana na taratibu zilizochapishwa na mradi wa Bisq 2 wakati wa mzozo. Kutatua mizozo si dhamana ya kurejesha, fidia, utekelezaji, au malipo, na huenda visipatikane katika hali zote. Bisq DAO, waendelezaji, wachangiaji, wapatanishi, wapatanishi, mawakala wa kurejesha, na washiriki wengine wa mradi hawana wajibu wa kuwafidia watumiaji kwa hasara za biashara, udhaifu wa programu, matukio ya usalama, udanganyifu, au uharibifu mwingine.
tac.legal.section6.title=Hakuna Hifadhi au Nafasi ya Mpatanishi
tac.legal.section6.body=Bisq 2 ni programu ya mtandao wa P2P isiyo na kati iliyotengenezwa na kudumishwa kupitia mfano wa utawala wa chanzo wazi unaojulikana kama Bisq DAO. Hakuna chombo cha kati kinachodhibiti mtandao, kinachoshikilia fedha za watumiaji, kinachofanya kazi kama wakala, kubadilishana, mchakato wa malipo, wakala wa hifadhi, mkataba, au upande wa biashara, au kuhakikisha upatikanaji, uendeshaji, au maendeleo ya baadaye ya programu.
tac.legal.section7.title=Faragha na Data za Mitaa
tac.legal.section7.body=Watumiaji wanawajibika kulinda data zao za programu za ndani, nenosiri, funguo za utambulisho, taarifa za akaunti ya malipo, na rekodi za biashara. Maelezo ya biashara na malipo yanaweza kushirikiwa na wenzao wa biashara na, ikiwa mzozo utafunguliwa, na wapatanishi, wapatanishi, mawakala wa kurejesha, au washiriki wengine wanaohusika katika mchakato wa kutatua mzozo.
tac.legal.confirm=Nimesoma na nakubali masharti haya.


