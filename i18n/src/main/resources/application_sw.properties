updater.downloadAndVerify.info.isLauncherUpdate=Mara tu faili zote zimepakuliwa, ufunguo wa kusaini unalinganishwa na funguo zilizotolewa katika programu na zile zinazopatikana kwenye tovuti ya Bisq. Ufunguo huu kisha unatumika kuthibitisha msanidi mpya wa Bisq ulio pakuliwa. Baada ya upakuaji na uthibitisho kukamilika, nenda kwenye saraka ya upakuaji ili kusanidi toleo jipya la Bisq.
