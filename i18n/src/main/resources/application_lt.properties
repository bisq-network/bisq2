restoreFromBackup.headline=Failai atkurti iš atsarginės kopijos
restoreFromBackup.info=Pradėjus veikti, sistema nustatė, kad kai kurie nuolatiniai failai buvo sugadinti arba neskaitomi.\nNorint užtikrinti, kad programa išliktų galiojančioje būsenoje, buvo automatiškai atkurtos naujausios prieinamos atsarginės kopijos.\n\nPrašome peržiūrėti savo atviras prekybas, kad įsitikintumėte, jog jos yra numatytoje būsenoje.\nJei pastebėsite kokių nors neatitikimų arba susidursite su problemomis, kreipkitės į Bisq bendruomenės narius pagalbos.\n\nIš atsarginės kopijos buvo atkurtos šios parduotuvės:
restoreFromBackup.table.store=Saugojimo failas
restoreFromBackup.table.age=Atsarginės kopijos amžius
