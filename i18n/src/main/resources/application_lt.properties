tac.risk.headline=Supraskite rizikas
tac.risk.p2p.title=Decentralizuota P2P programinė įranga
tac.risk.p2p.body=Prekybos vykdomos tiesiogiai tarp naudotojų. Bisq kūrėjai, prisidėjėjai ir Bisq DAO nekontroliuoja naudotojų lėšų ir negali garantuoti, kad prekybos bus sėkmingai užbaigtos arba kad nuostoliai gali būti atgauti.
tac.risk.financial.title=Finansiniai, techniniai ir reguliavimo rizikos
tac.risk.financial.body=Naudojant Bisq 2 kyla finansinių, techninių ir reguliavimo rizikų, įskaitant dalinį ar visišką lėšų praradimą. Programinės įrangos pažeidžiamumai, sukčiavimas, mokėjimų atšaukimai, saugumo incidentai ir reguliavimo veiksmai gali sukelti neatsakomus nuostolius.
tac.risk.noGuarantees.title=Atstatymo ar kompensacijos garantija nėra
tac.risk.noGuarantees.body=Ginčų sprendimas gali padėti tam tikrose situacijose, tačiau atgavimo, kompensacijos ar atlyginimo negalima garantuoti. Vartotojai lieka atsakingi už savo prekybas, mokėjimus ir vietinius duomenis.
tac.risk.confirm.headline=Prašome patvirtinti šiuos dalykus:
tac.risk.accept.loss=Naudojant Bisq 2 gali kilti dalinio arba visiško lėšų praradimo rizika.
tac.risk.accept.noRecovery=Atstatymas, kompensacija ar atlyginimas nėra garantuoti.


tac.legal.headline=Teisiniai terminai
tac.legal.section1.title=Garantijos atsisakymas ir atsakomybės ribojimai
tac.legal.section1.body=Bisq 2 yra nemokama ir atvirojo kodo programinė įranga, išleista pagal GNU Affero General Public License. Kiek leidžia taikytina teisė, programinė įranga teikiama "kaip yra" ir "kaip prieinama" pagrindu, be jokių garantijų ar atstovavimų, įskaitant prekybinį tinkamumą, tinkamumą konkrečiam tikslui, nuosavybės teisę, pažeidimų nebuvimą, prieinamumą, tikslumą, saugumą ar be klaidų veikimą.\nIšskyrus atvejus, kai yra tyčia, šiurkšti aplaidumas, asmeninė žala arba kai atsakomybė negali būti išskirta pagal taikytiną teisę, jokie autorinių teisių turėtojai, kūrėjai, prisidėjėjai, Bisq DAO dalyviai, tarpininkai, arbitrai, grąžinimo agentai ar kiti projekto dalyviai nebus atsakingi už žalą, kylančią dėl programinės įrangos naudojimo, negalėjimo naudoti ar programinės įrangos gedimo. Tai apima, bet neapsiriboja, lėšų, skaitmeninių aktyvų, pelno, duomenų, prekybos galimybių, geros valios, programinės įrangos defektų, saugumo pažeidžiamumų, protokolo nesėkmių, netikslių duomenų, sukčiavimo, mokėjimų grąžinimų ar trečiųjų šalių atakų praradimą, net jei buvo įspėta apie tokių nuostolių galimybę.
tac.legal.section2.title=Naudotojo atsakomybė ir jokios rekomendacijos
tac.legal.section2.body=Naudotojai yra visiškai atsakingi už programinės įrangos naudojimą ir užtikrinimą, kad jų naudojimas nepažeidžia taikomų įstatymų, reglamentų, mokesčių įsipareigojimų ar ataskaitų reikalavimų jų jurisdikcijoje. Bisq nesuteikia finansinių, investicinių, mokesčių, teisinės ar reguliavimo konsultacijų. Naudotojai yra atsakingi už savo sprendimų priėmimą ir nepriklausomos konsultacijos gavimą, kai tai yra tinkama.
tac.legal.section3.title=Informacija ir infrastruktūra
tac.legal.section3.body=Rinkos kainos, mokesčių įverčiai, tinklo duomenys, peer žinutės, pasiūlymai ir kita informacija gali būti netikslūs, neišsamūs, pavėluoti, neprieinami arba teikiami trečiųjų šalių ar infrastruktūros, kurią valdo Bisq DAO dalyviai. Vartotojai yra atsakingi už visos informacijos nepriklausomą patikrinimą prieš ja pasikliaudami.
tac.legal.section4.title=Išoriniai mokėjimų rizikos
tac.legal.section4.body=Fiat ir kiti išoriniai mokėjimo metodai apdorojami už Bisq 2 ribų ir yra laikomi mokėjimo teikėjų, bankų ir kitų trečiųjų šalių taisyklių, prieinamumo, limitų, mokesčių, patikros reikalavimų, grąžinimo politikos ir veiksmų. Šie mokėjimo metodai gali apimti grąžinimus, mokėjimų atšaukimus, sukčiavimą, bankines ribojimus, paskyrų užšalimus, vėlavimus ar reguliacinius veiksmus. Naudotojai pripažįsta ir priima šiuos rizikos veiksnius.
tac.legal.section5.title=Ginčų sprendimo ribos
tac.legal.section5.body=Prekybos, vykdomos per programinę įrangą, ginčai gali būti sprendžiami per Bisq ginčų sprendimo procesą pagal procedūras, paskelbtas Bisq 2 projekto metu, kai kilo ginčas. Ginčų sprendimas nėra garantija, kad bus atgauta, kompensuota, įvykdyta ar kompensuota, ir gali būti nepasiekiamas visais atvejais. Bisq DAO, kūrėjai, prisidėjėjai, tarpininkai, arbitrai, grąžinimo agentai ir kiti projekto dalyviai neturi jokios pareigos kompensuoti vartotojams prekybos nuostolius, programinės įrangos pažeidžiamumus, saugumo incidentus, sukčiavimą ar kitus nuostolius.
tac.legal.section6.title=Nėra saugojimo ar tarpininko vaidmens
tac.legal.section6.body=Bisq 2 yra decentralizuota P2P programinė įranga, kurią vysto ir palaiko atvirojo kodo valdymo modelis, žinomas kaip Bisq DAO. Nėra centrinės institucijos, kuri kontroliuotų tinklą, laikytų vartotojų lėšas, veikdama kaip tarpininkas, birža, mokėjimo apdorotojas, užstato agentas, fiduciaras ar prekybos šalis, arba garantuotų programinės įrangos prieinamumą, veikimą ar ateities plėtrą.
tac.legal.section7.title=Privatumas ir vietiniai duomenys
tac.legal.section7.body=Naudotojai yra atsakingi už savo vietinės programos duomenų, slaptažodžių, tapatybės raktų, mokėjimo paskyros informacijos ir prekybos įrašų apsaugą. Prekybos ir mokėjimo detalės gali būti dalijamos su prekybos partneriais ir, jei bus atidaryta ginčo byla, su tarpininkais, arbitrais, grąžinimo agentais ar kitais dalyviais, įtrauktais į ginčo sprendimo procesą.
tac.legal.confirm=Aš perskaičiau ir priimu šiuos terminus.


