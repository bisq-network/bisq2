tac.headline=Umowa użytkownika
tac.confirm=Przeczytałem i zrozumiałem
tac.accept=Akceptuj umowę użytkownika
tac.reject=Odrzuć i zamknij

tac.risk.headline=Zrozum ryzyko
tac.risk.p2p.title=Zdecentralizowane oprogramowanie Peer-to-Peer
tac.risk.p2p.body=Transakcje są przeprowadzane bezpośrednio między użytkownikami. Programiści Bisq, współpracownicy i Bisq DAO nie kontrolują funduszy użytkowników i nie mogą zagwarantować, że transakcje zakończą się pomyślnie ani że straty mogą zostać odzyskane.
tac.risk.financial.title=Ryzyka finansowe, techniczne i regulacyjne
tac.risk.financial.body=Korzystanie z Bisq 2 wiąże się z ryzykiem finansowym, technicznym i regulacyjnym, w tym częściową lub całkowitą utratą środków. Wady oprogramowania, oszustwa, zwroty płatności, incydenty bezpieczeństwa oraz działania regulacyjne mogą prowadzić do nieodwracalnych strat.
tac.risk.noGuarantees.title=Brak gwarancji odzyskania lub odszkodowania
tac.risk.noGuarantees.body=Rozwiązywanie sporów może pomóc w niektórych sytuacjach, ale odzyskanie, zwrot lub odszkodowanie nie mogą być gwarantowane. Użytkownicy pozostają odpowiedzialni za swoje transakcje, płatności i dane lokalne.
tac.risk.confirm.headline=Proszę potwierdzić następujące:
tac.risk.accept.loss=Korzystanie z Bisq 2 może prowadzić do częściowej lub całkowitej utraty środków.
tac.risk.accept.noRecovery=Odzyskanie, zwrot lub odszkodowanie nie są gwarantowane.


tac.legal.headline=Warunki prawne
tac.legal.section1.title=Zrzeczenie się gwarancji i ograniczenia odpowiedzialności
tac.legal.section1.body=Bisq 2 jest darmowym oprogramowaniem typu open-source wydanym na podstawie GNU Affero General Public License. W maksymalnym zakresie dozwolonym przez obowiązujące prawo, oprogramowanie jest dostarczane w stanie "takim, jakim jest" i "dostępnym", bez jakichkolwiek gwarancji lub zapewnień jakiegokolwiek rodzaju, w tym dotyczących przydatności handlowej, przydatności do określonego celu, tytułu, braku naruszeń, dostępności, dokładności, bezpieczeństwa czy bezbłędnego działania.\nZ wyjątkiem przypadków zamiaru, rażącego niedbalstwa, obrażeń ciała lub tam, gdzie odpowiedzialność nie może być wyłączona na mocy obowiązującego prawa, żaden posiadacz praw autorskich, deweloper, współpracownik, uczestnik Bisq DAO, mediator, arbiter, agent zwrotów ani inny uczestnik projektu nie ponosi odpowiedzialności za szkody wynikające z użycia, niemożności użycia lub awarii oprogramowania. Obejmuje to, bez ograniczeń, utratę środków, aktywów cyfrowych, zysków, danych, możliwości handlowych, dobrej woli, wady oprogramowania, luki w zabezpieczeniach, awarie protokołu, niedokładne dane, oszustwa, zwroty płatności lub ataki ze strony osób trzecich, nawet jeśli poinformowano o możliwości takich szkód.
tac.legal.section2.title=Odpowiedzialność użytkownika i brak porady
tac.legal.section2.body=Użytkownicy ponoszą wyłączną odpowiedzialność za korzystanie z oprogramowania oraz za zapewnienie, że ich użytkowanie nie narusza obowiązujących przepisów prawa, regulacji, zobowiązań podatkowych ani wymogów sprawozdawczych w ich jurysdykcji. Bisq nie udziela porad finansowych, inwestycyjnych, podatkowych, prawnych ani regulacyjnych. Użytkownicy są odpowiedzialni za podejmowanie własnych decyzji i uzyskiwanie niezależnych porad, gdy jest to stosowne.
tac.legal.section3.title=Informacje i infrastruktura
tac.legal.section3.body=Ceny rynkowe, szacunkowe opłaty, dane sieciowe, wiadomości od peerów, oferty i inne informacje mogą być niedokładne, niekompletne, opóźnione, niedostępne lub dostarczane przez osoby trzecie lub infrastrukturę obsługiwaną przez współtwórców Bisq DAO. Użytkownicy są odpowiedzialni za niezależne weryfikowanie wszystkich informacji przed poleganiem na nich.
tac.legal.section4.title=Ryzyka związane z płatnościami zewnętrznymi
tac.legal.section4.body=Metody płatności fiat i inne zewnętrzne metody płatności są przetwarzane poza Bisq 2 i podlegają zasadom, dostępności, limitom, opłatom, wymaganiom weryfikacyjnym, politykom zwrotów oraz działaniom dostawców płatności, banków i innych stron trzecich. Te metody płatności mogą wiązać się z zwrotami, cofnięciami płatności, oszustwami, ograniczeniami bankowymi, zablokowaniem konta, opóźnieniami lub działaniami regulacyjnymi. Użytkownicy przyjmują do wiadomości i akceptują te ryzyka.
tac.legal.section5.title=Ograniczenia dotyczące rozwiązywania sporów
tac.legal.section5.body=Spory wynikające z transakcji przeprowadzonych za pomocą oprogramowania mogą być rozwiązywane za pośrednictwem procesu rozwiązywania sporów Bisq zgodnie z procedurami opublikowanymi przez projekt Bisq 2 w momencie wystąpienia sporu. Rozwiązywanie sporów nie jest gwarancją odzyskania, zwrotu, egzekucji ani odszkodowania i może nie być dostępne we wszystkich okolicznościach. Bisq DAO, deweloperzy, współtwórcy, mediatorzy, arbitrazy, agenci zwrotu i inni uczestnicy projektu nie mają obowiązku rekompensowania użytkownikom strat handlowych, luk w oprogramowaniu, incydentów bezpieczeństwa, oszustw ani innych szkód.
tac.legal.section6.title=Brak roli depozytariusza lub pośrednika
tac.legal.section6.body=Bisq 2 to zdecentralizowane oprogramowanie peer-to-peer rozwijane i utrzymywane w ramach modelu zarządzania open-source znanego jako Bisq DAO. Żaden centralny podmiot nie kontroluje sieci, nie przechowuje funduszy użytkowników, nie działa jako broker, giełda, procesor płatności, agent escrow, powiernik ani strona transakcji, ani nie gwarantuje dostępności, działania ani przyszłego rozwoju oprogramowania.
tac.legal.section7.title=Prywatność i lokalne dane
tac.legal.section7.body=Użytkownicy są odpowiedzialni za ochronę swoich lokalnych danych aplikacji, haseł, kluczy tożsamości, informacji o koncie płatności oraz zapisów transakcji. Szczegóły transakcji i płatności mogą być udostępniane partnerom handlowym, a w przypadku otwarcia sporu, mediatorom, arbiterom, agentom zwrotów lub innym uczestnikom zaangażowanym w proces rozwiązywania sporów.
tac.legal.confirm=Przeczytałem i akceptuję te warunki.


