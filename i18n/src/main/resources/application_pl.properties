# Restore from backup
####################################################################

restoreFromBackup.headline=Pliki przywrócone z kopii zapasowej
restoreFromBackup.info=Podczas uruchamiania system wykrył, że niektóre pliki trwałe były uszkodzone lub nieczytelne.\nAby zapewnić, że aplikacja pozostaje w ważnym stanie, automatycznie przywrócono najnowsze dostępne kopie zapasowe.\n\nProszę sprawdzić swoje otwarte transakcje, aby upewnić się, że są w oczekiwanym stanie.\nJeśli zauważysz jakiekolwiek niespójności lub napotkasz problemy, skontaktuj się z współtwórcami Bisq w celu uzyskania pomocy.\n\nNastępujące pliki zostały przywrócone z kopii zapasowej:
