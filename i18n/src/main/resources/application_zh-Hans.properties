tac.legal.section1.title=保修免责声明和责任限制
tac.legal.section1.body=Bisq 2 是根据 GNU Affero 通用公共许可证发布的免费开源软件。在适用法律允许的最大范围内，该软件以“按现状”和“按可用性”提供，不提供任何形式的保证或声明，包括适销性、特定用途的适用性、所有权、非侵权、可用性、准确性、安全性或无错误操作。\n除非因故意、重大过失、人身伤害或在适用法律下无法排除责任的情况，否则任何版权持有者、开发者、贡献者、Bisq DAO 参与者、调解员、仲裁员、退款代理或其他项目参与者对因使用、无法使用或软件故障而产生的损害不承担责任。这包括但不限于资金、数字资产、利润、数据、交易机会、商誉、软件缺陷、安全漏洞、协议故障、不准确数据、欺诈、支付撤销或第三方攻击的损失，即使已被告知可能发生此类损害。
tac.legal.section2.title=用户责任与无建议
tac.legal.section2.body=用户对其使用软件的行为及确保其使用不违反其所在司法管辖区的适用法律、法规、税务义务或报告要求负全责。Bisq 不提供财务、投资、税务、法律或监管建议。用户有责任做出自己的决定，并在适当时获得独立建议。
tac.legal.section3.title=信息与基础设施
tac.legal.section3.body=市场价格、费用估算、网络数据、对等消息、报价和其他信息可能不准确、不完整、延迟、不可用，或由 Bisq DAO 的贡献者运营的第三方或基础设施提供。用户有责任在依赖这些信息之前独立验证所有信息。
tac.legal.section4.title=外部支付风险
tac.legal.section4.body=法定货币和其他外部支付方式在 Bisq 2 之外处理，受支付提供商、银行和其他第三方的规则、可用性、限额、费用、验证要求、退款政策和行为的约束。这些支付方式可能涉及退款、支付撤销、欺诈、银行限制、账户冻结、延迟或监管行动。用户承认并接受这些风险。
tac.legal.section5.title=争议解决限制
tac.legal.section5.body=通过该软件进行的交易所产生的争议可以按照争议发生时Bisq 2项目发布的程序，通过Bisq争议解决流程进行处理。争议解决并不保证恢复、赔偿、执行或补偿，并且在所有情况下可能不可用。Bisq DAO、开发者、贡献者、调解员、仲裁员、退款代理和其他项目参与者没有义务对用户的交易损失、软件漏洞、安全事件、欺诈或其他损害进行赔偿。
tac.legal.section6.title=无保管或中介角色
tac.legal.section6.body=Bisq 2 是去中心化的点对点软件，通过一种称为 Bisq DAO 的开源治理模型进行开发和维护。没有中央实体控制网络、持有用户资金、充当经纪人、交易所、支付处理器、托管代理、受托人或交易对手，或保证软件的可用性、操作或未来发展。
tac.legal.section7.title=隐私和本地数据
tac.legal.section7.body=用户有责任保护他们的本地应用程序数据、密码、身份密钥、支付账户信息和交易记录。交易和支付细节可能会与交易对手共享，并且如果开启争议，将与调解员、仲裁员、退款代理或其他参与争议解决过程的人员共享。
