tac.risk.headline=Понимание рисков
tac.risk.p2p.title=Децентрализованное программное обеспечение Peer-to-Peer
tac.risk.p2p.body=Торговля осуществляется напрямую между пользователями. Разработчики Bisq, участники и Bisq DAO не контролируют средства пользователей и не могут гарантировать успешное завершение сделок или возможность возмещения убытков.
tac.risk.financial.title=Финансовые, технические и регуляторные риски
tac.risk.financial.body=Использование Bisq 2 связано с финансовыми, техническими и регуляторными рисками, включая частичную или полную потерю средств. Уязвимости программного обеспечения, мошенничество, отмены платежей, инциденты безопасности и регуляторные действия могут привести к невозвратным потерям.
tac.risk.noGuarantees.title=Нет гарантии восстановления или компенсации
tac.risk.noGuarantees.body=Разрешение споров может помочь в некоторых ситуациях, но восстановление, возмещение или компенсация не могут быть гарантированы. Пользователи остаются ответственными за свои сделки, платежи и локальные данные.
tac.risk.confirm.headline=Пожалуйста, подтвердите следующее:
tac.risk.accept.loss=Использование Bisq 2 может привести к частичной или полной потере средств.
tac.risk.accept.noRecovery=Восстановление, возмещение или компенсация не гарантируются.


tac.legal.headline=Юридические условия
tac.legal.section1.title=Отказ от гарантии и ограничения ответственности
tac.legal.section1.body=Bisq 2 является бесплатным и открытым программным обеспечением, выпущенным под лицензией GNU Affero General Public License. В максимальной степени, разрешенной применимым законодательством, программное обеспечение предоставляется на условиях "как есть" и "как доступно", без каких-либо гарантий или заявлений любого рода, включая товарную пригодность, соответствие определенной цели, право собственности, отсутствие нарушений, доступность, точность, безопасность или безошибочную работу.\nЗа исключением случаев умысла, грубой неосторожности, личного вреда или когда ответственность не может быть исключена в соответствии с применимым законодательством, ни один правообладатель, разработчик, участник, участник Bisq DAO, медиатор, арбитр, агент по возврату средств или другой участник проекта не несет ответственности за убытки, возникающие в результате использования, невозможности использования или сбоя программного обеспечения. Это включает, помимо прочего, потерю средств, цифровых активов, прибыли, данных, торговых возможностей, деловой репутации, дефекты программного обеспечения, уязвимости безопасности, сбои протокола, неточные данные, мошенничество, отмену платежей или атаки третьих лиц, даже если было предупреждено о возможности таких убытков.
tac.legal.section2.title=Ответственность пользователя и отсутствие советов
tac.legal.section2.body=Пользователи несут полную ответственность за использование программного обеспечения и за обеспечение того, чтобы их использование не нарушало применимые законы, нормативные акты, налоговые обязательства или требования к отчетности в их юрисдикции. Bisq не предоставляет финансовых, инвестиционных, налоговых, юридических или регуляторных консультаций. Пользователи несут ответственность за принятие собственных решений и получение независимых консультаций, когда это необходимо.
tac.legal.section3.title=Информация и инфраструктура
tac.legal.section3.body=Рыночные цены, оценки комиссий, данные сети, сообщения от участников, предложения и другая информация могут быть неточными, неполными, задержанными, недоступными или предоставлены третьими сторонами или инфраструктурой, управляемой участниками Bisq DAO. Пользователи несут ответственность за независимую проверку всей информации перед тем, как на нее полагаться.
tac.legal.section4.title=Риски внешних платежей
tac.legal.section4.body=Фиатные и другие внешние методы оплаты обрабатываются вне Bisq 2 и подлежат правилам, доступности, лимитам, комиссиям, требованиям верификации, политикам возврата платежей и действиям поставщиков услуг оплаты, банков и других третьих сторон. Эти методы оплаты могут включать возвраты платежей, отмену платежей, мошенничество, банковские ограничения, заморозку аккаунтов, задержки или регуляторные действия. Пользователи признают и принимают эти риски.
tac.legal.section5.title=Ограничения разрешения споров
tac.legal.section5.body=Споры, возникающие из сделок, проведенных через программное обеспечение, могут быть рассмотрены через процесс разрешения споров Bisq в соответствии с процедурами, опубликованными проектом Bisq 2 на момент спора. Разрешение споров не является гарантией восстановления, возмещения, исполнения или компенсации и может быть недоступно в любых обстоятельствах. Bisq DAO, разработчики, участники, медиаторы, арбитры, агенты по возврату и другие участники проекта не обязаны компенсировать пользователям убытки от торговли, уязвимости программного обеспечения, инциденты безопасности, мошенничество или другие убытки.
tac.legal.section6.title=Нет роли хранения или посредника
tac.legal.section6.body=Bisq 2 — это децентрализованное пиринговое программное обеспечение, разработанное и поддерживаемое через модель управления с открытым исходным кодом, известную как Bisq DAO. Ни одна центральная организация не контролирует сеть, не хранит средства пользователей, не выступает в роли брокера, биржи, процессора платежей, агента по эскроу, фидуциарного лица или контрагента по сделкам, и не гарантирует доступность, работу или будущее развитие программного обеспечения.
tac.legal.section7.title=Конфиденциальность и локальные данные
tac.legal.section7.body=Пользователи несут ответственность за защиту своих локальных данных приложения, паролей, ключей идентификации, информации о платежном аккаунте и записей о сделках. Подробности о сделках и платежах могут быть переданы торговым партнёрам и, в случае открытия спора, медиаторам, арбитрам, агентам по возврату средств или другим участникам, вовлечённым в процесс разрешения споров.
tac.legal.confirm=Я прочитал и принимаю эти условия.


