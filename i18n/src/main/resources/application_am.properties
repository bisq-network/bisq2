contactsList.introHeadline=እነዚህ እንዴት ይሠራሉ

contactsList.introMain=የኮንታክቶች ዝርዝር የታመነ ተወካዮችን ለመለየት ይረዳዎታል እና እንደ ተወካይ ማስተዋል ይከለክላል።\nአንድ የተሳካ ግብይት በኋላ ተጠቃሚ መጨመር ይችላሉ እና ወደፊት የሚካሄዱ ግንኙነቶች ከአንደኛው ሰው ጋር ይሆናሉ።

contactsList.introDetails=ይህ ለምን አስፈላጊ ነው፦\nBisq2 በአራት የመገለጫ አካል የማስተዳደር ዕድል ይጠብቃል፡ የመገለጫ መለያ፣ Nym፣ የመገለጫ አይነት፣ እና የተወዳጅ ስም።\nነገር ግን፣ መገለጫዎች በ15 ቀን ውስጥ የማይኖሩ በኋላ ከአውታረመረብ ይሰረዝ። ከተሰረዘ በኋላ፣ ማንኛውም ሰው ከአንደኛው የተወዳጅ ስም ጋር አዲስ መገለጫ ማቅረብ ይችላል እና ያንን ተጠቃሚ ይወክል።\nይህን አደጋ ለማስቀመጥ፣ Bisq2 እንደ እንቅስቃሴ ይወዳድር የሚገናኝ ተጠቃሚዎችን ወደ የእርስዎ የእውቀት ዝርዝር ይጨምራል።\nይህን በSettings > More options > "Add contacts automatically" ውስጥ መክፈቻ ይችላሉ።

contactsList.table.tableInfo.title=አዲስ እንግዳ ነዎት? እንዴት እንደሚሰራ አጠቃላይ እይታ
contactsList.table.tableInfo.content=እንግዶች ተጠቃሚዎችን ማከበር በማስቻል አዲስ ደረጃ የደህንነት ጥበቃ የሚጨምር ተወዳዳሪ መሳሪያ ነው። \n\nለምሳሌ፣ ከአንድ ጋር የተሳካ ግብይት ከመጨረሻ በኋላ ይህን ተጠቃሚ ወደ ዝርዝር በመጨመር በሚቀጥለው ጊዜ እርግጠኛ ነው ይህ ተጠቃሚ እንደሆነ። \n\nBisq2 በመገለጫ መታወቂያ፣ Nym፣ መገለጫ አይነት እና የተጠቃሚ ስም በመጠቀም የተጠቃሚ መገለጫ የማስተዳደር ዝርዝር ይሰጣል። ነገር ግን፣ መገለጫዎች ከ15 ቀናት የማይኖሩ ወቅት በኋላ ከአውታረመረብ ይሰረዝ። ከመገለጫው በኋላ ከወንጀል ተጠቃሚ ይህን የተጠቃሚ ስም በአንድ የተመለከተ መገለጫ ይፈጥራል። \n\nይህን ሂደት ለእርስዎ በአውታረመረብ ላይ እንደምን ይጠቀሙ የሚለው ዝርዝር ወደዚህ ይጨምራል። ይህን በ"መርጃዎች በራስ ማስገባት" አማራጭ በ"ቅንብር" ምንጭ > "በተጨማሪ አማራጭ" ክፍል በመጠቀም ይቀይሩ።
