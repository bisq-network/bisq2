tac.risk.headline=የአደጋዎችን እንደምን እንደምን ይረዳ
tac.risk.p2p.title=የተለያዩ የእንቅስቃሴ የሶፍትዌር
tac.risk.p2p.body=ግብይቶች በቀጥታ በተጠቃሚዎች መካከል ይካሄዳሉ። Bisq እንደ አንደኛ የሚሰጥ እና የBisq DAO የሚሰጥ የተጠቃሚ ገንዘብ አይታወቅም እና ግብይቶች በተሳካ ሁኔታ ይጨርሳሉ ወይም እንደ ወጪ ይታወቃሉ ይታወቃሉ።
tac.risk.financial.title=የፋይናንስ እና ቴክኒካዊ እና የደንበኛ አዋጅ አደጋዎች
tac.risk.financial.body=Bisq 2 እንደ ተጠቃሚ የገንዘብ፣ የቴክኖሎጂ፣ እና የሕግ አደጋዎችን ይዟል፣ ይህም የገንዘብ ክፍያዎች ከአንድ ክፍል ወይም ከሙሉ ገንዘብ ግድ ይወዳድር። የሶፍትዌር ውስጥ አስተዋፅኦዎች፣ ተሳትፎ፣ የክፍያ መረጃዎች መመለስ፣ የደህንነት ክስተቶች፣ እና የሕግ እንቅስቃሴዎች ወደ ይህ ይወዳድር ይችላሉ።
tac.risk.noGuarantees.title=የመመለስ ወይም እንደገና እንደገና አስተዳዳሪ የለም
tac.risk.noGuarantees.body=የግጭት አስተባባሪ በአንዳንድ ሁኔታዎች ሊረዳ ይችላል፣ ነገር ግን እንደገና መወዳደር፣ እንደገና እንደገና እንደገና ይህ አልተረጋገጠም። ተጠቃሚዎች ለግብይቶቻቸው፣ ክፍያዎቻቸው እና አካባቢ ውሂብ ላይ እንደገና እንደገና ይቀበሉ።
tac.risk.confirm.headline=እባኮትን የታቀደ ነገር ይቀበሉ:
tac.risk.accept.loss=Bisq 2 እንደ ተጠቃሚ መጠቀም የገንዘብ ክፍያ አንድ ወይም በሙሉ እንደ ገንዘብ ጥፋት ይወድቃል።
tac.risk.accept.noRecovery=የመመለስ ፣ የመክፈያ ወይም የክፍያ እንደማይኖር ይታወቃል።


tac.legal.headline=የሕግ ቃል ምርጫ
tac.legal.section1.title=የዋለንታ አስተያየት እና የኃላፊነት ወረዳዎች
tac.legal.section1.body=Bisq 2 is free and open-source software released under the GNU Affero General Public License. To the maximum extent permitted by applicable law, the software is provided on an "as is" and "as available" basis, without warranties or representations of any kind, including merchantability, fitness for a particular purpose, title, non-infringement, availability, accuracy, security, or error-free operation.\nExcept in cases of intent, gross negligence, personal injury, or where liability cannot be excluded under applicable law, no copyright holder, developer, contributor, Bisq DAO participant, mediator, arbitrator, refund agent, or other project participant shall be liable for damages arising from the use of, inability to use, or malfunction of the software. This includes, without limitation, loss of funds, digital assets, profits, data, trading opportunities, goodwill, software defects, security vulnerabilities, protocol failures, inaccurate data, fraud, payment reversals, or third-party attacks, even if advised of the possibility of such damages.
tac.legal.section2.title=የተጠቃሚ ኃላፊነት እና ምክር የለም
tac.legal.section2.body=ተጠቃሚዎች የሶፍትዌሩን እና በእነሱ ላይ የሚተገበር የሕግ ወይም የደንብ ግዴታዎችን ይጠብቃሉ። Bisq የገንዘብ፣ የእንቅስቃሴ፣ የግብይት፣ የሕግ ወይም የደንብ አማካሪ አይሰጥም። ተጠቃሚዎች የራሳቸውን ውሳኔዎች ማድረግ እና የተገቢ አማካሪ ማግኘት ይጠብቃሉ።
tac.legal.section3.title=መረጃ እና ኢንፍራስትራቸር
tac.legal.section3.body=የገበያ ዋጋዎች፣ የክፍያ ግምቶች፣ የአውታረመረብ ውሂብ፣ የተወካዮች መልእክቶች፣ ቅናሽዎች፣ እና ሌላ መረጃ ይህ ይህ የተሳሳተ፣ የተሟላ ወይም የተወደደ ወይም የማይገኝ ወይም በBisq DAO ወደ ተሳታፊዎች የተሰጠ ወይም በተቀማጭ የተሰጠ ይሆናል። ተጠቃሚዎች ሁሉንም መረጃ ላይ መመር ይወዳድሩ ይገባል።
tac.legal.section4.title=የውጭ ክፍያ አደጋዎች
tac.legal.section4.body=Fiat እና ሌሎች ውስጥ ያልተገኙ የክፍያ ዘዴዎች በBisq 2 ውስጥ ይከናወናሉ እና ወደ የክፍያ ተቋማት፣ ባንኮች እና ሌላ ሶስተኛ ወገኖች የተወሰኑ ህጎች፣ እንቅስቃሴዎች፣ የክፍያ ክፍያዎች፣ የማረጋገጫ መስፈርቶች፣ የተመለስ እንቅስቃሴዎች እና የሂሳብ መዝግቦች ይኖራሉ። እነዚህ የክፍያ ዘዴዎች የተመለስ እንቅስቃሴዎች፣ የክፍያ መለወጥ፣ ማስታወቂያ፣ የባንክ ግዴታዎች፣ የመለያ መዝግቦች፣ የቆይታ ወይም የህግ እንቅስቃሴዎች ይኖራሉ። ተጠቃሚዎች እነዚህን አደጋዎች ይታወቃሉ እና ይቀበሉ።
tac.legal.section5.title=የግጭት መፍትሄ ወሰንዎች
tac.legal.section5.body=ግጭቶች በሶፍትዌር ውስጥ የተካሄደ ግብይት የሚከሰቱ ይታወቃሉ እና በግጭት ወቅት በBisq 2 ፕሮጀክት የታተመ ሂደት መሠረት ይታወቃሉ። የግጭት መፍትሄ የመመለስ፣ የክፍያ መመለስ፣ የእንፍሳት ወይም የእንደገና እንደገና ይረዳል ወይም በሁሉም ሁኔታዎች ይገኛል የለም። የBisq DAO፣ እንደ እንደ ወዳጅ ወይም የግጭት አስተባባሪዎች፣ የመመለስ ወይም የተሳታፊ ወይም ሌላ ፕሮጀክት ተሳታፊዎች በግብይት እንደገና የሚከሰቱ አይነት እንደገና ይረዳሉ።
tac.legal.section6.title=የማይያይ ወይም መካከለኛ ሚና
tac.legal.section6.body=Bisq 2 የተለያዩ ተወዳዳሪ የአንደኛ ወደ አንደኛ ሶፍትዌር ነው የተነሳ እና የተጠበቀ በአንደኛ የምንባዕ አስተዳደር ሞዴል የተቀመጠ የBisq DAO ይባላል። ምንም የማንኛውም መዋቅር አንደኛ የሚቀጥለውን አይቀበልም፣ የተጠቃሚ ገንዘብ ይወዳድር፣ እንደ ወንበር፣ የገንዘብ ምርት፣ የክፍያ አስተዳዳሪ፣ የተወካይ፣ ወይም የግብይት ተወካይ ይሆናል፣ ወይም የሶፍትዌሩን እንደ ወይዘር ይወዳድር፣ ወይም የወይዘር ዕድል ይወዳድር።
tac.legal.section7.title=የግል መረጃ እና አካባቢ ውሂብ
tac.legal.section7.body=ተጠቃሚዎች የእነሱን የአካባቢ አፕሊኬሽን ውሂብ፣ የይለፍ ቃላት፣ የመለያ ቁልፎች፣ የክፍያ መለያ መረጃ፣ እና የግብይት ታቅዶች መግባቢያ ይጠብቃሉ። የግብይት እና የክፍያ ዝርዝሮች ከግብይት እንደሚሆን ጋር ይጋራሉ እና ከግጭት ተነሳ ከመካከለኛዎች፣ የግጭት አስተባባሪዎች፣ የመመለስ ወንበር አባላት ወይም በግጭት መፍትሔ ሂደት ውስጥ የሚሳተፉ ሌሎች አባላት ጋር ይጋራሉ።
