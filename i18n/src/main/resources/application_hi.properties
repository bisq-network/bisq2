updater.furtherInfo=यह अपडेट पुनः प्रारंभ के बाद लोड होगा और इसके लिए नए इंस्टॉलेशन की आवश्यकता नहीं है।\nअधिक जानकारी रिलीज़ पृष्ठ पर मिल सकती है:
updater.furtherInfo.isLauncherUpdate=इस अपडेट के लिए नए Bisq इंस्टॉलेशन की आवश्यकता है।\nयदि आपको macOS पर Bisq स्थापित करते समय समस्याएँ आती हैं, तो कृपया निर्देश पढ़ें:
updater.download=डाउनलोड करें और सत्यापित करें
updater.downloadLater=बाद में डाउनलोड करें
updater.ignore=इस संस्करण को अनदेखा करें
updater.shutDown=बंद करें
updater.shutDown.isLauncherUpdate=डाउनलोड निर्देशिका खोलें और बंद करें

updater.downloadAndVerify.headline=नया संस्करण डाउनलोड और सत्यापित करें
updater.downloadAndVerify.info=एक बार सभी फ़ाइलें डाउनलोड हो जाने के बाद, साइनिंग कुंजी को एप्लिकेशन में प्रदान की गई कुंजियों और Bisq वेबसाइट पर उपलब्ध कुंजियों के साथ तुलना की जाती है। इस कुंजी का उपयोग फिर डाउनलोड की गई नई संस्करण ('desktop.jar') को सत्यापित करने के लिए किया जाता है।
