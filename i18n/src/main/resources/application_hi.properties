tac.headline=उपयोगकर्ता समझौता
tac.confirm=मैंने पढ़ा है और समझा है
tac.accept=उपयोगकर्ता समझौते को स्वीकार करें
tac.reject=अस्वीकृत करें और बाहर निकलें

tac.risk.headline=जोखिमों को समझें
tac.risk.p2p.title=विकेंद्रीकृत पीयर-टू-पीयर सॉफ़्टवेयर
tac.risk.p2p.body=व्यापार सीधे उपयोगकर्ताओं के बीच किए जाते हैं। Bisq डेवलपर्स, योगदानकर्ता, और Bisq DAO उपयोगकर्ता निधियों पर नियंत्रण नहीं रखते हैं और यह सुनिश्चित नहीं कर सकते कि व्यापार सफलतापूर्वक पूरा होंगे या कि नुकसान की वसूली की जा सकेगी।
tac.risk.financial.title=वित्तीय, तकनीकी, और नियामक जोखिम
tac.risk.financial.body=Bisq 2 का उपयोग करने में वित्तीय, तकनीकी, और नियामक जोखिम शामिल हैं, जिसमें धन का आंशिक या पूर्ण नुकसान हो सकता है। सॉफ़्टवेयर की कमजोरियाँ, धोखाधड़ी, भुगतान उलटाव, सुरक्षा घटनाएँ, और नियामक कार्रवाई अनुत्पादक हानियों का कारण बन सकती हैं।
tac.risk.noGuarantees.title=कोई पुनर्प्राप्ति या मुआवजे की गारंटी नहीं
tac.risk.noGuarantees.body=विवाद समाधान कुछ स्थितियों में सहायता कर सकता है, लेकिन पुनर्प्राप्ति, प्रतिपूर्ति या मुआवजे की गारंटी नहीं दी जा सकती। उपयोगकर्ता अपने व्यापार, भुगतान और स्थानीय डेटा के लिए जिम्मेदार रहते हैं।
tac.risk.confirm.headline=कृपया निम्नलिखित को स्वीकार करें:
tac.risk.accept.loss=Bisq 2 का उपयोग करने से धन का आंशिक या पूर्ण हानि हो सकती है।
tac.risk.accept.noRecovery=पुनर्प्राप्ति, प्रतिपूर्ति, या मुआवजा की गारंटी नहीं है।


tac.legal.headline=कानूनी शर्तें
tac.legal.section1.title=वारंटी अस्वीकरण और देयता सीमाएँ
tac.legal.section1.body=Bisq 2 एक मुफ्त और ओपन-सोर्स सॉफ़्टवेयर है जिसे GNU Affero जनरल पब्लिक लाइसेंस के तहत जारी किया गया है। अधिकतम सीमा तक, जो लागू कानून द्वारा अनुमत है, सॉफ़्टवेयर "जैसा है" और "जैसा उपलब्ध है" के आधार पर प्रदान किया गया है, बिना किसी प्रकार की वारंटी या प्रतिनिधित्व के, जिसमें व्यापारिकता, विशेष उद्देश्य के लिए उपयुक्तता, शीर्षक, उल्लंघन न होना, उपलब्धता, सटीकता, सुरक्षा, या त्रुटि-मुक्त संचालन शामिल हैं।\nइरादे, गंभीर लापरवाही, व्यक्तिगत चोट, या जहां लागू कानून के तहत देयता को बाहर नहीं किया जा सकता है, के मामलों को छोड़कर, कोई भी कॉपीराइट धारक, डेवलपर, योगदानकर्ता, Bisq DAO प्रतिभागी, मध्यस्थ, मध्यस्थ, रिफंड एजेंट, या अन्य परियोजना प्रतिभागी सॉफ़्टवेयर के उपयोग, उपयोग में असमर्थता, या सॉफ़्टवेयर के खराबी से उत्पन्न होने वाले नुकसान के लिए उत्तरदायी नहीं होगा। इसमें, बिना किसी सीमा के, धन, डिजिटल संपत्तियों, लाभ, डेटा, व्यापार के अवसरों, goodwill, सॉफ़्टवेयर दोषों, सुरक्षा कमजोरियों, प्रोटोकॉल विफलताओं, गलत डेटा, धोखाधड़ी, भुगतान उलटने, या तीसरे पक्ष के हमलों का नुकसान शामिल है, भले ही ऐसे नुकसान की संभावना के बारे में सूचित किया गया हो।
tac.legal.section2.title=उपयोगकर्ता की जिम्मेदारी और कोई सलाह नहीं
tac.legal.section2.body=उपयोगकर्ता सॉफ़्टवेयर के अपने उपयोग के लिए पूरी तरह से जिम्मेदार हैं और यह सुनिश्चित करने के लिए कि उनका उपयोग लागू कानूनों, नियमों, कर दायित्वों या उनकी न्यायालय क्षेत्र में रिपोर्टिंग आवश्यकताओं का उल्लंघन नहीं करता है। Bisq वित्तीय, निवेश, कर, कानूनी या नियामक सलाह प्रदान नहीं करता है। उपयोगकर्ता अपने स्वयं के निर्णय लेने और जहाँ उपयुक्त हो, स्वतंत्र सलाह प्राप्त करने के लिए जिम्मेदार हैं।
tac.legal.section3.title=जानकारी और अवसंरचना
tac.legal.section3.body=बाजार की कीमतें, शुल्क के अनुमान, नेटवर्क डेटा, पीयर संदेश, ऑफ़र, और अन्य जानकारी गलत, अधूरी, विलंबित, अनुपलब्ध, या Bisq DAO के योगदानकर्ताओं द्वारा संचालित बुनियादी ढांचे या तीसरे पक्ष द्वारा प्रदान की जा सकती है। उपयोगकर्ता इस पर निर्भर करने से पहले सभी जानकारी को स्वतंत्र रूप से सत्यापित करने के लिए जिम्मेदार हैं।
tac.legal.section4.title=बाहरी भुगतान जोखिम
tac.legal.section4.body=फिएट और अन्य बाहरी भुगतान विधियाँ Bisq 2 के बाहर संसाधित की जाती हैं और ये भुगतान प्रदाताओं, बैंकों और अन्य तृतीय पक्षों के नियमों, उपलब्धता, सीमाओं, शुल्क, सत्यापन आवश्यकताओं, चार्जबैक नीतियों और कार्यों के अधीन होती हैं। इन भुगतान विधियों में चार्जबैक, भुगतान उलट, धोखाधड़ी, बैंकिंग प्रतिबंध, खाता फ्रीज, देरी, या नियामक कार्रवाई शामिल हो सकती हैं। उपयोगकर्ता इन जोखिमों को स्वीकार करते हैं।
tac.legal.section5.title=विवाद समाधान सीमाएँ
tac.legal.section5.body=सॉफ़्टवेयर के माध्यम से किए गए व्यापारों से उत्पन्न विवादों को विवाद समाधान प्रक्रिया के माध्यम से संभाला जा सकता है, जो विवाद के समय Bisq 2 परियोजना द्वारा प्रकाशित प्रक्रियाओं के अनुसार है। विवाद समाधान पुनर्प्राप्ति, प्रतिपूर्ति, प्रवर्तन, या मुआवजे की गारंटी नहीं है, और सभी परिस्थितियों में उपलब्ध नहीं हो सकता है। Bisq DAO, डेवलपर्स, योगदानकर्ता, मध्यस्थ, मध्यस्थ, धनवापसी एजेंट, और अन्य परियोजना प्रतिभागियों को व्यापारिक हानियों, सॉफ़्टवेयर कमजोरियों, सुरक्षा घटनाओं, धोखाधड़ी, या अन्य नुकसान के लिए उपयोगकर्ताओं को मुआवजा देने के लिए कोई बाध्यता नहीं है।
tac.legal.section6.title=कोई हिरासत या मध्यस्थ भूमिका
tac.legal.section6.body=Bisq 2 एक विकेंद्रीकृत पीयर-टू-पीयर सॉफ़्टवेयर है जिसे Bisq DAO के रूप में ज्ञात एक ओपन-सोर्स शासन मॉडल के माध्यम से विकसित और बनाए रखा गया है। कोई केंद्रीय इकाई नेटवर्क को नियंत्रित नहीं करती है, उपयोगकर्ता निधियों की सुरक्षा नहीं करती है, ब्रोकर, एक्सचेंज, भुगतान प्रोसेसर, एस्क्रो एजेंट, फिड्यूशियरी, या ट्रेडों के लिए प्रतिपक्ष के रूप में कार्य नहीं करती है, या सॉफ़्टवेयर की उपलब्धता, संचालन, या भविष्य के विकास की गारंटी नहीं देती है।
tac.legal.section7.title=गोपनीयता और स्थानीय डेटा
tac.legal.section7.body=उपयोगकर्ता अपने स्थानीय एप्लिकेशन डेटा, पासवर्ड, पहचान कुंजी, भुगतान-खाता जानकारी, और व्यापार रिकॉर्ड की सुरक्षा के लिए जिम्मेदार होते हैं। व्यापार और भुगतान विवरण व्यापार सहयोगियों के साथ साझा किए जा सकते हैं और, यदि कोई विवाद खोला जाता है, तो मध्यस्थों, मध्यस्थों, धनवापसी एजेंटों, या विवाद समाधान प्रक्रिया में शामिल अन्य प्रतिभागियों के साथ भी साझा किए जा सकते हैं।
tac.legal.confirm=मैंने इन शर्तों को पढ़ा है और स्वीकार करता हूँ।


