tac.legal.headline=法律條款
tac.legal.section1.title=保證免責聲明及責任限制
tac.legal.section1.body=Bisq 2 是根據 GNU Affero 通用公共許可證發佈的免費開源軟體。在適用法律允許的最大範圍內，該軟體以「現狀」和「可用」的基礎提供，並不提供任何形式的保證或聲明，包括適銷性、特定用途的適用性、所有權、非侵權、可用性、準確性、安全性或無錯誤操作。\n除非在故意、重大過失、個人傷害的情況下，或在適用法律下無法排除責任的情況下，否則任何版權持有人、開發者、貢獻者、Bisq DAO 參與者、調解員、仲裁員、退款代理或其他項目參與者均不對因使用、無法使用或軟體故障而產生的損害負責。這包括但不限於資金、數位資產、利潤、數據、交易機會、商譽、軟體缺陷、安全漏洞、協議失敗、不準確數據、詐騙、支付撤銷或第三方攻擊的損失，即使已被告知此類損害的可能性。
tac.legal.section2.title=使用者責任與無建議
tac.legal.section2.body=使用者對其使用該軟體的行為負全責，並需確保其使用不違反其管轄區內的適用法律、法規、稅務義務或報告要求。Bisq 不提供財務、投資、稅務、法律或監管建議。使用者需自行做出決策，並在適當的情況下獲取獨立建議。
tac.legal.section3.title=資訊與基礎設施
tac.legal.section3.body=市場價格、費用估算、網路數據、對等消息、報價及其他資訊可能不準確、不完整、延遲、無法獲得，或由 Bisq DAO 的貢獻者所運營的第三方或基礎設施提供。使用者有責任在依賴這些資訊之前獨立驗證所有資訊。
tac.legal.section4.title=外部支付風險
tac.legal.section4.body=法定貨幣及其他外部支付方式在 Bisq 2 之外處理，並受支付提供者、銀行及其他第三方的規則、可用性、限制、費用、驗證要求、退款政策及行動的約束。這些支付方式可能涉及退款、支付撤銷、詐騙、銀行限制、帳戶凍結、延遲或監管行動。使用者承認並接受這些風險。
tac.legal.section5.title=爭議解決限制
tac.legal.section5.body=透過該軟體進行的交易所產生的爭議，可以依據 Bisq 2 專案在爭議發生時所發布的程序，透過 Bisq 的爭議解決流程進行處理。爭議解決並不保證能夠恢復、補償、執行或賠償，並且在所有情況下可能無法提供。Bisq DAO、開發者、貢獻者、調解員、仲裁員、退款代理人及其他專案參與者並無義務對使用者的交易損失、軟體漏洞、安全事件、詐騙或其他損害進行賠償。
tac.legal.section6.title=無保管或中介角色
tac.legal.section6.body=Bisq 2 是去中心化的點對點軟體，通過一個稱為 Bisq DAO 的開源治理模型進行開發和維護。沒有中央實體控制網路、持有用戶資金、充當經紀人、交易所、支付處理器、保管代理、受託人或交易對手，亦不保證軟體的可用性、運作或未來開發。
tac.legal.section7.title=隱私與本地資料
tac.legal.section7.body=使用者負責保護其本地應用程式資料、密碼、身份金鑰、支付帳戶資訊及交易紀錄。交易和支付細節可能會與交易夥伴分享，並且如果開啟爭議，則會與調解員、仲裁員、退款代理或其他參與爭議解決過程的參與者分享。
tac.legal.confirm=我已閱讀並接受這些條款。


