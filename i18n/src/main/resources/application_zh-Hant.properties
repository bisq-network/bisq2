tac.risk.financial.body=使用 Bisq 2 涉及財務、技術和監管風險，包括部分或全部資金損失。軟體漏洞、詐騙、付款撤銷、安全事件和監管行動可能導致無法挽回的損失。
tac.risk.noGuarantees.title=無法保證恢復或賠償
tac.risk.noGuarantees.body=爭議解決在某些情況下可能會提供協助，但無法保證恢復、報銷或賠償。用戶仍需對其交易、支付和本地數據負責。
