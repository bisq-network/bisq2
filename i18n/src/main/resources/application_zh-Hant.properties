contactsList.table.columns.actionsMenu.removeContact=您確定要刪除此聯絡人嗎？\n\n刪除聯絡人後，與此對等方相關的任何標籤、信任分數或備註將被永久刪除。

contactsList.introPreface=新接觸聯絡人？
contactsList.introHeadline=這是如何運作的

contactsList.introMain=聯絡人幫助您識別可信的對等方並避免冒充。\n在成功交易後，您可以添加用戶以確保未來的互動是與同一個人進行。

contactsList.introDetails=為什麼這很重要：\nBisq2 已經透過四個個人資料元素來幫助防止冒充：個人資料ID、Nym、個人資料圖示和暱稱。\n然而，個人資料在 15 天不活動後會從網路中移除。一旦移除，其他人可以重新創建一個具有相同暱稱的個人資料並冒充該用戶。\n為了降低這個風險，Bisq2 會自動將您互動過的用戶添加到您的聯絡人列表中。\n您可以在設定 > 更多選項 > "自動添加聯絡人" 中禁用此功能。

contactsList.table.tableInfo.title=新手使用聯絡人？這裡是如何運作的概覽
contactsList.table.tableInfo.content=聯絡人是一個多功能工具，通過讓您跟蹤您的同行，增加了一層新的安全保護。\n\n例如，為了防止用戶冒充，在與某人成功交易後，您可以將該用戶添加到聯絡人中，以確保下次互動時確實是同一個用戶。\n\nBisq2 已經通過使用構成用戶資料的四個元素：資料ID、Nym、資料圖示和暱稱，提供了防止冒充的安全性。然而，資料在15天不活躍後會從網路中刪除。一旦資料被移除，惡意行為者可能會創建一個使用相同暱稱的新資料，試圖冒充該用戶。\n\n我們已經為您簡化了這個過程，通過自動將您在使用應用程式時互動的所有用戶添加到此列表中。您可以通過在「設定」菜單 > 「更多選項」部分中使用「自動添加聯絡人」選項來關閉此功能。
