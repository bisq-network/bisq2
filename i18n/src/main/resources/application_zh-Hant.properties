tac.risk.headline=了解風險
tac.risk.p2p.title=去中心化點對點軟體
tac.risk.p2p.body=交易是直接在用戶之間進行的。Bisq 開發者、貢獻者和 Bisq DAO 不控制用戶資金，無法保證交易會成功完成或損失能夠被追回。
