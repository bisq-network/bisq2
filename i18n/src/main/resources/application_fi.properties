tac.risk.headline=Ymmärrä riskit
tac.risk.p2p.title=Hajautettu vertaisverkko-ohjelmisto
tac.risk.p2p.body=Kaupat tehdään suoraan käyttäjien välillä. Bisqin kehittäjät, osallistujat ja Bisq DAO eivät hallitse käyttäjien varoja eivätkä voi taata, että kaupat onnistuvat tai että tappioita voidaan palauttaa.
tac.risk.financial.title=Rahoitus-, tekniset- ja sääntelyriskit
tac.risk.financial.body=Bisq 2:n käyttäminen sisältää taloudellisia, teknisiä ja sääntelyyn liittyviä riskejä, mukaan lukien osittainen tai täydellinen varojen menetys. Ohjelmistovulnerabiliteetit, petokset, maksujen peruutukset, turvallisuustapahtumat ja sääntelytoimet voivat johtaa palautumattomiin tappioihin.
tac.risk.noGuarantees.title=Ei takuuta palautuksesta tai korvauksesta
tac.risk.noGuarantees.body=Riidanratkaisu voi auttaa joissakin tilanteissa, mutta palautusta, hyvitystä tai korvausta ei voida taata. Käyttäjät ovat edelleen vastuussa kaupoistaan, maksuistaan ja paikallisista tiedoistaan.
tac.risk.confirm.headline=Ole hyvä ja vahvista seuraavat asiat:
tac.risk.accept.loss=Bisq 2:n käyttö voi johtaa osittaiseen tai täydelliseen varojen menetykseen.
tac.risk.accept.noRecovery=Palautusta, korvausta tai hyvitystä ei taata.


tac.legal.headline=Oikeudelliset ehdot
tac.legal.section1.title=Takuuvelvoite ja vastuurajat
tac.legal.section1.body=Bisq 2 on ilmainen ja avoimen lähdekoodin ohjelmisto, joka on julkaistu GNU Affero General Public License -lisenssin alaisuudessa. Siltä osin kuin voimassa oleva laki sen sallii, ohjelmistoa tarjotaan "sellaisena kuin se on" ja "saatavilla olevana", ilman minkäänlaisia takuita tai vakuutuksia, mukaan lukien kaupallisuus, soveltuvuus tiettyyn tarkoitukseen, omistusoikeus, loukkaamattomuus, saatavuus, tarkkuus, turvallisuus tai virheettömästi toimiminen.\nPaitsi tahallisen toiminnan, törkeän huolimattomuuden, henkilövahinkojen tai tilanteiden osalta, joissa vastuuta ei voida sulkea pois voimassa olevan lain mukaan, mikään tekijänoikeuden haltija, kehittäjä, osallistuja, Bisq DAO -osallistuja, sovittelija, välimies, hyvityksen käsittelijä tai muu projektin osallistuja ei ole vastuussa vahingoista, jotka johtuvat ohjelmiston käytöstä, käytön mahdottomuudesta tai ohjelmiston toimintahäiriöistä. Tämä sisältää ilman rajoituksia varojen, digitaalisten omaisuuksien, voittojen, tietojen, kaupankäyntimahdollisuuksien, goodwillin, ohjelmistovirheiden, turvallisuusvulnerabiliteettien, protokollan epäonnistumisten, virheellisten tietojen, petosten, maksujen palautusten tai kolmansien osapuolten hyökkäysten menetykset, vaikka olisi ilmoitettu tällaisten vahinkojen mahdollisuudesta.
tac.legal.section2.title=Käyttäjän vastuu ja ei-neuvontaa
tac.legal.section2.body=Käyttäjät ovat yksin vastuussa ohjelmiston käytöstään ja siitä, että heidän käyttönsä ei riko soveltuvia lakeja, sääntöjä, verovelvoitteita tai raportointivaatimuksia heidän toimivalta-alueellaan. Bisq ei tarjoa taloudellista, sijoitus-, verotus-, oikeudellista tai sääntelyneuvontaa. Käyttäjät ovat vastuussa omista päätöksistään ja itsenäisen neuvonnan hankkimisesta, kun se on tarpeen.
tac.legal.section3.title=Tieto ja infrastruktuuri
tac.legal.section3.body=Markkinahinnat, maksuarviot, verkkodata, vertaisviestit, tarjoukset ja muu tieto voivat olla epätarkkoja, puutteellisia, viivästyneitä, saatavilla olevia tai kolmansien osapuolten tai Bisq DAO:n osallistujien ylläpitämän infrastruktuurin tarjoamia. Käyttäjät ovat vastuussa kaikkien tietojen itsenäisestä vahvistamisesta ennen niiden varaan luottamista.
tac.legal.section4.title=Ulkoiset maksuriskit
tac.legal.section4.body=Fiat ja muut ulkoiset maksutavat käsitellään Bisq 2:n ulkopuolella ja ne ovat maksupalveluntarjoajien, pankkien ja muiden kolmansien osapuolien sääntöjen, saatavuuden, rajoitusten, maksujen, vahvistusvaatimusten, takaisinperintäkäytäntöjen ja toimien alaisia. Nämä maksutavat voivat sisältää takaisinperintöjä, maksujen peruuttamista, petoksia, pankkirajoituksia, tilin jäädyttämistä, viivästyksiä tai sääntelytoimia. Käyttäjät tunnustavat ja hyväksyvät nämä riskit.
tac.legal.section5.title=Riitojen ratkaisun rajat
tac.legal.section5.body=Kaupasta johtuvat riidat, jotka on käyty ohjelmiston kautta, voidaan käsitellä Bisqin riidanratkaisuprosessin kautta Bisq 2 -projektin julkaisemien menettelyjen mukaisesti riidan aikana. Riidanratkaisu ei takaa palautusta, hyvitystä, täytäntöönpanoa tai korvausta, eikä se välttämättä ole saatavilla kaikissa olosuhteissa. Bisq DAO, kehittäjät, osallistujat, sovittelijat, välimiehet, hyvitystoimijat ja muut projektin osallistujat eivät ole velvollisia korvaamaan käyttäjille kaupankäynnin menetyksiä, ohjelmistovaurioita, turvallisuusongelmia, petoksia tai muita vahinkoja.
tac.legal.section6.title=Ei säilytys- tai välimiesroolia
tac.legal.section6.body=Bisq 2 on hajautettu vertaisverkko-ohjelmisto, jota kehitetään ja ylläpidetään avoimen lähdekoodin hallintomallin kautta, jota kutsutaan Bisq DAO:ksi. Mikään keskusorganisaatio ei hallitse verkkoa, pidä käyttäjien varoja hallussaan, toimi välittäjänä, pörssinä, maksupalveluntarjoajana, talletustilinä, luottamusmiehenä tai kauppojen vastapuolena, eikä takaa ohjelmiston saatavuutta, toimintaa tai tulevaa kehitystä.
tac.legal.section7.title=Tietosuoja ja paikalliset tiedot
tac.legal.section7.body=Käyttäjät ovat vastuussa paikallisten sovellustietojensa, salasanojensa, henkilöllisyysavaimiensa, maksutilitietojensa ja kaupankäyntitietojensa suojaamisesta. Kauppa- ja maksutiedot voidaan jakaa kaupankäyntikumppaneiden kanssa ja, jos riita avataan, sovittelijoiden, välimiesten, hyvitystoimijoiden tai muiden riidanratkaisuprosessiin osallistuvien osapuolten kanssa.
tac.legal.confirm=Olen lukenut ja hyväksyn nämä ehdot.


