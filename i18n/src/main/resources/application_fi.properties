restoreFromBackup.headline=Tiedostot palautettu varmuuskopiosta
restoreFromBackup.info=Käynnistyksen aikana järjestelmä havaitsi, että jotkin pysyvät tiedostot olivat vaurioituneet tai lukukelvottomia.\nVarmistaakseen, että sovellus pysyy voimassa olevassa tilassa, viimeisimmät saatavilla olevat varmuuskopiot palautettiin automaattisesti.\n\nTarkistakaa avoimet kauppanne varmistaaksenne, että ne ovat odotetussa tilassa.\nJos huomaatte epäjohdonmukaisuuksia tai kohtaatte ongelmia, ottakaa yhteyttä Bisq-yhteisön jäseniin saadaksenne apua.\n\nSeuraavat tallennustiedostot palautettiin varmuuskopiosta:
