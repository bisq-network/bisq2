tac.headline=Gebruikersooreenkoms
tac.confirm=Ek het gelees en verstaan
tac.accept=Aanvaar gebruikersooreenkoms
tac.reject=Verwerp en verlaat

tac.risk.headline=Begryp die Risiko's
tac.risk.p2p.title=Gedesentraliseerde Peer-to-Peer Sagteware
tac.risk.p2p.body=Transaksies word direk tussen gebruikers uitgevoer. Bisq-ontwikkelaars, bydraers en die Bisq DAO beheer nie gebruikersfondse nie en kan nie waarborg dat transaksies suksesvol sal voltooi nie of dat verliese herstel kan word nie.
tac.risk.financial.title=Finansiële, Tegniese, en Regulerende Risiko's
tac.risk.financial.body=Die gebruik van Bisq 2 behels finansiële, tegniese en regulerende risiko's, insluitend gedeeltelike of totale verlies van fondse. Sagteware kwesbaarhede, bedrog, betalingsomkeerde, sekuriteitsvoorvalle en regulerende aksies kan lei tot onherwinbare verliese.
tac.risk.noGuarantees.title=Geen waarborg van herstel of vergoeding
tac.risk.noGuarantees.body=Dispuutoplossing mag in sommige situasies help, maar herstel, terugbetaling of vergoeding kan nie gewaarborg word nie. Gebruikers bly verantwoordelik vir hul handel, betalings en plaaslike data.
tac.risk.confirm.headline=Erken asseblief die volgende:
tac.risk.accept.loss=Die gebruik van Bisq 2 kan lei tot gedeeltelike of totale verlies van fondse.
tac.risk.accept.noRecovery=Herstel, terugbetaling of vergoeding is nie gewaarborg nie.


tac.legal.headline=Regslike Voorwaardes
tac.legal.section1.title=Waarborgontkenning en Aanspreeklikheidsgrense
tac.legal.section1.body=Bisq 2 is gratis en open-source sagteware wat vrygestel is onder die GNU Affero General Public License. Tot die maksimum mate wat deur toepaslike wetgewing toegelaat word, word die sagteware op 'n "soos dit is" en "soos beskikbaar" basis verskaf, sonder waarborge of verteenwoordigings van enige aard, insluitend handelsbaarheid, geskiktheid vir 'n spesifieke doel, titel, nie-inbreuk, beskikbaarheid, akkuraatheid, sekuriteit, of foutlose werking.\nBehalwe in gevalle van opset, grof nalatigheid, persoonlike besering, of waar aanspreeklikheid nie uitgesluit kan word onder toepaslike wetgewing nie, sal geen kopiereghouer, ontwikkelaar, bydraer, Bisq DAO deelnemer, bemiddelaar, skeidsregter, terugbetalingsagent, of ander projekdeelnemer aanspreeklik wees vir skade wat voortspruit uit die gebruik van, onvermoë om te gebruik, of wanfunksie van die sagteware nie. Dit sluit, sonder beperking, verlies van fondse, digitale bates, winste, data, handelsgeleenthede, goodwill, sagtewarefoute, sekuriteitskwesbaarhede, protokol mislukkings, onakkurate data, bedrog, betalingsomkeerde, of derdeparty-aanvalle in, selfs al is daar kennis gegee van die moontlikheid van sulke skade.
tac.legal.section2.title=Gebruikersverantwoordelikheid en Geen Advies
tac.legal.section2.body=Gebruikers is slegs verantwoordelik vir hul gebruik van die sagteware en vir die verseker dat hul gebruik nie toepaslike wette, regulasies, belastingverpligtinge of verslagdoenvereistes in hul jurisdiksie oortree nie. Bisq bied nie finansiële, beleggings-, belasting-, regskundige of regulerende advies nie. Gebruikers is verantwoordelik om hul eie besluite te neem en onafhanklike advies in te win waar toepaslik.
tac.legal.section3.title=Inligting en Infrastruktuur
tac.legal.section3.body=Marktpryse, fooi-skatings, netwerkdata, peer-boodskappe, aanbiedinge, en ander inligting mag onakkuraat, onvolledig, vertraag, onbeskikbaar wees, of verskaf word deur derde partye of infrastruktuur wat deur bydraers tot die Bisq DAO bedryf word. Gebruikers is verantwoordelik om alle inligting onafhanklik te verifieer voordat hulle daarop staatmaak.
tac.legal.section4.title=Eksterne Betaling Risiko's
tac.legal.section4.body=Fiat en ander eksterne betalingsmetodes word buite Bisq 2 verwerk en is onderhewig aan die reëls, beskikbaarheid, perke, fooie, verifikasievereistes, terugbetalingsbeleide en aksies van betalingsverskaffers, banke en ander derde partye. Hierdie betalingsmetodes kan terugbetalings, betalingsherroeping, bedrog, bankbeperkings, rekeningvries, vertragings of regulerende aksies behels. Gebruikers erken en aanvaar hierdie risiko's.
tac.legal.section5.title=Dispuutoplossing Beperkings
tac.legal.section5.body=Dispute wat ontstaan uit handel wat deur die sagteware uitgevoer word, kan hanteer word deur die Bisq dispuutoplossingsproses in ooreenstemming met die prosedures wat deur die Bisq 2 projek gepubliseer is ten tyde van die dispuut. Dispuutoplossing is nie 'n waarborg van herstel, terugbetaling, afdwinging of vergoeding nie, en mag nie in alle omstandighede beskikbaar wees nie. Die Bisq DAO, ontwikkelaars, bydraers, bemiddelaars, skeidsregters, terugbetalingsagente, en ander projekdeelnemers is nie verplig om gebruikers te vergoed vir handelsverliese, sagtewarekwesies, sekuriteitsvoorvalle, bedrog, of ander skade nie.
tac.legal.section6.title=Geen Bewaring of Tussenpersoon Rol
tac.legal.section6.body=Bisq 2 is gedesentraliseerde peer-to-peer sagteware wat ontwikkel en onderhou word deur 'n open-source bestuursmodel bekend as die Bisq DAO. Geen sentrale entiteit beheer die netwerk, hou toesig oor gebruikersfondse, tree op as 'n makelaar, beurs, betalingsverwerker, escrow-agent, fidusiêre, of teenparty vir handel nie, of waarborg die beskikbaarheid, werking, of toekomstige ontwikkeling van die sagteware.
tac.legal.section7.title=Privaatheid en Plaaslike Gegewens
tac.legal.section7.body=Gebruikers is verantwoordelik vir die beskerming van hul plaaslike toepassingsdata, wagwoorde, identiteitsleutels, betalingrekeninginligting en handelrekords. Handel- en betalingsbesonderhede mag gedeel word met handelsvennote en, indien 'n dispuut geopen word, met bemiddelaars, skeidsregters, terugbetalingsagente of ander deelnemers betrokke by die dispuutoplossingsproses.
tac.legal.confirm=Ek het hierdie voorwaardes gelees en aanvaar.


