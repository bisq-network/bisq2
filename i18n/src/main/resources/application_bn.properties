contactsList.table.columns.actionsMenu.removeContact=আপনি কি নিশ্চিত যে আপনি এই যোগাযোগটি মুছে ফেলতে চান?\n\nযোগাযোগটি মুছে ফেলার মাধ্যমে, এই পিয়ারের সাথে যুক্ত যেকোনো ট্যাগ, বিশ্বাস স্কোর বা নোট স্থায়ীভাবে মুছে যাবে।

contactsList.introPreface=কন্ট্যাক্টসে নতুন?
contactsList.introHeadline=এটি কিভাবে কাজ করে

contactsList.introMain=কন্টাক্টস আপনাকে বিশ্বাসযোগ্য সহকর্মীদের চিহ্নিত করতে এবং প্রতারণা এড়াতে সহায়তা করে।\nএকটি সফল ট্রেডের পর, আপনি একটি ব্যবহারকারী যোগ করতে পারেন যাতে নিশ্চিত হন যে ভবিষ্যতের যোগাযোগগুলি একই ব্যক্তির সাথে হচ্ছে।

contactsList.introDetails=কেন এটি গুরুত্বপূর্ণ:\nBisq2 ইতিমধ্যে চারটি প্রোফাইল উপাদান ব্যবহার করে প্রতারণা থেকে রক্ষা করতে সহায়তা করে: প্রোফাইল আইডি, নেম, প্রোফাইল আইকন, এবং ডাকনাম।\nযাইহোক, ১৫ দিনের নিষ্ক্রিয়তার পরে প্রোফাইলগুলি নেটওয়ার্ক থেকে মুছে ফেলা হয়। একবার মুছে গেলে, কেউ একই ডাকনাম সহ একটি প্রোফাইল পুনরায় তৈরি করতে পারে এবং সেই ব্যবহারকারীকে প্রতারণা করতে পারে।\nএই ঝুঁকি কমাতে, Bisq2 স্বয়ংক্রিয়ভাবে আপনার সাথে যোগাযোগ করা ব্যবহারকারীদের আপনার যোগাযোগের তালিকায় যোগ করে।\nআপনি এটি বন্ধ করতে পারেন সেটিংস > আরও বিকল্প > "স্বয়ংক্রিয়ভাবে যোগাযোগ যোগ করুন" এ।

contactsList.table.tableInfo.title=পরিচিতিতে নতুন? এটি কীভাবে কাজ করে তার একটি সারসংক্ষেপ এখানে রয়েছে
contactsList.table.tableInfo.content=পরিচিতি একটি বহুমুখী সরঞ্জাম যা আপনার সহকর্মীদের ট্র্যাক রাখার অনুমতি দিয়ে নিরাপত্তা সুরক্ষার একটি নতুন স্তর যুক্ত করে।\n\nউদাহরণস্বরূপ, ব্যবহারকারীর ছদ্মবেশ প্রতিরোধ করতে, কারো সাথে একটি সফল বাণিজ্য সম্পন্ন করার পরে, আপনি এই ব্যবহারকারীকে যুক্ত করতে পারেন যাতে পরবর্তী সময়ে যখন আপনি যোগাযোগ করবেন তখন এটি সত্যিই সেই একই ব্যবহারকারী।\n\nBisq2 ইতিমধ্যে একটি ব্যবহারকারী প্রোফাইল গঠনকারী চারটি উপাদান ব্যবহার করে ছদ্মবেশের বিরুদ্ধে নিরাপত্তা প্রদান করে: প্রোফাইল ID, Nym, প্রোফাইল আইকন এবং ডাকনাম। তবুও, নিষ্ক্রিয়তার 15 দিন পরে নেটওয়ার্ক থেকে প্রোফাইলগুলি মুছে ফেলা হয়। একবার প্রোফাইল সরানো হলে, একজন দূষিত কর্তা একই ডাকনাম দিয়ে একটি নতুন প্রোফাইল তৈরি করতে পারে সেই ব্যবহারকারীর ছদ্মবেশ ধারণের চেষ্টায়।\n\nআমরা আপনার জন্য এই প্রক্রিয়াটি সহজ করেছি স্বয়ংক্রিয়ভাবে এই তালিকায় সমস্ত ব্যবহারকারীদের যুক্ত করে যাদের সাথে আপনি অ্যাপ ব্যবহার করার সময় যোগাযোগ করেন। আপনি "সেটিংস" মেনু > "আরও বিকল্প" বিভাগে "স্বয়ংক্রিয়ভাবে পরিচিতি যোগ করুন" বিকল্পটি ব্যবহার করে এটি বন্ধ করতে পারেন।
