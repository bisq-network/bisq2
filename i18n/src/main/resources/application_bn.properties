restoreFromBackup.headline=ব্যাকআপ থেকে পুনরুদ্ধার করা ফাইল
restoreFromBackup.info=স্টার্টআপের সময়, সিস্টেমটি সনাক্ত করেছে যে কিছু স্থায়ী ফাইল ক্ষতিগ্রস্ত বা অদৃশ্য ছিল।\nঅ্যাপ্লিকেশনটি একটি বৈধ অবস্থায় থাকে তা নিশ্চিত করার জন্য, সর্বশেষ উপলব্ধ ব্যাকআপগুলি স্বয়ংক্রিয়ভাবে পুনরুদ্ধার করা হয়েছে।\n\nআপনার খোলা ট্রেডগুলি পর্যালোচনা করুন যাতে নিশ্চিত হন যে সেগুলি প্রত্যাশিত অবস্থায় রয়েছে।\nযদি আপনি কোনও অসঙ্গতি লক্ষ্য করেন বা সমস্যার সম্মুখীন হন, তবে সাহায্যের জন্য Bisq অবদানকারীদের সাথে যোগাযোগ করুন।\n\nনিচের স্টোরগুলি ব্যাকআপ থেকে পুনরুদ্ধার করা হয়েছে:
