####################################################################

tac.headline=ব্যবহারকারী চুক্তি
tac.confirm=আমি পড়েছি এবং বুঝেছি
tac.accept=ব্যবহারকারী চুক্তি গ্রহণ করুন
tac.reject=প্রত্যাখ্যান করুন এবং বেরিয়ে যান

tac.risk.headline=ঝুঁকি বোঝা
tac.risk.p2p.title=বিকেন্দ্রীকৃত পিয়ার-টু-পিয়ার সফটওয়্যার
tac.risk.p2p.body=ব্যবহারকারীদের মধ্যে সরাসরি ট্রেড করা হয়। Bisq ডেভেলপার, অবদানকারী এবং Bisq DAO ব্যবহারকারীর তহবিল নিয়ন্ত্রণ করে না এবং ট্রেড সফলভাবে সম্পন্ন হবে বা ক্ষতি পুনরুদ্ধার করা যাবে তা নিশ্চিত করতে পারে না।
tac.risk.financial.title=অর্থনৈতিক, প্রযুক্তিগত এবং নিয়ন্ত্রক ঝুঁকি
tac.risk.financial.body=Bisq 2 ব্যবহার করার মধ্যে আর্থিক, প্রযুক্তিগত, এবং নিয়ন্ত্রক ঝুঁকি রয়েছে, যার মধ্যে তহবিলের আংশিক বা সম্পূর্ণ ক্ষতি অন্তর্ভুক্ত রয়েছে। সফ্টওয়্যার দুর্বলতা, প্রতারণা, পেমেন্ট বিপর্যয়, নিরাপত্তা ঘটনা এবং নিয়ন্ত্রক পদক্ষেপগুলি পুনরুদ্ধারযোগ্য ক্ষতির কারণ হতে পারে।
tac.risk.noGuarantees.title=পুনরুদ্ধার বা ক্ষতিপূরণের কোনো গ্যারান্টি নেই
tac.risk.noGuarantees.body=বিবাদ সমাধান কিছু পরিস্থিতিতে সহায়তা করতে পারে, কিন্তু পুনরুদ্ধার, ফেরত, বা ক্ষতিপূরণ নিশ্চিত করা যায় না। ব্যবহারকারীরা তাদের ট্রেড, পেমেন্ট, এবং স্থানীয় ডেটার জন্য দায়ী থাকেন।
tac.risk.confirm.headline=দয়া করে নিম্নলিখিতটি স্বীকার করুন:
tac.risk.accept.loss=Bisq 2 ব্যবহার করার ফলে তহবিলের আংশিক বা সম্পূর্ণ ক্ষতি হতে পারে।
tac.risk.accept.noRecovery=পুনরুদ্ধার, ফেরত বা ক্ষতিপূরণ নিশ্চিত করা হয়নি।


tac.legal.headline=আইনগত শর্তাবলী
tac.legal.section1.title=গ্যারান্টি অস্বীকৃতি এবং দায় সীমা
tac.legal.section1.body=Bisq 2 একটি মুক্ত এবং ওপেন-সোর্স সফটওয়্যার যা GNU Affero General Public License-এর অধীনে মুক্তি পেয়েছে। প্রযোজ্য আইনের দ্বারা অনুমোদিত সর্বাধিক সীমা পর্যন্ত, সফটওয়্যারটি "যেভাবে আছে" এবং "যেভাবে উপলব্ধ" ভিত্তিতে প্রদান করা হয়, কোন ধরনের ওয়ারেন্টি বা প্রতিনিধিত্ব ছাড়াই, যার মধ্যে বাণিজ্যযোগ্যতা, নির্দিষ্ট উদ্দেশ্যের জন্য উপযুক্ততা, মালিকানা, অ-লঙ্ঘন, উপলব্ধতা, সঠিকতা, নিরাপত্তা, বা ত্রুটি-মুক্ত কার্যক্রম অন্তর্ভুক্ত রয়েছে।\nইচ্ছাকৃততা, গুরুতর অবহেলা, ব্যক্তিগত আঘাত, বা যেখানে প্রযোজ্য আইনের অধীনে দায়িত্ব বাদ দেওয়া যায় না, সেখানে কোন কপিরাইট ধারক, ডেভেলপার, অবদানকারী, Bisq DAO অংশগ্রহণকারী, মধ্যস্থতাকারী, সালিশকারী, ফেরত এজেন্ট, বা অন্যান্য প্রকল্পের অংশগ্রহণকারী সফটওয়্যার ব্যবহারের ফলে, ব্যবহার করতে অক্ষমতা, বা সফটওয়্যারের ত্রুটির কারণে ক্ষতির জন্য দায়ী হবে না। এর মধ্যে, সীমাবদ্ধতা ছাড়াই, তহবিলের ক্ষতি, ডিজিটাল সম্পদ, লাভ, তথ্য, ট্রেডিং সুযোগ, সুনাম, সফটওয়্যার ত্রুটি, নিরাপত্তা দুর্বলতা, প্রোটোকল ব্যর্থতা, অযথা তথ্য, প্রতারণা, পেমেন্ট বিপরীত, বা তৃতীয় পক্ষের আক্রমণ অন্তর্ভুক্ত রয়েছে, এমনকি যদি এই ধরনের ক্ষতির সম্ভাবনার বিষয়ে অবহিত করা হয়।
tac.legal.section2.title=ব্যবহারকারীর দায়িত্ব এবং কোন পরামর্শ নেই
tac.legal.section2.body=ব্যবহারকারীরা সফটওয়্যার ব্যবহারের জন্য একমাত্র দায়ী এবং নিশ্চিত করতে হবে যে তাদের ব্যবহার প্রযোজ্য আইন, বিধিমালা, কর দায়িত্ব, বা তাদের অঞ্চলে রিপোর্টিং প্রয়োজনীয়তা লঙ্ঘন করে না। Bisq আর্থিক, বিনিয়োগ, কর, আইনগত, বা নিয়ন্ত্রক পরামর্শ প্রদান করে না। ব্যবহারকারীরা তাদের নিজস্ব সিদ্ধান্ত নেওয়ার এবং যেখানে প্রয়োজন সেখানে স্বাধীন পরামর্শ গ্রহণের জন্য দায়ী।
tac.legal.section3.title=তথ্য এবং অবকাঠামো
tac.legal.section3.body=বাজারের দাম, ফি অনুমান, নেটওয়ার্ক ডেটা, পিয়ার বার্তা, অফার এবং অন্যান্য তথ্য অযথা, অসম্পূর্ণ, বিলম্বিত, অপ্রাপ্য হতে পারে, অথবা Bisq DAO-তে অবদানকারীদের দ্বারা পরিচালিত তৃতীয় পক্ষ বা অবকাঠামো দ্বারা প্রদান করা হতে পারে। ব্যবহারকারীরা নির্ভর করার আগে সমস্ত তথ্য স্বাধীনভাবে যাচাই করার জন্য দায়ী।
tac.legal.section4.title=বহিরাগত পেমেন্টের ঝুঁকি
tac.legal.section4.body=ফিয়াট এবং অন্যান্য বাইরের পেমেন্ট পদ্ধতিগুলি Bisq 2 এর বাইরে প্রক্রিয়া করা হয় এবং পেমেন্ট প্রদানকারী, ব্যাংক এবং অন্যান্য তৃতীয় পক্ষের নিয়ম, প্রাপ্যতা, সীমা, ফি, যাচাইকরণ প্রয়োজনীয়তা, চার্জব্যাক নীতি এবং কার্যক্রমের অধীনে থাকে। এই পেমেন্ট পদ্ধতিগুলিতে চার্জব্যাক, পেমেন্ট বিপরীত, প্রতারণা, ব্যাংকিং নিষেধাজ্ঞা, অ্যাকাউন্ট স্থগিত, বিলম্ব, বা নিয়ন্ত্রক পদক্ষেপ জড়িত থাকতে পারে। ব্যবহারকারীরা এই ঝুঁকিগুলি স্বীকার করেন এবং গ্রহণ করেন।
tac.legal.section5.title=বিবাদ সমাধানের সীমা
tac.legal.section5.body=সফটওয়্যারটির মাধ্যমে পরিচালিত ট্রেড থেকে উদ্ভূত বিরোধগুলি বিরোধ নিষ্পত্তির জন্য Bisq বিরোধ নিষ্পত্তি প্রক্রিয়ার মাধ্যমে পরিচালিত হতে পারে, যা বিরোধের সময় Bisq 2 প্রকল্প দ্বারা প্রকাশিত প্রক্রিয়ার সাথে সঙ্গতিপূর্ণ। বিরোধ নিষ্পত্তি পুনরুদ্ধার, ফেরত, কার্যকরকরণ বা ক্ষতিপূরণের গ্যারান্টি নয় এবং সব পরিস্থিতিতে উপলব্ধ নাও হতে পারে। Bisq DAO, ডেভেলপার, অবদানকারী, মধ্যস্থতাকারী, সালিশকারী, ফেরত এজেন্ট এবং অন্যান্য প্রকল্পের অংশগ্রহণকারীরা ট্রেডিং ক্ষতির জন্য ব্যবহারকারীদের ক্ষতিপূরণ দেওয়ার জন্য বাধ্য নয়, সফটওয়্যার দুর্বলতা, নিরাপত্তা ঘটনা, প্রতারণা বা অন্যান্য ক্ষতির জন্য।
tac.legal.section6.title=কোনো হেফাজত বা মধ্যস্থতাকারী ভূমিকা
tac.legal.section6.body=Bisq 2 একটি বিকেন্দ্রীকৃত পিয়ার-টু-পিয়ার সফটওয়্যার যা Bisq DAO নামে পরিচিত একটি ওপেন-সোর্স শাসন মডেলের মাধ্যমে উন্নয়ন ও রক্ষণাবেক্ষণ করা হয়। কোনো কেন্দ্রীয় সংস্থা নেটওয়ার্কটি নিয়ন্ত্রণ করে না, ব্যবহারকারীর তহবিলের দায়িত্ব নেয় না, দালাল, এক্সচেঞ্জ, পেমেন্ট প্রসেসর, এসক্রো এজেন্ট, ফিদুসিয়ারি, বা ট্রেডের বিপরীত পক্ষ হিসেবে কাজ করে না, এবং সফটওয়্যারের প্রাপ্যতা, কার্যক্রম, বা ভবিষ্যৎ উন্নয়নের গ্যারান্টি দেয় না।
tac.legal.section7.title=গোপনীয়তা এবং স্থানীয় ডেটা
tac.legal.section7.body=ব্যবহারকারীরা তাদের স্থানীয় অ্যাপ্লিকেশন ডেটা, পাসওয়ার্ড, পরিচয় কী, পেমেন্ট অ্যাকাউন্টের তথ্য এবং ট্রেড রেকর্ড সুরক্ষিত করার জন্য দায়ী। ট্রেড এবং পেমেন্টের বিস্তারিত তথ্য ট্রেডিং সহকর্মীদের সাথে শেয়ার করা হতে পারে এবং যদি কোনও বিরোধ খোলা হয়, তবে মধ্যস্থতাকারী, সালিশকারী, ফেরত এজেন্ট বা বিরোধ সমাধান প্রক্রিয়ায় জড়িত অন্যান্য অংশগ্রহণকারীদের সাথে শেয়ার করা হতে পারে।
tac.legal.confirm=আমি এই শর্তাবলী পড়েছি এবং গ্রহণ করি।


