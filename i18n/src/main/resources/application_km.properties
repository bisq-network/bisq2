contactsList.introHeadline=бһ“бҹҒбҹҮбһӮбһәбһҮбһ¶бһңбһ·бһ’бһёбһҠбҹӮбһӣбһңбһ¶бһ’бҹ’бһңбһҫбһҖбһ¶бһҡ

contactsList.introMain=бһ”бһүбҹ’бһҮбһёбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһҮбһҪбһҷбһўбҹ’бһ“бһҖбһҹбҹ’бһӮбһ¶бһӣбҹӢбһўбҹ’бһ“бһҖбһҠбҹӮбһӣбһ‘бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһ”бһ¶бһ“ бһ“бһ·бһ„бһҮбҹҖбһҹбһңбһ¶бһ„бһҖбһ¶бһҡбһ”бҹҶбһ—бҹ’бһӣбһәбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбҹ”\nбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡбһҠбҹӮбһӣбһҮбҹ„бһӮбһҮбҹҗбһҷ бһўбҹ’бһ“бһҖбһўбһ¶бһ…бһ”бһ“бҹ’бһҗбҹӮбһҳбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһҠбһҫбһҳбҹ’бһ”бһёбһ’бһ¶бһ“бһ¶бһҗбһ¶бһҖбһ¶бһҡбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһўбһ“бһ¶бһӮбһҸбһӮбһәбһҮбһ¶бһҳбһҪбһҷбһҳбһ“бһ»бһҹбҹ’бһҹбһҠбһҠбҹӮбһӣбҹ”

contactsList.introDetails=бһ бҹҒбһҸбһ»бһўбҹ’бһңбһёбһ”бһ¶бһ“бһҮбһ¶бһ“бҹҒбҹҮбһҹбҹҶбһҒбһ¶бһ“бҹӢбҹ–\nBisq2 бһ”бһ¶бһ“бһҮбһҪбһҷбһҖбһ¶бһҡбһ–бһ¶бһҡбһҖбһ¶бһҡбһ”бҹҶбһ—бҹ’бһӣбһәбһўбһҸбҹ’бһҸбһҹбһүбҹ’бһүбһ¶бһҺбһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһ’бһ¶бһҸбһ»бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ· бҹӨ бһ’бһ¶бһҸбһ»бҹ– бһӣбҹҒбһҒбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·, Nym, бһҡбһјбһ”бһҸбҹҶбһҺбһ¶бһ„бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·, бһ“бһ·бһ„бһҲбҹ’бһҳбҹ„бҹҮбһўбһҖбҹ’бһҹбһҡбҹ”\nбһ‘бҹ„бҹҮбһҷбҹүбһ¶бһ„бһҺбһ¶ бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ”бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһӣбһ»бһ”бһ…бҹҒбһүбһ–бһёбһ”бһҺбҹ’бһҸбһ¶бһүбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһё бҹЎбҹҘ бһҗбҹ’бһ„бҹғбһ“бҹғбһҖбһ¶бһҡбһҳбһ·бһ“бһҹбһҖбһҳбҹ’бһҳбҹ” бһ–бҹҒбһӣбһҠбҹӮбһӣбһ”бһ¶бһ“бһӣбһ»бһ”бһ…бҹҒбһү бһўбҹ’бһ“бһҖбһ•бҹ’бһҹбҹҒбһ„бһ‘бҹҖбһҸбһўбһ¶бһ…бһ”бһ„бҹ’бһҖбһҫбһҸбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ”бһҳбһҪбһҷбһЎбһҫбһ„бһңбһ·бһүбһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһҲбҹ’бһҳбҹ„бҹҮбһўбһҖбҹ’бһҹбһҡбһҠбһјбһ…бһӮбҹ’бһ“бһ¶бһ“бһ·бһ„бһ”бҹҶбһ—бҹ’бһӣбһәбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ“бҹ„бҹҮбҹ”\nбһҠбһҫбһҳбҹ’бһ”бһёбһҖбһ¶бһҸбҹӢбһ”бһ“бҹ’бһҗбһҷбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһ“бҹҒбҹҮ Bisq2 бһ”бһ“бҹ’бһҗбҹӮбһҳбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҳбһ¶бһ“бһўбһ“бҹ’бһҸбһҡбһҖбһ¶бһҡбһҮбһ¶бһҳбһҪбһҷбһ‘бҹ…бһҖбҹ’бһ“бһ»бһ„бһ”бһүбҹ’бһҮбһёбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһҠбҹ„бһҷбһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бҹ”\nбһўбҹ’бһ“бһҖбһўбһ¶бһ…бһ”бһ·бһ‘бһңбһ¶бһ“бҹ…бһҖбҹ’бһ“бһ»бһ„ бһҖбһ¶бһҡбһҖбҹҶбһҺбһҸбҹӢ > бһҮбһҳбҹ’бһҡбһҫбһҹбһ”бһ“бҹ’бһҗбҹӮбһҳ > "бһ”бһ“бҹ’бһҗбҹӮбһҳбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһҠбҹ„бһҷбһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·"бҹ”

contactsList.table.tableInfo.title=бһҗбҹ’бһҳбһёбһҖбҹ’бһ“бһ»бһ„бһ”бһүбҹ’бһҮбһёбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„? бһ“бҹҒбҹҮбһӮбһәбһҮбһ¶бһҹбһ„бҹ’бһҒбҹҒбһ”бһўбҹҶбһ–бһёбһҡбһ”бҹҖбһ”бһҠбҹӮбһӣбһңбһ¶бһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһ„бһ¶бһҡ
contactsList.table.tableInfo.content=бһӮбҹҶбһ“бһјбһҹбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһӮбһәбһҮбһ¶бһ§бһ”бһҖбһҡбһҺбҹҚбһҠбҹӮбһӣбһўбһ¶бһ…бһ”бһҳбҹ’бһҡбһҫбһ”бһ¶бһ“бһ…бҹ’бһҡбһҫбһ“бһҠбҹӮбһӣбһ”бһ“бҹ’бһҗбҹӮбһҳбһҹбҹ’бһҡбһ‘бһ¶бһ”бҹӢбһҹбһ»бһңбһҸбҹ’бһҗбһ·бһ—бһ¶бһ–бһҗбҹ’бһҳбһёбһҳбһҪбһҷбһҠбҹ„бһҷбһўбһ“бһ»бһүбҹ’бһүбһ¶бһҸбһұбҹ’бһҷбһўбҹ’бһ“бһҖбһҸбһ¶бһҳбһҠбһ¶бһ“бһҳбһ·бһҸбҹ’бһҸбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбҹ”\n\nбһ§бһ‘бһ¶бһ бһҡбһҺбҹҚ бһҠбһҫбһҳбҹ’бһ”бһёбһ…бҹҖбһҹбһңбһ¶бһ„бһҖбһ¶бһҡбһ”бһүбҹ’бһ…бҹҒбһүбһўбһҸбҹ’бһҸбһҹбһүбҹ’бһүбһ¶бһҺбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫ бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһ”бһүбҹ’бһ…бһ”бҹӢбһҖбһ¶бһҡбһҮбһҪбһүбһҠбһјбһҡбһҠбҹ„бһҷбһҮбҹ„бһӮбһҮбҹҗбһҷбһҮбһ¶бһҳбһҪбһҷбһ“бһҡбһҺбһ¶бһҳбҹ’бһ“бһ¶бһҖбҹӢ бһўбҹ’бһ“бһҖбһўбһ¶бһ…бһ”бһ“бҹ’бһҗбҹӮбһҳбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ“бҹҒбҹҮбһҠбһҫбһҳбҹ’бһ”бһёбһ’бһ¶бһ“бһ¶бһҗбһ¶бһ–бҹҒбһӣбһҖбҹ’бһҡбҹ„бһҷбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҳбһ¶бһ“бһўбһ“бҹ’бһҸбһҡбһҖбһҳбҹ’бһҳбһӮбһәбһҮбһ¶бһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһҠбһҠбҹӮбһӣбҹ”\n\nBisq2 бһ”бһ¶бһ“бһ•бҹ’бһҸбһӣбҹӢбһҹбһ»бһңбһҸбҹ’бһҗбһ·бһ—бһ¶бһ–бһ”бҹ’бһҡбһҶбһ¶бҹҶбһ„бһ“бһ№бһ„бһҖбһ¶бһҡбһ”бһүбҹ’бһ…бҹҒбһүбһўбһҸбҹ’бһҸбһҹбһүбҹ’бһүбһ¶бһҺбһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһ’бһ¶бһҸбһ»бһ”бһҪбһ“бһҠбҹӮбһӣбһ”бһ„бҹ’бһҖбһҫбһҸбһҮбһ¶бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ”бһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбҹ– бһӣбҹҒбһҒбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ”, Nym, бһҡбһјбһ”бһҸбҹҶбһҺбһ¶бһ„бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ” бһ“бһ·бһ„бһҲбҹ’бһҳбҹ„бҹҮбһҖбҹ’бһӣбҹӮбһ„бһҖбҹ’бһӣбһ¶бһҷбҹ” бһ‘бҹ„бҹҮбһҷбҹүбһ¶бһ„бһҺбһ¶ бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ”бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһӣбһ»бһ”бһ…бҹҒбһүбһ–бһёбһ”бһҺбҹ’бһҸбһ¶бһүбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһё 15 бһҗбҹ’бһ„бҹғбһ“бҹғбһҖбһ¶бһҡбһҳбһ·бһ“бһҹбһҖбһҳбҹ’бһҳбҹ” бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ”бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһӣбһ»бһ”бһ…бҹҒбһү бһўбҹ’бһ“бһҖбһҠбҹӮбһӣбһҳбһ¶бһ“бһ”бҹҶбһҺбһ„бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢбһўбһ¶бһ…бһ”бһ„бҹ’бһҖбһҫбһҸбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ”бһҗбҹ’бһҳбһёбһҠбҹӮбһӣбһҳбһ¶бһ“бһҲбҹ’бһҳбҹ„бҹҮбһҖбҹ’бһӣбҹӮбһ„бһҖбҹ’бһӣбһ¶бһҷбһҠбһјбһ…бһӮбҹ’бһ“бһ¶ бһҠбһҫбһҳбҹ’бһ”бһёбһ–бҹ’бһҷбһ¶бһҷбһ¶бһҳбһ”бһүбҹ’бһ…бҹҒбһүбһўбһҸбҹ’бһҸбһҹбһүбҹ’бһүбһ¶бһҺбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ“бҹ„бҹҮбҹ”\n\nбһҷбһҫбһ„бһ”бһ¶бһ“бһ’бҹ’бһңбһҫбһұбҹ’бһҷбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһ“бҹҒбҹҮбһҖбһ¶бһ“бҹӢбһҸбҹӮбһ„бһ¶бһҷбһҹбҹ’бһҡбһҪбһӣбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖ бһҠбҹ„бһҷбһ”бһ“бҹ’бһҗбҹӮбһҳбһҷбҹүбһ¶бһ„бһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһ‘бҹ…бһҖбҹ’бһ“бһ»бһ„бһ”бһүбҹ’бһҮбһёбһ“бҹҒбҹҮбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҳбһ¶бһ“бһўбһ“бҹ’бһҸбһҡбһҖбһҳбҹ’бһҳбһҮбһ¶бһҳбһҪбһҷбһ–бҹҒбһӣбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҫбһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбҹ” бһўбҹ’бһ“бһҖбһўбһ¶бһ…бһ”бһ·бһ‘бһңбһ¶бһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһҮбһҳбҹ’бһҡбһҫбһҹ "бһ”бһ“бҹ’бһҗбҹӮбһҳбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһҠбҹ„бһҷбһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·" бһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҳбҹүбһәбһ“бһ»бһҷ "бһҖбһ¶бһҡбһҖбҹҶбһҺбһҸбҹӢ" > бһ•бҹ’бһ“бҹӮбһҖ "бһҮбһҳбҹ’бһҡбһҫбһҹбһ”бһ“бҹ’бһҗбҹӮбһҳ"бҹ”
