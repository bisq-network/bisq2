contactsList.table.columns.actionsMenu.removeContact=бһҸбһҫбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһ¶бһҖбһҠбһ‘бҹҒбһҗбһ¶бһўбҹ’бһ“бһҖбһ…бһ„бҹӢбһӣбһ»бһ”бһўбҹ’бһ“бһҖбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһ“бҹҒбҹҮ?\n\nбһҠбҹ„бһҷбһҖбһ¶бһҡбһӣбһ»бһ”бһўбҹ’бһ“бһҖбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһ“бҹҒбҹҮ бһҖбһ¶бһҡбһҸбҹӮбһ„бһҹбҹ’бһӣбһ¶бһҖ бһҖбҹҒбһҡбҹ’бһҸбһ·бҹҚбһҲбҹ’бһҳбҹ„бҹҮ бһ¬бһҖбҹҶбһҺбһҸбҹӢбһ…бҹҶбһҺбһ¶бҹҶбһҺбһ¶бһҳбһҪбһҷбһҠбҹӮбһӣбһ–бһ¶бһҖбҹӢбһ–бҹҗбһ“бҹ’бһ’бһҮбһ¶бһҳбһҪбһҷбһўбҹ’бһ“бһҖбһ“бҹҒбҹҮбһ“бһ№бһ„бһҸбҹ’бһҡбһјбһңбһӣбһ»бһ”бһ…бҹҒбһүбһҷбҹүбһ¶бһ„бһҹбҹ’бһҗбһ¶бһ–бһҡбҹ”

