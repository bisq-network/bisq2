tac.risk.headline=យល់ដឹងអំពីហានិភ័យ
tac.risk.p2p.title=កម្មវិធី Peer-to-Peer ដែលមិនមានមជ្ឈមណ្ឌល
tac.risk.p2p.body=ការជួញដូរត្រូវបានអនុវត្តដោយផ្ទាល់រវាងអ្នកប្រើ។ អ្នកអភិវឌ្ឍន៍ Bisq, អ្នកចូលរួម, និង Bisq DAO មិនអាចគ្រប់គ្រងប្រាក់របស់អ្នកប្រើ និងមិនអាចធានាថាការជួញដូរ នឹងបញ្ចប់ដោយជោគជ័យ ឬថាអ្នកអាចស្ដារប្រាក់ខូចបាន។
tac.risk.financial.title=គ្រោះថ្នាក់ហិរញ្ញវត្ថុ បច្ចេកទេស និងច្បាប់
tac.risk.financial.body=ការប្រើប្រាស់ Bisq 2 មានការប្រឈមមុខនឹងហានិភ័យផ្នែកហិរញ្ញវត្ថុ បច្ចេកទេស និងបទបញ្ជា រួមទាំងការបាត់បង់ប្រាក់ជាផ្នែក ឬទាំងស្រុង។ ការខូចខាតនៃកម្មវិធី ការលួចល្បឿន ការបង្វិលការទូទាត់ ការកើតមានហេតុការណ៍សុវត្ថិភាព និងសកម្មភាពបទបញ្ជា អាចនាំឲ្យមានការបាត់បង់ដែលមិនអាចស្ដារឡើងវិញបាន។
tac.risk.noGuarantees.title=គ្មានការធានាអំពីការស្ដារឡើងវិញឬការប្រាក់សំណង
tac.risk.noGuarantees.body=ការដោះស្រាយវិវាទអាចជួយក្នុងស្ថានភាពខ្លះៗ ប៉ុន្តែការស្ដារឡើងវិញ ការបង់ប្រាក់ ឬការប៉ាន់ប្រមាណមិនអាចធានាបាន។ អ្នកប្រើប្រាស់នៅតែមានកាតព្វកិច្ចចំពោះការជួញដូរ ការទូទាត់ និងទិន្នន័យក្នុងស្រុករបស់ពួកគេ។
tac.risk.confirm.headline=សូមអញ្ជើញទទួលស្គាល់អ្វីខាងក្រោម៖
tac.risk.accept.loss=ការប្រើប្រាស់ Bisq 2 អាចនាំឲ្យមានការបាត់បង់ប្រាក់ធនធានផ្នែកឬទាំងស្រុង។
tac.risk.accept.noRecovery=ការស្ដារឡើងវិញ ការបង់ប្រាក់វិញ ឬការប៉ុនប៉ងមិនត្រូវបានធានា។


tac.legal.headline=លក្ខខណ្ឌច្បាប់
tac.legal.section1.title=ការបដិសេធការធានា និងកំណត់កាតព្វកិច្ច
tac.legal.section1.body=Bisq 2 គឺជាកម្មវិធីឥតគិតថ្លៃ និងមានប្រភពបើក ដែលបានចេញផ្សាយក្រោមអាជ្ញាប័ណ្ណ GNU Affero General Public License។ ដើម្បីអោយមានការអនុញ្ញាតអតិបរិមាដោយច្បាប់ដែលអាចអនុវត្តបាន កម្មវិធីនេះត្រូវបានផ្តល់ជូននៅលើមូលដ្ឋាន "ដូចដែលមាន" និង "ដូចដែលអាចមាន" ដោយគ្មានការធានា ឬការបង្ហាញណាមួយទេ រួមមានការលក់បាន ការសមស្របសម្រាប់គោលបំណងជាក់លាក់ ការចំណង ឬការប្រឆាំងការបំពាន ការមានស្រាប់ ការត្រឹមត្រូវ សុវត្ថិភាព ឬការប្រតិបត្តិដោយគ្មានកំហុស។\nក្រៅពីករណីនៃចេតនា ការប្រកាន់ខ្ជាប់ធ្ងន់ ឬការប៉ះពាល់ផ្ទាល់ខ្លួន ឬករណីដែលការទទួលខុសត្រូវមិនអាចដកចេញបានក្រោមច្បាប់ដែលអាចអនុវត្តបាន មិនមានអ្នកកាន់សិទ្ធិច្បាប់ អ្នកអភិវឌ្ឍន៍ អ្នកចូលរួម អ្នកចូលរួម Bisq DAO អន្តរការី អាជ្ញាកណ្តាល អ្នកត្រឡប់ប្រាក់ ឬអ្នកចូលរួមគម្រោងផ្សេងទៀតណាមួយដែលអាចមានការទទួលខុសត្រូវចំពោះការខូចខាតដែលកើតឡើងពីការប្រើប្រាស់ ការមិនអាចប្រើប្រាស់ ឬការបរាជ័យនៃកម្មវិធី។ នេះរួមមាន ដោយមិនមានការកំណត់ ការបាត់បង់ប្រាក់ ធនធានឌីជីថល ការប្រាក់ ការទិន្នន័យ ឱកាសជួញដូរ ការទទួលខុសត្រូវ កំហុសសូហ្វវែរនិងកំហុសសុវត្ថិភាព ការបរាជ័យនៃព្រឹត្តិការណ៍ ទិន្នន័យមិនត្រឹមត្រូវ ការបោកប្រាស់ ការបង្វិលការទូទាត់ ឬការវាយប្រហារពីភាគីទីបី ទោះបីជាត្រូវបានជូនដំណឹងអំពីសមត្ថភាពនៃការខូចខាតដូចនេះក៏ដោយ។
tac.legal.section2.title=ការទទួលខុសត្រូវរបស់អ្នកប្រើ និងមិនមានការណែនាំ
tac.legal.section2.body=អ្នកប្រើមានកាតព្វកិច្ចតែមួយសម្រាប់ការប្រើប្រាស់កម្មវិធី និងការធានាថាការប្រើប្រាស់របស់ពួកគេមិនបានរំលោភច្បាប់ដែលអាចអនុវត្តបាន ការកំណត់ ការទូទាត់ពន្ធ ឬការទាមទារការប្រកាសនៅក្នុងតំបន់អាជីវកម្មរបស់ពួកគេ។ Bisq មិនផ្តល់អនុសាសន៍ផ្នែកហិរញ្ញវត្ថុ ការវិនិយោគ ពន្ធ ច្បាប់ ឬការអនុវត្តន៍។ អ្នកប្រើមានកាតព្វកិច្ចសម្រាប់ធ្វើការសម្រេចចិត្តផ្ទាល់ខ្លួន និងទទួលបានអនុសាសន៍ឯករាជ្យនៅពេលដែលមានសមត្ថភាព។
tac.legal.section3.title=ព័ត៌មាន និងគ្រប់គ្រង
tac.legal.section3.body=តម្លៃទីផ្សារ, ការប៉ាន់ស្មានថ្លៃសេវា, ទិន្នន័យបណ្តាញ, សារប្រតិបត្តិ, ការផ្តល់ជូន, និងព័ត៌មានផ្សេងៗអាចមិនត្រឹមត្រូវ, មិនពេញលេញ, ឈឺចាប់, មិនអាចរកបាន, ឬផ្តល់ដោយភាគីទីបីឬស្ថាប័នដែលដំណើរការដោយអ្នកចូលរួមក្នុង Bisq DAO។ អ្នកប្រើប្រាស់មានកាតព្វកិច្ចក្នុងការផ្ទៀងផ្ទាត់ព័ត៌មានទាំងអស់ដោយឯករាជ្យមុនពេលពឹងផ្អែកលើវា។
tac.legal.section4.title=ហានិភ័យការទូទាត់ក្រៅ
tac.legal.section4.body=វិធីទូទាត់ fiat និងវិធីទូទាត់ក្រៅផ្សេងទៀតត្រូវបានដំណើរការខាងក្រៅ Bisq 2 ហើយមានការគោរពតាមច្បាប់ ការចូលដំណើរការ កំណត់ ថ្លៃសេវា ការទាមទារបញ្ជាក់ គោលការណ៍បង្វិលប្រាក់ និងសកម្មភាពរបស់អ្នកផ្តល់ប្រាក់ធនាគារ និងភាគីទីបីផ្សេងទៀត។ វិធីទូទាត់ទាំងនេះអាចរួមបញ្ចូលការបង្វិលប្រាក់ ការបង្វិលការទូទាត់ ការលួចប្រាក់ ការកំណត់ធនាគារ ការចាប់គណនី ការពន្យាពេល ឬសកម្មភាពច្បាប់។ អ្នកប្រើប្រាស់ទទួលស្គាល់ និងទទួលយកហានិភ័យទាំងនេះ។
tac.legal.section5.title=កំណត់ដែនកំណត់ការបញ្ហា
tac.legal.section5.body=ការប្រកួតប្រជែងដែលកើតឡើងពីការជួញដូរដែលធ្វើឡើងតាមរយៈកម្មវិធីអាចត្រូវបានដោះស្រាយតាមរយៈដំណើរការដោះស្រាយបញ្ហារបស់ Bisq ដោយអនុវត្តតាមនីតិវិធីដែលបានផ្សព្វផ្សាយដោយគម្រោង Bisq 2 នៅពេលដែលមានការប្រកួតប្រជែង។ ការដោះស្រាយបញ្ហាមិនមែនជាការធានាថានឹងមានការស្ដារឡើងវិញ ការបង់ប្រាក់ ការបង្ខំ ឬការប្រាក់ឈ្នួល និងអាចមិនមានសម្រាប់ស្ថានភាពទាំងអស់។ Bisq DAO អ្នកអភិវឌ្ឍន៍ អ្នកចូលរួម អន្តរការី អាជ្ញាកណ្តាល អ្នកបង់ប្រាក់ និងអ្នកចូលរួមគម្រោងផ្សេងទៀតមិនមានកាតព្វកិច្ចក្នុងការបង់ប្រាក់ឱ្យអ្នកប្រើសម្រាប់ការបាត់បង់ក្នុងការជួញដូរ ការខូចខាតកម្មវិធី ការកើតមានសុវត្ថិភាព ការលួចឬការខូចខាតផ្សេងទៀត។
tac.legal.section6.title=គ្មានតួនាទីការទុកឬអន្តរការី
tac.legal.section6.body=Bisq 2 គឺជាកម្មវិធីបណ្តាញ peer-to-peer ដែលមានលក្ខណៈអចិន្រ្តៃយ៍ ដែលបានអភិវឌ្ឍន៍ និងថែរក្សាដោយគម្រោងគ្រប់គ្រងដែលមានប្រភពបើក ដែលគេស្គាល់ថា Bisq DAO។ គ្មានអង្គមជាអ្នកកណ្តាលណាមួយគ្រប់គ្រងបណ្តាញ ឬកាន់កាប់ប្រាក់របស់អ្នកប្រើ ឬធ្វើជាអ្នកជួញដូរ ឬការផ្លាស់ប្តូរ ឬអ្នកដំណើរការទូទាត់ ឬអ្នកកាន់កាប់ ឬជាដៃគូក្នុងការជួញដូរ ឬធានាថាកម្មវិធីនេះអាចប្រើបាន ធ្វើការប្រតិបត្តិ ឬអភិវឌ្ឍន៍នៅអនាគត។
tac.legal.section7.title=ភាពឯកជន និងទិន្នន័យក្នុងស្រុក
tac.legal.section7.body=អ្នកប្រើមានកាតព្វកិច្ចក្នុងការការពារទិន្នន័យកម្មវិធីក្នុងស្រុករបស់ពួកគេ ពាក្យសម្ងាត់ កូនសោអត្តសញ្ញាណ ព័ត៌មានគណនីទូទាត់ និងកំណត់ត្រាជួញដូរ។ ព័ត៌មានជួញដូរ និងការទូទាត់អាចត្រូវបានចែករំលែកជាមួយអ្នកជួញដូរ និង ប្រសិនបើមានការបញ្ចេញវិវាទ អាចត្រូវបានចែករំលែកជាមួយអន្តរការី អាជ្ញាកណ្តាល អ្នកត្រឡប់ប្រាក់ ឬអ្នកចូលរួមផ្សេងទៀតដែលមានសម្តែងក្នុងដំណើរការដោះស្រាយវិវាទ។
tac.legal.confirm=ខ្ញុំបានអាន និងទទួលយកល័ក្ខខ័ណ្ឌទាំងនេះ។


