tac.headline=Marrëveshja e përdoruesit
tac.confirm=Kam lexuar dhe kuptuar
tac.accept=Prano marrëveshjen e përdoruesit
tac.reject=Refuzo dhe mbylle

tac.risk.headline=Kuptoni Rreziqet
tac.risk.p2p.title=Software i decentralizuar Peer-to-Peer
tac.risk.p2p.body=Tregtimet kryhen direkt midis përdoruesve. Zhvilluesit e Bisq, kontribuesit dhe Bisq DAO nuk kontrollojnë fondet e përdoruesve dhe nuk mund të garantojnë që tregtimet do të përfundojnë me sukses ose që humbjet mund të rikuperohen.
tac.risk.financial.title=Rreziqet Financiare, Teknike dhe Rregullatore
tac.risk.financial.body=Përdorimi i Bisq 2 përfshin rreziqe financiare, teknike dhe rregullatore, duke përfshirë humbjen e pjesshme ose të plotë të fondeve. Vulnerabilitetet e softuerit, mashtrimi, anullimet e pagesave, incidentet e sigurisë dhe veprimet rregullatore mund të rezultojnë në humbje të pakthyeshme.
tac.risk.noGuarantees.title=Nuk ka Garanci për Rikuperim ose Kompensim
tac.risk.noGuarantees.body=Zgjidhja e mosmarrëveshjeve mund të ndihmojë në disa situata, por rikuperimi, rimbursimi ose kompensimi nuk mund të garantohen. Përdoruesit mbeten përgjegjës për tregtimet, pagesat dhe të dhënat lokale.
tac.risk.confirm.headline=Ju lutemi pranoni sa vijon:
tac.risk.accept.loss=Përdorimi i Bisq 2 mund të rezultojë në humbje të pjesshme ose totale të fondeve.
tac.risk.accept.noRecovery=Rikuperimi, rimbursimi, ose kompensimi nuk është i garantuar.


tac.legal.headline=Kushtet Ligjore
tac.legal.section1.title=Kufizimi i Garancisë dhe Kufizimet e Përgjegjësisë
tac.legal.section1.body=Bisq 2 është softuer falas dhe me kod burimi të hapur i lëshuar nën Licencën Publike të Përgjithshme GNU Affero. Në masën maksimale të lejuar nga ligji në fuqi, softueri ofrohet në një bazë "as is" dhe "as available", pa garanci ose përfaqësime të çdo lloji, duke përfshirë tregtueshmërinë, përshtatshmërinë për një qëllim të caktuar, titullin, mosshkeljen, disponueshmërinë, saktësinë, sigurinë, ose funksionimin pa gabime.\nPërveç rasteve të qëllimit, neglizhencës së rëndë, dëmtimit personal, ose kur përgjegjësia nuk mund të përjashtohet sipas ligjit në fuqi, asnjë mbajtës i të drejtave të autorit, zhvillues, kontribues, pjesëmarrës i Bisq DAO, ndërmjetës, arbitër, agjent rimbursimi, ose pjesëmarrës tjetër i projektit nuk do të jetë përgjegjës për dëmet që lindin nga përdorimi, pamundësia për të përdorur, ose defekti i softuerit. Kjo përfshin, pa kufizim, humbjen e fondeve, aseteve digjitale, fitimeve, të dhënave, mundësive tregtare, reputacionit, defekteve të softuerit, dobësive të sigurisë, dështimeve të protokollit, të dhënave të pasakta, mashtrimit, anullimeve të pagesave, ose sulmeve nga palë të treta, edhe nëse është njoftuar për mundësinë e këtyre dëmeve.
tac.legal.section2.title=Përgjegjësia e Përdoruesit dhe Asnjë Këshillë
tac.legal.section2.body=Përdoruesit janë përgjegjës vetëm për përdorimin e tyre të softuerit dhe për sigurimin që përdorimi i tyre nuk shkel ligjet, rregulloret, detyrimet tatimore ose kërkesat e raportimit në juridiksionin e tyre. Bisq nuk ofron këshilla financiare, investimi, tatimore, ligjore ose rregullatore. Përdoruesit janë përgjegjës për marrjen e vendimeve të tyre dhe për të marrë këshilla të pavarura kur është e nevojshme.
tac.legal.section3.title=Informacioni dhe Infrastrukturë
tac.legal.section3.body=Çmimet e tregut, vlerësimet e tarifave, të dhënat e rrjetit, mesazhet e përdoruesve, ofertat dhe informacionet e tjera mund të jenë të pasakta, të paplota, të vonuara, të paqëndrueshme ose të ofruara nga palë të treta ose infrastrukturë të operuar nga kontribuesit e Bisq DAO. Përdoruesit janë përgjegjës për verifikimin e pavarur të të gjitha informacionit para se të mbështeten në të.
tac.legal.section4.title=Rreziqet e Pagesave të Jashtme
tac.legal.section4.body=Metodat e pagesës fiat dhe të tjera të jashtme përpunohen jashtë Bisq 2 dhe janë të nënshtrohen ndaj rregullave, disponueshmërisë, kufizimeve, tarifave, kërkesave për verifikim, politikave të rikthimit të pagesave dhe veprimeve të ofruesve të pagesave, bankave dhe palëve të treta. Këto metoda pagesash mund të përfshijnë rikthime të pagesave, anullime të pagesave, mashtrime, kufizime bankare, bllokime llogarish, vonesa ose veprime rregullatore. Përdoruesit e pranojnë dhe pranojnë këto rreziqe.
tac.legal.section5.title=Kufijtë e Zgjidhjes së Mosmarrëveshjeve
tac.legal.section5.body=Mosmarrëveshjet që lindin nga tregtimet e kryera përmes softuerit mund të trajtohen përmes procesit të zgjidhjes së mosmarrëveshjeve të Bisq në përputhje me procedurat e publikuara nga projekti Bisq 2 në momentin e mosmarrëveshjes. Zgjidhja e mosmarrëveshjeve nuk është një garanci për rikuperim, rimbursim, zbatim, ose kompensim, dhe mund të mos jetë e disponueshme në të gjitha rrethanat. Bisq DAO, zhvilluesit, kontribuesit, ndërmjetësit, arbitrat, agjentët e rimbursimit, dhe pjesëmarrësit e tjerë të projektit nuk kanë asnjë detyrim për të kompensuar përdoruesit për humbjet nga tregtimi, dobësitë e softuerit, incidentet e sigurisë, mashtrimet, ose dëme të tjera.
tac.legal.section6.title=Nuk ka rolin e ruajtjes ose ndërmjetësit
tac.legal.section6.body=Bisq 2 është një softuer i decentralizuar peer-to-peer i zhvilluar dhe mbajtur përmes një modeli qeverisjeje me burim të hapur të njohur si Bisq DAO. Asnjë ent qendror nuk kontrollon rrjetin, nuk mban kujdestari të fondeve të përdoruesve, nuk vepron si ndërmjetës, shkëmbim, procesor pagesash, agjent depozitimi, fiduciar, ose palë tjetër në tregtime, dhe nuk garanton disponueshmërinë, funksionimin, ose zhvillimin e ardhshëm të softuerit.
tac.legal.section7.title=Privatësia dhe Të Dhënat Lokale
tac.legal.section7.body=Përdoruesit janë përgjegjës për mbrojtjen e të dhënave të tyre lokale të aplikacionit, fjalëkalimeve, çelësave të identitetit, informacionit të llogarisë së pagesës dhe regjistrave të tregtimit. Detajet e tregtimit dhe pagesës mund të ndahen me kolegët e tregtimit dhe, nëse hapet një mosmarrëveshje, me ndërmjetësit, arbitrat, agjentët e rikthimit, ose pjesëmarrës të tjerë të përfshirë në procesin e zgjidhjes së mosmarrëveshjeve.
tac.legal.confirm=Kam lexuar dhe pranoj këto kushte.


