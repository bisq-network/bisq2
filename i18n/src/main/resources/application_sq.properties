popup.reportError=Për të na ndihmuar të përmirësojmë softuerin, ju lutemi raportoni këtë gabim duke hapur një çështje të re në: 'https://github.com/bisq-network/bisq2/issues'.\nMesazhi i gabimit do të kopjohet në clipboard kur të klikoni butonin 'raporto' më poshtë.\n\nDo ta bëjë më të lehtë zgjidhjen e problemeve nëse përfshini skedarët e logut në raportin tuaj për gabimin. Skedarët e logut nuk përmbajnë të dhëna të ndjeshme.
