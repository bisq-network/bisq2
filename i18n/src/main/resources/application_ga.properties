tac.headline=Comhaontú Úsáideora
tac.confirm=Tá léite agam agus tuigim
tac.accept=Glac le comhaontú úsáideora
tac.reject=Diúltaigh agus scoir

tac.risk.headline=Tuig na Rioscaí
tac.risk.p2p.title=Bogearraí Comhoibrithe Díláraithe
tac.risk.p2p.body=Déantar trádálacha go díreach idir úsáideoirí. Ní dhéanann forbróirí Bisq, comhoibrithe, agus an Bisq DAO smacht a choinneáil ar chistí úsáideoirí agus ní féidir leo a chinntiú go gcríochnófar trádálacha go rathúil nó go bhfaighfear aisíocaíochtaí ar chaillteanais.
tac.risk.financial.title=Rioscaí Airgeadais, Teicniúla, agus Rialála
tac.risk.financial.body=Trí úsáid a bhaint as Bisq 2, tá rioscaí airgeadais, teicniúla, agus rialála ann, lena n-áirítear caillteanas páirteach nó iomlán na gcistí. D'fhéadfadh laigeanna sa chód, calaois, aistriúcháin íocaíochta, eachtraí slándála, agus gníomhartha rialála a bheith mar thoradh ar chaillteanais nach féidir a chur ar ais.
tac.risk.noGuarantees.title=Níl aon Ráthaíocht ar Aisghabháil nó ar Chúiteamh
tac.risk.noGuarantees.body=D'fhéadfadh réiteach díospóide cabhrú i roinnt cásanna, ach ní féidir a chinntiú go bhfaighidh tú aisghabháil, aisíocaíocht, nó cúiteamh. Fanann úsáideoirí freagrach as a gcuid trádálacha, íocaíochtaí, agus sonraí áitiúla.
tac.risk.confirm.headline=Le do thoil, aithin an méid seo a leanas:
tac.risk.accept.loss=D'fhéadfadh úsáid a bhaint as Bisq 2 a bheith mar thoradh ar chaillteanas páirteach nó iomlán cistí.
tac.risk.accept.noRecovery=Níl aon bharántas ar aisghabháil, aisíocaíocht, nó cúiteamh.


tac.legal.headline=Téarmaí Dlí
tac.legal.section1.title=Díolúine Barántais agus Teorainneacha Dliteanais
tac.legal.section1.body=Is bogearraí saor in aisce agus foinse oscailte é Bisq 2 a scaoiltear faoi GNU Affero General Public License. Go dtí an leibhéal is mó a cheadaítear faoi dhlíthe infheidhme, cuirtear an bogearra ar fáil ar bhonn "mar atá" agus "mar atá ar fáil", gan aon bharántas nó ionadaíocht de chineál ar bith, lena n-áirítear trádáilteacht, oiriúnacht do chuspóir ar leith, teideal, neamhshárú, infhaighteacht, cruinneas, slándáil, nó oibriú saor ó earráid.\nSeachas i gcásanna d'intinn, neamhchúram mór, gortú pearsanta, nó áit nach féidir dliteanas a eisiamh faoi dhlí infheidhme, ní bheidh aon úinéir cóipchirt, forbróir, comhoibritheoir, rannpháirtí Bisq DAO, idirghabhálaí, eadránaí, gníomhaire aisíocaíochta, nó rannpháirtí eile sa tionscadal freagrach as damáistí a thagann as úsáid, neamhoiriúnacht le húsáid, nó laige an bhogearra. Áirítear leis seo, gan teorainn, caillteanas cistí, sócmhainní digiteacha, brabúis, sonraí, deiseanna trádála, dea-thoil, laigeanna bogearraí, laigeanna slándála, teipeanna prótacail, sonraí mícheart, calaois, aistriúcháin íocaíochta, nó ionsaithe tríú páirtí, fiú má cuireadh in iúl duit faoin dóchúlacht a leithéid de dhamáistí.
tac.legal.section2.title=Freagracht Úsáideora agus Gan Comhairle
tac.legal.section2.body=Tá úsáideoirí freagrach go hiomlán as a n-úsáid ar an mbogearra agus as a chinntiú nach sáraíonn a n-úsáid na dlíthe, na rialacháin, na hoibleagáidí cánach, nó na hoibleagáidí tuairiscithe atá i bhfeidhm ina ndlínsí. Ní sholáthraíonn Bisq comhairle airgeadais, infheistíochta, cánach, dlíthiúil, nó rialála. Tá úsáideoirí freagrach as a gcinntí féin a dhéanamh agus as comhairle neamhspleách a fháil nuair is cuí.
tac.legal.section3.title=Eolas agus Infreastruchtúr
tac.legal.section3.body=D'fhéadfadh go mbeadh praghsanna margaidh, meastacháin táille, sonraí líonra, teachtaireachtaí comhghleacaithe, tairiscintí, agus eolas eile mícheart, neamhiomlán, moillithe, neamh-infhaighte, nó a sholáthar ag tríú páirtithe nó infreastruchtúr a oibrítear ag comhoibrithe ar an Bisq DAO. Tá freagracht ar úsáideoirí a chinntiú go bhfíoraíonn siad go neamhspleách an t-eolas uile sula n-úsáideann siad é.
tac.legal.section4.title=Rioscaí Íocaíochta Seachtracha
tac.legal.section4.body=Déantar íocaíochtaí fiat agus modhanna íocaíochta seachtracha eile a phróiseáil lasmuigh de Bisq 2 agus tá siad faoi réir na rialacha, infhaighteachta, teorainneacha, táillí, riachtanais fíoraithe, polasaithe aistrithe, agus gníomhartha soláthraithe íocaíochta, bainc, agus tríú páirtithe eile. D'fhéadfadh na modhanna íocaíochta seo a bheith bainteach le haistriúcháin, aistriúcháin íocaíochta, calaois, srianta baincéireachta, reo cuntas, moilleanna, nó gníomhartha rialála. Aithníonn agus glacann úsáideoirí leis na rioscaí seo.
tac.legal.section5.title=Teorainneacha Réitigh Díospóide
tac.legal.section5.body=Déanfar plé ar aon díospóidí a thagann as trádálacha a rinneadh trína fheidhmchlár trí phróiseas réitigh díospóide Bisq de réir na nósanna imeachta a foilsíodh ag an tionscadal Bisq 2 ag an am a thagann an díospóid. Ní hé réiteach díospóide ráthaíocht a thabhairt ar aisghabháil, aisíocaíocht, forfheidhmiú, nó cúiteamh, agus d'fhéadfadh sé nach mbeidh sé ar fáil i ngach cás. Níl aon oibleagáid ar an Bisq DAO, ar na forbróirí, ar na comhoibrithe, ar na hidirghabhálaithe, ar na headránaigh, ar na gníomhairí aisíocaíochta, agus ar rannpháirtithe eile den tionscadal chun úsáideoirí a chúiteamh as caillteanas trádála, laigeanna bogearraí, eachtraí slándála, calaois, nó dochar eile.
tac.legal.section6.title=Níl Aon Chustaim nó Ról Idirghabhálaíochta
tac.legal.section6.body=Is bogearraí díláraithe peer-to-peer é Bisq 2 a forbraíodh agus a choinnítear trí mhúnla rialachais oscailte ar a dtugtar Bisq DAO. Ní dhéanann aon eintiteas lárnach smacht ar an líonra, ní choinníonn sé custaim de chuid úsáideoirí, ní gníomhaíonn sé mar bhróicéir, malartóir, próiseálaí íocaíochta, gníomhaire éisc, nó mar chreidiúnach i dtrádálacha, ná ní ráthaíonn sé an infhaighteacht, an oibriú, ná forbairt na bogearra sa todhchaí.
tac.legal.section7.title=Príobháideacht agus Sonraí Áitiúla
tac.legal.section7.body=Tá úsáideoirí freagrach as a gcuid sonraí feidhmchláir áitiúla, pasfhocail, eochracha aitheantais, faisnéis cuntais íocaíochta, agus taifid thrádála a chosaint. D'fhéadfadh sonraí trádála agus íocaíochta a bheith roinnte le comhthrádálaithe agus, má osclaítear díospóid, le hidirghabhálaithe, eadránaí, gníomhairí aisíocaíochta, nó páirtithe eile atá bainteach leis an bpróiseas réitigh díospóide.
tac.legal.confirm=Tá léite agam agus glacaim leis na téarmaí seo.


