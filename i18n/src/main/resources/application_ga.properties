restoreFromBackup.headline=Comhaid Athchóirithe ó Chúltaca
restoreFromBackup.info=Le linn an tosaithe, thug an córas faoi deara go raibh roinnt comhad buan truaillithe nó neamhléite.\nChun a chinntiú go bhfanann an feidhmchlár i stát bailí, athchóiríodh na cúltacaí is déanaí go huathoibríoch.\n\nAthbhreithnigh do thrádálacha oscailte le do thoil chun a chinntiú go bhfuil siad sa stát a bhíothas ag súil leis.\nMá thugann tú faoi deara aon neamhchomhsheasmhachtaí nó má bhíonn fadhbanna agat, déan teagmháil le comhoibrithe Bisq le haghaidh cúnamh.\n\nAthchóiríodh na siopaí seo a leanas ó chúltaca:
