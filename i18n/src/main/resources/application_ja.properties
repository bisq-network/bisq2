tac.risk.headline=リスクを理解する
tac.risk.p2p.title=分散型ピアツーピアソフトウェア
tac.risk.p2p.body=取引はユーザー間で直接行われます。Bisqの開発者、貢献者、およびBisq DAOはユーザーの資金を管理せず、取引が成功裏に完了することや損失が回収できることを保証することはできません。
tac.risk.financial.title=財務、技術、規制リスク
tac.risk.financial.body=Bisq 2の利用には、資金の部分的または全額の損失を含む金融的、技術的、規制上のリスクが伴います。ソフトウェアの脆弱性、詐欺、支払いの取り消し、セキュリティインシデント、規制当局の措置は、回収不可能な損失をもたらす可能性があります。
tac.risk.noGuarantees.title=回復または補償の保証はありません
tac.risk.noGuarantees.body=紛争解決は一部の状況で役立つ場合がありますが、回復、返金、または補償は保証されません。ユーザーは自分の取引、支払い、およびローカルデータに対して引き続き責任を負います。
tac.risk.confirm.headline=次のことを承認してください:
tac.risk.accept.loss=Bisq 2を使用すると、資金の一部または全額を失う可能性があります。
tac.risk.accept.noRecovery=回復、返金、または補償は保証されません。


tac.legal.headline=法的条件
tac.legal.section1.title=保証の免責事項および責任の制限
tac.legal.section1.body=Bisq 2は、GNU Affero General Public Licenseの下でリリースされた無料でオープンソースのソフトウェアです。適用される法律で許可される最大限の範囲において、ソフトウェアは「現状のまま」および「利用可能な範囲で」提供され、商業性、特定の目的への適合性、権利、非侵害、可用性、正確性、安全性、またはエラーのない動作に関するいかなる保証や表明もありません。\n故意、重大な過失、身体的傷害、または適用される法律の下で責任を除外できない場合を除き、著作権保有者、開発者、貢献者、Bisq DAO参加者、仲介者、仲裁人、返金エージェント、またはその他のプロジェクト参加者は、ソフトウェアの使用、使用不能、または不具合から生じる損害に対して責任を負いません。これには、資金、デジタル資産、利益、データ、取引機会、善意、ソフトウェアの欠陥、安全性の脆弱性、プロトコルの失敗、不正確なデータ、詐欺、支払いの取り消し、または第三者の攻撃の損失が含まれますが、これに限定されません。
tac.legal.section2.title=ユーザーの責任とアドバイスなし
tac.legal.section2.body=ユーザーは、ソフトウェアの使用に対して単独で責任を負い、自身の使用が適用される法律、規制、税務義務、または管轄区域内の報告要件に違反しないことを確認する責任があります。Bisqは、財務、投資、税務、法務、または規制に関するアドバイスを提供しません。ユーザーは、自らの決定を下し、適切な場合には独立したアドバイスを取得する責任があります。
tac.legal.section3.title=情報とインフラストラクチャ
tac.legal.section3.body=市場価格、手数料の見積もり、ネットワークデータ、ピアメッセージ、オファー、およびその他の情報は、不正確、不完全、遅延、利用不可、またはBisq DAOの貢献者によって運営されるインフラストラクチャによって提供される場合があります。ユーザーは、依存する前にすべての情報を独自に確認する責任があります。
tac.legal.section4.title=外部支払いリスク
tac.legal.section4.body=フィアットおよびその他の外部支払い方法はBisq 2の外で処理され、支払いプロバイダー、銀行、その他の第三者のルール、可用性、制限、手数料、検証要件、チャージバックポリシー、および行動の対象となります。これらの支払い方法には、チャージバック、支払いの取り消し、詐欺、銀行制限、アカウントの凍結、遅延、または規制措置が含まれる場合があります。ユーザーはこれらのリスクを認識し、受け入れます。
tac.legal.section5.title=紛争解決の制限
tac.legal.section5.body=ソフトウェアを通じて行われた取引から生じる紛争は、紛争発生時にBisq 2プロジェクトによって公開された手続きに従って、Bisqの紛争解決プロセスを通じて処理される場合があります。紛争解決は、回収、返金、執行、または補償の保証ではなく、すべての状況で利用できるわけではありません。Bisq DAO、開発者、貢献者、仲介者、仲裁人、返金エージェント、およびその他のプロジェクト参加者は、取引損失、ソフトウェアの脆弱性、セキュリティインシデント、詐欺、またはその他の損害に対してユーザーに補償する義務を負いません。
tac.legal.section6.title=保管または仲介者の役割はありません
tac.legal.section6.body=Bisq 2は、Bisq DAOとして知られるオープンソースのガバナンスモデルを通じて開発および維持される分散型のピアツーピアソフトウェアです。ネットワークを制御する中央のエンティティは存在せず、ユーザー資金の保管、仲介、取引所、決済処理、エスクローエージェント、受託者、または取引の対向者として機能することはなく、ソフトウェアの可用性、運用、または将来の開発を保証することもありません。
tac.legal.section7.title=プライバシーとローカルデータ
tac.legal.section7.body=ユーザーは、ローカルアプリケーションデータ、パスワード、アイデンティティキー、支払いアカウント情報、および取引記録を保護する責任があります。取引および支払いの詳細は、取引相手と共有される場合があり、紛争が発生した場合には、仲介者、仲裁人、返金エージェント、または紛争解決プロセスに関与する他の参加者と共有されることがあります。
tac.legal.confirm=私はこれらの条件を読み、同意します。


