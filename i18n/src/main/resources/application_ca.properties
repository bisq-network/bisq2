tac.headline=Acord d'usuari
tac.confirm=He llegit i entès
tac.accept=Acceptar l'acord d'usuari
tac.reject=Rebutjar i tancar

tac.risk.headline=Entendre els riscos
tac.risk.p2p.title=Programari descentralitzat de Peer-to-Peer
tac.risk.p2p.body=Les operacions es realitzen directament entre usuaris. Els desenvolupadors de Bisq, els col·laboradors i el Bisq DAO no controlen els fons dels usuaris i no poden garantir que les operacions es completin amb èxit o que les pèrdues es puguin recuperar.
tac.risk.financial.title=Riscos financers, tècnics i reguladors
tac.risk.financial.body=Utilitzar Bisq 2 comporta riscos financers, tècnics i normatius, incloent la pèrdua parcial o total de fons. Les vulnerabilitats del programari, el frau, les reversions de pagament, els incidents de seguretat i les accions reguladores poden resultar en pèrdues irrecuperables.
tac.risk.noGuarantees.title=Sense garantia de recuperació o compensació
tac.risk.noGuarantees.body=La resolució de disputes pot ajudar en algunes situacions, però la recuperació, el reemborsament o la compensació no es poden garantir. Els usuaris continuen sent responsables de les seves operacions, pagaments i dades locals.
tac.risk.confirm.headline=Si us plau, reconegueu el següent:
tac.risk.accept.loss=L'ús de Bisq 2 pot resultar en pèrdues parcials o totals de fons.
tac.risk.accept.noRecovery=La recuperació, el reemborsament o la compensació no estan garantits.


tac.legal.headline=Termes legals
tac.legal.section1.title=Renúncia de garantia i límits de responsabilitat
tac.legal.section1.body=Bisq 2 és un programari lliure i de codi obert publicat sota la Llicència Pública General GNU Affero. En la mesura màxima permesa per la legislació aplicable, el programari es proporciona en una base "tal com és" i "segons disponibilitat", sense garanties ni representacions de cap tipus, incloent-hi comerciabilitat, idoneïtat per a un propòsit particular, títol, no infracció, disponibilitat, precisió, seguretat o funcionament sense errors.\nExcepte en casos d'intenció, negligència greu, lesions personals, o on la responsabilitat no pugui ser exclosa sota la legislació aplicable, cap titular de drets d'autor, desenvolupador, col·laborador, participant de Bisq DAO, mediador, àrbitre, agent de reemborsament, o altre participant del projecte serà responsable dels danys derivats de l'ús, la impossibilitat d'ús, o el mal funcionament del programari. Això inclou, sense limitació, pèrdua de fons, actius digitals, beneficis, dades, oportunitats d'operació, bona voluntat, defectes de programari, vulnerabilitats de seguretat, fallades de protocol, dades inexactes, frau, reversions de pagament, o atacs de tercers, fins i tot si se'ls ha advertit de la possibilitat d'aquests danys.
tac.legal.section2.title=Responsabilitat de l'usuari i cap consell
tac.legal.section2.body=Els usuaris són els únics responsables de l'ús que fan del programari i d'assegurar-se que el seu ús no viola les lleis, regulacions, obligacions fiscals o requisits de reporting aplicables a la seva jurisdicció. Bisq no proporciona consells financers, d'inversió, fiscals, legals o reguladors. Els usuaris són responsables de prendre les seves pròpies decisions i d'obtenir consell independent quan sigui apropiat.
tac.legal.section3.title=Informació i Infraestructura
tac.legal.section3.body=Els preus de mercat, les estimacions de comissions, les dades de xarxa, els missatges entre usuaris, les ofertes i altra informació poden ser inexactes, incompletes, retardades, no disponibles o proporcionades per tercers o infraestructura operada per col·laboradors del Bisq DAO. Els usuaris són responsables de verificar de manera independent tota la informació abans de confiar-hi.
tac.legal.section4.title=Riscos de pagament externs
tac.legal.section4.body=Els mètodes de pagament externs, com el fiat, es processen fora de Bisq 2 i estan subjectes a les normes, disponibilitat, límits, comissions, requisits de verificació, polítiques de devolució de càrrecs i accions dels proveïdors de pagament, bancs i altres tercers. Aquests mètodes de pagament poden implicar devolucions de càrrecs, reversions de pagaments, frau, restriccions bancàries, congelacions de comptes, retards o accions reguladores. Els usuaris reconeixen i accepten aquests riscos.
tac.legal.section5.title=Límits de resolució de disputes
tac.legal.section5.body=Les disputes que sorgeixen de les operacions realitzades a través del programari poden ser gestionades mitjançant el procés de resolució de disputes de Bisq d'acord amb els procediments publicats pel projecte Bisq 2 en el moment de la disputa. La resolució de disputes no és una garantia de recuperació, reemborsament, execució o compensació, i pot no estar disponible en totes les circumstàncies. El Bisq DAO, els desenvolupadors, els col·laboradors, els mediadors, els àrbitres, els agents de reemborsament i altres participants del projecte no tenen cap obligació de compensar els usuaris per pèrdues comercials, vulnerabilitats del programari, incidents de seguretat, frau o altres danys.
tac.legal.section6.title=Sense custòdia ni rol d'intermediari
tac.legal.section6.body=Bisq 2 és un programari descentralitzat de parell a parell desenvolupat i mantingut a través d'un model de governança de codi obert conegut com a Bisq DAO. Cap entitat central controla la xarxa, manté la custòdia dels fons dels usuaris, actua com a intermediari, intercanvi, processador de pagaments, agent d'escrow, fiduciari o contraparte en les operacions, ni garanteix la disponibilitat, operació o desenvolupament futur del programari.
tac.legal.section7.title=Privadesa i dades locals
tac.legal.section7.body=Els usuaris són responsables de protegir les seves dades d'aplicació locals, contrasenyes, claus d'identitat, informació del compte de pagament i registres d'operacions. Els detalls de les operacions i dels pagaments poden ser compartits amb companys d'operació i, si s'obre una disputa, amb mediadors, àrbitres, agents de reemborsament o altres participants implicats en el procés de resolució de disputes.
tac.legal.confirm=He llegit i accepto aquests termes.


