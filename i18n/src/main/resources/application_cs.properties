restoreFromBackup.headline=Soubory obnoveny ze zálohy
restoreFromBackup.info=Během spouštění systém zjistil, že některé trvalé soubory byly poškozené nebo nečitelné.\nAby byla zajištěna platnost aplikace, byly automaticky obnoveny nejnovější dostupné zálohy.\n\nZkontrolujte prosím své otevřené obchody, abyste se ujistili, že jsou ve očekávaném stavu.\nPokud si všimnete jakýchkoli nesrovnalostí nebo narazíte na problémy, kontaktujte přispěvatele Bisq pro pomoc.\n\nNásledující úložiště byly obnoveny ze zálohy:
