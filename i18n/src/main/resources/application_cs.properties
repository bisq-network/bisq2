tac.headline=Uživatelská dohoda
tac.confirm=Přečetl(a) jsem a rozumím
tac.accept=Přijmout uživatelskou dohodu
tac.reject=Odmítnout a ukončit

tac.risk.headline=Pochopte rizika
tac.risk.p2p.title=Decentralizovaný Peer-to-Peer Software
tac.risk.p2p.body=Obchody se provádějí přímo mezi uživateli. Vývojáři Bisq, přispěvatelé a Bisq DAO nekontrolují uživatelské prostředky a nemohou zaručit, že obchody budou úspěšně dokončeny nebo že ztráty lze obnovit.
tac.risk.financial.title=Finanční, technická a regulační rizika
tac.risk.financial.body=Používání Bisq 2 zahrnuje finanční, technická a regulační rizika, včetně částečné nebo úplné ztráty prostředků. Zranitelnosti softwaru, podvody, zpětné platby, bezpečnostní incidenty a regulační opatření mohou vést k nevratným ztrátám.
tac.risk.noGuarantees.title=Žádná záruka obnovy nebo kompenzace
tac.risk.noGuarantees.body=Řešení sporů může pomoci v některých situacích, ale obnova, náhrada nebo kompenzace nemohou být zaručeny. Uživatelé zůstávají odpovědní za své obchody, platby a místní data.
tac.risk.confirm.headline=Prosím, potvrďte následující:
tac.risk.accept.loss=Používání Bisq 2 může vést k částečné nebo úplné ztrátě prostředků.
tac.risk.accept.noRecovery=Obnova, náhrada nebo kompenzace není zaručena.


tac.legal.headline=Právní podmínky
tac.legal.section1.title=Zřeknutí se záruky a omezení odpovědnosti
tac.legal.section1.body=Bisq 2 je bezplatný a open-source software vydaný pod GNU Affero General Public License. V maximálním rozsahu povoleném platným právem je software poskytován na základě "jak je" a "jak je k dispozici", bez záruk nebo prohlášení jakéhokoli druhu, včetně obchodovatelnosti, vhodnosti pro konkrétní účel, vlastnictví, neporušení, dostupnosti, přesnosti, bezpečnosti nebo bezchybného provozu.\nKromě případů úmyslu, hrubé nedbalosti, osobního zranění nebo tam, kde nelze vyloučit odpovědnost podle platného práva, žádný držitel autorských práv, vývojář, přispěvatel, účastník Bisq DAO, mediátor, arbitr, agent pro vracení peněz nebo jiný účastník projektu nenese odpovědnost za škody vyplývající z používání, neschopnosti používat nebo poruchy softwaru. To zahrnuje, bez omezení, ztrátu prostředků, digitálních aktiv, zisků, dat, obchodních příležitostí, dobré vůle, softwarových vad, bezpečnostních zranitelností, selhání protokolu, nepřesná data, podvod, zpětné platby nebo útoky třetích stran, i když byla upozorněna na možnost takových škod.
tac.legal.section2.title=Odpovědnost uživatele a žádné poradenství
tac.legal.section2.body=Uživatelé nesou výhradní odpovědnost za používání softwaru a za zajištění, že jejich používání neporušuje platné zákony, předpisy, daňové povinnosti nebo požadavky na hlášení ve své jurisdikci. Bisq neposkytuje finanční, investiční, daňové, právní ani regulační poradenství. Uživatelé jsou odpovědní za svá vlastní rozhodnutí a za získání nezávislého poradenství, pokud je to vhodné.
tac.legal.section3.title=Informace a infrastruktura
tac.legal.section3.body=Tržní ceny, odhady poplatků, data sítě, zprávy od peerů, nabídky a další informace mohou být nepřesné, neúplné, zpožděné, nedostupné nebo poskytované třetími stranami či infrastrukturou provozovanou přispěvateli do Bisq DAO. Uživatelé jsou odpovědní za nezávislé ověření všech informací před jejich použitím.
tac.legal.section4.title=Rizika externích plateb
tac.legal.section4.body=Fiat a další externí platební metody jsou zpracovávány mimo Bisq 2 a podléhají pravidlům, dostupnosti, limitům, poplatkům, požadavkům na ověření, politikám vracení plateb a akcím poskytovatelů plateb, bank a dalších třetích stran. Tyto platební metody mohou zahrnovat vracení plateb, zrušení plateb, podvod, bankovní omezení, zmrazení účtů, zpoždění nebo regulační akce. Uživatelé uznávají a přijímají tato rizika.
tac.legal.section5.title=Omezení řešení sporů
tac.legal.section5.body=Spory vyplývající z obchodů prováděných prostřednictvím softwaru mohou být řešeny prostřednictvím procesu řešení sporů Bisq v souladu s postupy zveřejněnými projektem Bisq 2 v době sporu. Řešení sporů není zárukou náhrady, vrácení peněz, vymáhání nebo odškodnění a nemusí být dostupné za všech okolností. Bisq DAO, vývojáři, přispěvatelé, mediátoři, arbitři, agenti pro vracení peněz a další účastníci projektu nemají žádnou povinnost kompenzovat uživatelům ztráty z obchodování, zranitelnosti softwaru, bezpečnostní incidenty, podvody nebo jiné škody.
tac.legal.section6.title=Žádná úschova ani zprostředkovatelská role
tac.legal.section6.body=Bisq 2 je decentralizovaný peer-to-peer software vyvinutý a udržovaný prostřednictvím otevřeného modelu správy známého jako Bisq DAO. Žádná centrální entita nekontroluje síť, nedrží správu uživatelských prostředků, nefunguje jako zprostředkovatel, burza, platební procesor, agent pro úschovu, fiduciář nebo protistrana obchodů, ani nezaručuje dostupnost, provoz nebo budoucí vývoj softwaru.
tac.legal.section7.title=Ochrana soukromí a místní data
tac.legal.section7.body=Uživatelé nesou odpovědnost za ochranu svých místních dat aplikace, hesel, identifikačních klíčů, informací o platebním účtu a záznamů o obchodech. Detaily obchodů a plateb mohou být sdíleny s obchodními partnery a, pokud je otevřen spor, s mediátory, arbitry, agenty pro vrácení peněz nebo jinými účastníky zapojenými do procesu řešení sporů.
tac.legal.confirm=Přečetl(a) jsem a přijímám tyto podmínky.


