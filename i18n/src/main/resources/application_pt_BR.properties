restoreFromBackup.headline=Arquivos Restaurados do Backup
restoreFromBackup.info=Durante a inicialização, o sistema detectou que alguns arquivos persistentes estavam corrompidos ou ilegíveis.\nPara garantir que a aplicação permaneça em um estado válido, os backups mais recentes disponíveis foram restaurados automaticamente.\n\nPor favor, revise suas negociações abertas para garantir que elas estejam no estado esperado.\nSe você notar alguma inconsistência ou encontrar problemas, entre em contato com os colaboradores do Bisq para assistência.\n\nOs seguintes arquivos foram restaurados do backup:
