syntax = "proto3";
package support;
option java_package = "bisq.support.protobuf";
option java_multiple_files = true;
import "user.proto";
import "chat.proto";
import "offer.proto";
import "contract.proto";
import "account.proto";
import "network.proto";
import "network_identity.proto";

message MediationRequest {
  string tradeId = 1;
  contract.Contract contract = 2;
  user.UserProfile requester = 3;
  user.UserProfile peer = 4;
  repeated chat.ChatMessage chatMessages = 5;
  network.identity.NetworkId mediatorNetworkId = 6;
}

message MediatorsResponse {
  string tradeId = 1;
  optional network.identity.NetworkId senderNetworkId = 2;
  sint32 version = 3;
}

message MediationCase {
  MediationRequest mediationRequest = 1;
  sint64 requestDate = 2;
  bool isClosed = 3;
  optional sint64 closeCaseDate = 4;
}

message MediatorStore {
  repeated MediationCase mediationCases = 1;
}

enum MediationCaseState {
  MEDIATIONCASESTATE_UNSPECIFIED = 0;
  MEDIATIONCASESTATE_OPEN = 1;
  MEDIATIONCASESTATE_CLOSED = 2;
  MEDIATIONCASESTATE_RE_OPENED = 3;
}

enum MediationResultReason {
  MEDIATIONRESULTREASON_UNSPECIFIED = 0;
  MEDIATIONRESULTREASON_OTHER = 1;
  MEDIATIONRESULTREASON_BUG = 2;
  MEDIATIONRESULTREASON_USABILITY = 3;
  MEDIATIONRESULTREASON_BANK = 4;
  MEDIATIONRESULTREASON_OPTION_TRADE = 5;
  MEDIATIONRESULTREASON_TRADER_NOT_RESPONDING = 6;
  MEDIATIONRESULTREASON_WRONG_SENDER_ACCOUNT = 7;
  MEDIATIONRESULTREASON_TRADE_ALREADY_SETTLED = 8;
  MEDIATIONRESULTREASON_PEER_WAS_LATE = 9;
}

enum MediationPayoutDistributionType {
  MEDIATIONPAYOUTDISTRIBUTIONTYPE_UNSPECIFIED = 0;
  MEDIATIONPAYOUTDISTRIBUTIONTYPE_CUSTOM_PAYOUT = 1;
  MEDIATIONPAYOUTDISTRIBUTIONTYPE_BUYER_GETS_TRADE_AMOUNT = 2;
  MEDIATIONPAYOUTDISTRIBUTIONTYPE_BUYER_GETS_TRADE_AMOUNT_PLUS_COMPENSATION = 3;
  MEDIATIONPAYOUTDISTRIBUTIONTYPE_BUYER_GETS_TRADE_AMOUNT_MINUS_PENALTY = 4;
  MEDIATIONPAYOUTDISTRIBUTIONTYPE_SELLER_GETS_TRADE_AMOUNT = 5;
  MEDIATIONPAYOUTDISTRIBUTIONTYPE_SELLER_GETS_TRADE_AMOUNT_PLUS_COMPENSATION = 6;
  MEDIATIONPAYOUTDISTRIBUTIONTYPE_SELLER_GETS_TRADE_AMOUNT_MINUS_PENALTY = 7;
  MEDIATIONPAYOUTDISTRIBUTIONTYPE_NO_PAYOUT = 8;
}

message MuSigMediationRequest {
  string tradeId = 1;
  contract.Contract contract = 2;
  user.UserProfile requester = 3;
  user.UserProfile peer = 4;
  repeated chat.ChatMessage chatMessages = 5;
  network.identity.NetworkId mediatorNetworkId = 6;
}

message MuSigMediationResult {
  uint64 date = 1;
  bytes contractHash = 2;
  MediationResultReason mediationResultReason = 3;
  MediationPayoutDistributionType mediationPayoutDistributionType = 4;
  optional sint64 proposedBuyerPayoutAmount = 5;
  optional sint64 proposedSellerPayoutAmount = 6;
  optional double payoutAdjustmentPercentage = 7;
  optional string summaryNotes = 8;
}

message MuSigDisputeCasePaymentDetailsRequest {
  string tradeId = 1;
  network.identity.NetworkId senderNetworkId = 2;
}

message MuSigDisputeCasePaymentDetailsResponse {
  string tradeId = 1;
  network.identity.NetworkId senderNetworkId = 2;
  account.AccountPayload takerAccountPayload = 3;
  account.AccountPayload makerAccountPayload = 4;
}

message MuSigMediationStateChangeMessage {
  string id = 1;
  string tradeId = 2;
  network.identity.NetworkId senderNetworkId = 3;
  MediationCaseState mediationCaseState = 4;
  optional MuSigMediationResult muSigMediationResult = 5;
  optional bytes mediationResultSignature = 6;
}

message MuSigDisputeCaseDataMessage {
  string tradeId = 1;
  network.identity.NetworkId senderNetworkId = 2;
  bytes contractHash = 3;
  repeated chat.ChatMessage chatMessages = 4;
}

message MuSigMediationResultAcceptanceMessage {
  string tradeId = 1;
  network.identity.NetworkId senderNetworkId = 2;
  bool mediationResultAccepted = 3;
}

enum MuSigMediationIssueType {
  MUSIGMEDIATIONISSUETYPE_UNSPECIFIED = 0;
  MUSIGMEDIATIONISSUETYPE_PEER_CONTRACT_HASH_MISMATCH = 1;
  MUSIGMEDIATIONISSUETYPE_MAKER_ACCOUNT_PAYLOAD_HASH_MISMATCH = 2;
  MUSIGMEDIATIONISSUETYPE_TAKER_ACCOUNT_PAYLOAD_HASH_MISMATCH = 3;
}

message MuSigMediationIssue {
  uint64 date = 1;
  contract.Role causingRole = 2;
  MuSigMediationIssueType type = 3;
  optional string details = 4;
}

message MuSigMediationCase {
  MuSigMediationRequest muSigMediationRequest = 1;
  sint64 requestDate = 2;
  MediationCaseState mediationCaseState = 3;
  optional MuSigMediationResult muSigMediationResult = 4;
  optional bytes mediationResultSignature = 5;
  optional bytes peerReportedContractHash = 6;
  optional account.AccountPayload takerAccountPayload = 7;
  optional account.AccountPayload makerAccountPayload = 8;
  repeated MuSigMediationIssue issues = 9;
  bool mediatorHasLeftChat = 10;
}

message MuSigMediatorStore {
  repeated MuSigMediationCase muSigMediationCases = 1;
}

enum ArbitrationCaseState {
  ARBITRATIONCASESTATE_UNSPECIFIED = 0;
  ARBITRATIONCASESTATE_OPEN = 1;
  ARBITRATIONCASESTATE_CLOSED = 2;
}

enum ArbitrationResultReason {
  ARBITRATIONRESULTREASON_UNSPECIFIED = 0;
  ARBITRATIONRESULTREASON_OTHER = 1;
  ARBITRATIONRESULTREASON_BUG = 2;
  ARBITRATIONRESULTREASON_USABILITY = 3;
  ARBITRATIONRESULTREASON_BANK = 4;
  ARBITRATIONRESULTREASON_OPTION_TRADE = 5;
  ARBITRATIONRESULTREASON_TRADER_NOT_RESPONDING = 6;
  ARBITRATIONRESULTREASON_WRONG_SENDER_ACCOUNT = 7;
  ARBITRATIONRESULTREASON_TRADE_ALREADY_SETTLED = 8;
  ARBITRATIONRESULTREASON_PEER_WAS_LATE = 9;
}

enum ArbitrationPayoutDistributionType {
  ARBITRATIONPAYOUTDISTRIBUTIONTYPE_UNSPECIFIED = 0;
  ARBITRATIONPAYOUTDISTRIBUTIONTYPE_CUSTOM_PAYOUT = 1;
  ARBITRATIONPAYOUTDISTRIBUTIONTYPE_BUYER_GETS_TRADE_AMOUNT = 2;
  ARBITRATIONPAYOUTDISTRIBUTIONTYPE_SELLER_GETS_TRADE_AMOUNT = 3;
}

message MuSigArbitrationRequest {
  string tradeId = 1;
  contract.Contract contract = 2;
  MuSigMediationResult muSigMediationResult = 3;
  bytes mediationResultSignature = 4;
  user.UserProfile requester = 5;
  user.UserProfile peer = 6;
  repeated chat.ChatMessage chatMessages = 7;
  network.identity.NetworkId arbitratorNetworkId = 8;
}

message MuSigArbitrationResult {
  uint64 date = 1;
  bytes contractHash = 2;
  ArbitrationResultReason arbitrationResultReason = 3;
  ArbitrationPayoutDistributionType arbitrationPayoutDistributionType = 4;
  sint64 buyerPayoutAmount = 5;
  sint64 sellerPayoutAmount = 6;
  optional string summaryNotes = 7;
}

message MuSigArbitrationStateChangeMessage {
  string id = 1;
  string tradeId = 2;
  network.identity.NetworkId senderNetworkId = 3;
  ArbitrationCaseState arbitrationCaseState = 4;
  optional MuSigArbitrationResult muSigArbitrationResult = 5;
  optional bytes arbitrationResultSignature = 6;
}

enum MuSigArbitrationIssueType {
  MUSIGARBITRATIONISSUETYPE_UNSPECIFIED = 0;
  MUSIGARBITRATIONISSUETYPE_MAKER_ACCOUNT_PAYLOAD_HASH_MISMATCH = 1;
  MUSIGARBITRATIONISSUETYPE_TAKER_ACCOUNT_PAYLOAD_HASH_MISMATCH = 2;
}

message MuSigArbitrationIssue {
  uint64 date = 1;
  contract.Role causingRole = 2;
  MuSigArbitrationIssueType type = 3;
  optional string details = 4;
}

message MuSigArbitrationCase {
  MuSigArbitrationRequest muSigArbitrationRequest = 1;
  uint64 requestDate = 2;
  ArbitrationCaseState arbitrationCaseState = 3;
  optional MuSigArbitrationResult muSigArbitrationResult = 4;
  optional bytes arbitrationResultSignature = 5;
  optional account.AccountPayload takerAccountPayload = 6;
  optional account.AccountPayload makerAccountPayload = 7;
  repeated MuSigArbitrationIssue issues = 8;
  bool arbitratorHasLeftChat = 10;
}

message MuSigArbitratorStore {
  repeated MuSigArbitrationCase muSigArbitrationCases = 1;
}

message ReportToModeratorMessage {
  sint64 date = 1;
  string reporterUserProfileId = 2;
  user.UserProfile accusedUserProfile = 3;
  string message = 4;
  chat.ChatChannelDomain chatChannelDomain = 5;
}

message BannedUserModeratorData {
  string reporterUserProfileId = 1;
  string accusedUserProfileId = 2;
  string reportersMessage = 3;
  string banReason = 4;
}

message ModeratorStore {
  repeated ReportToModeratorMessage reportToModeratorMessages = 1;
  repeated BannedUserModeratorData bannedUserModeratorData = 2;
}
