syntax = "proto3";

package musigrpc;

option java_package = "bisq.trade.protobuf";
option java_multiple_files = true;

/**
 * Same as the rpc.proto from https://github.com/bisq-network/bisq-musig/blob/main/rpc/src/main/proto/rpc.proto
 */
service Musig {
  rpc InitTrade (PubKeySharesRequest) returns (PubKeySharesResponse);

  rpc GetNonceShares (NonceSharesRequest) returns (NonceSharesMessage);

  rpc GetPartialSignatures (PartialSignaturesRequest) returns (PartialSignaturesMessage);

  rpc SignDepositTx (DepositTxSignatureRequest) returns (DepositPsbt);

  rpc PublishDepositTx (PublishDepositTxRequest) returns (stream TxConfirmationStatus);

  rpc SubscribeTxConfirmationStatus (SubscribeTxConfirmationStatusRequest) returns (stream TxConfirmationStatus);

  rpc SignSwapTx (SwapTxSignatureRequest) returns (SwapTxSignatureResponse);

  rpc CloseTrade (CloseTradeRequest) returns (CloseTradeResponse);
}

//TODO same as TradeRole
enum Role {
  SELLER_AS_MAKER = 0;
  SELLER_AS_TAKER = 1;
  BUYER_AS_MAKER = 2;
  BUYER_AS_TAKER = 3;
}

message ReceiverAddressAndAmount {
  string address = 1;
  uint64 amount = 2; // sats
}

message ContractualTxIds {
  string depositTxId = 1;
  string buyersWarningTxId = 2;
  string sellersWarningTxId = 3;
  string buyersRedirectTxId = 4;
  string sellersRedirectTxId = 5;
}

message PubKeySharesRequest {
  string tradeId = 1;
  Role myRole = 2;
}

message PubKeySharesResponse {
  bytes buyerOutputPubKeyShare = 1;
  bytes sellerOutputPubKeyShare = 2;
  bytes multisigScriptKey = 3;
  uint32 currentBlockHeight = 4;
}

message NonceSharesRequest {
  string tradeId = 1;
  bytes buyerOutputPeersPubKeyShare = 2;
  bytes sellerOutputPeersPubKeyShare = 3;
  bytes peersMultisigScriptKey = 4;
  uint64 depositTxFeeRate = 5;       // sats per kwu
  uint64 preparedTxFeeRate = 6;      // sats per kwu
  uint64 tradeAmount = 7;            // sats
  uint64 buyersSecurityDeposit = 8;  // sats
  uint64 sellersSecurityDeposit = 9; // sats
  optional ReceiverAddressAndAmount tradeFeeReceiver = 10;
}

message NonceSharesMessage {
  string warningTxFeeBumpAddress = 1;
  string redirectTxFeeBumpAddress = 2;
  string claimTxPayoutAddress = 3;
  bytes halfDepositPsbt = 4;
  uint64 redirectionAmountMsat = 5; // (millisatoshis)
  bytes swapTxInputNonceShare = 6;
  bytes buyersWarningTxBuyerInputNonceShare = 7;
  bytes buyersWarningTxSellerInputNonceShare = 8;
  bytes sellersWarningTxBuyerInputNonceShare = 9;
  bytes sellersWarningTxSellerInputNonceShare = 10;
  bytes buyersRedirectTxInputNonceShare = 11;
  bytes sellersRedirectTxInputNonceShare = 12;
  bytes buyersClaimTxInputNonceShare = 13;
  bytes sellersClaimTxInputNonceShare = 14;
}

message PartialSignaturesRequest {
  string tradeId = 1;
  optional NonceSharesMessage peersNonceShares = 2;
  repeated ReceiverAddressAndAmount redirectionReceivers = 3;
  bool buyerReadyToRelease = 4;
}

message PartialSignaturesMessage {
  bytes peersWarningTxBuyerInputPartialSignature = 1;
  bytes peersWarningTxSellerInputPartialSignature = 2;
  bytes peersRedirectTxInputPartialSignature = 3;
  bytes peersClaimTxInputPartialSignature = 4;
  optional bytes swapTxInputPartialSignature = 5;
  optional bytes swapTxInputSighash = 6;
  optional ContractualTxIds contractualTxIds = 7;
}

message DepositTxSignatureRequest {
  string tradeId = 1;
  PartialSignaturesMessage peersPartialSignatures = 2;
}

message DepositPsbt {
  bytes depositPsbt = 1;
}

message PublishDepositTxRequest {
  string tradeId = 1;
  DepositPsbt peersDepositPsbt = 2;
}

message SubscribeTxConfirmationStatusRequest {
  string tradeId = 1;
}

message TxConfirmationStatus {
  bytes tx = 1;
  uint32 currentBlockHeight = 2;
  uint32 numConfirmations = 3;
}

message SwapTxSignatureRequest {
  string tradeId = 1;
  bytes swapTxInputPeersPartialSignature = 2;
  bool sellerReadyToRelease = 3;
}

message SwapTxSignatureResponse {
  bytes swapTx = 1;
  bytes peerOutputPrvKeyShare = 2;
}

message CloseTradeRequest {
  string tradeId = 1;
  optional bytes myOutputPeersPrvKeyShare = 2;
  optional bytes swapTx = 3;
}

message CloseTradeResponse {
  bytes peerOutputPrvKeyShare = 1;
}
